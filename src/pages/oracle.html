<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Footzy — Oracle IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:             #F2F2F0;
      --color-surface:        #FFFFFF;
      --color-dark:           #0F0F0E;
      --color-green:          #00E05A;
      --color-green-dim:      #00C44F;
      --color-text-primary:   #0F0F0E;
      --color-text-secondary: #6B6966;
      --color-text-tertiary:  #A8A49F;
      --color-text-inverse:   #FFFFFF;
      --color-border:         #E8E6E2;
      --color-gold:           #F5A623;
      --color-premium-bg:     #FFF9E8;
      --radius-sm:   8px;
      --radius-md:   12px;
      --radius-lg:   16px;
      --radius-xl:   20px;
      --radius-full: 9999px;
      --shadow-card:    0 1px 4px rgba(0,0,0,0.05), 0 0 0 1px var(--color-border);
      --shadow-premium: 0 0 0 2px var(--color-gold);
    }

    html, body {
      height: 100%;
      background: var(--color-bg);
      font-family: 'Geist', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--color-text-primary);
    }

    /* ── Dot pattern ── */
    .page {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      padding-bottom: 90px;
      position: relative;
    }
    .page::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #C8C5C0 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
      padding-top: 56px;
    }

    /* ── [A] Header ── */
    .header {
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 430px;
      height: 56px;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
    }
    .header-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--color-green);
      display: flex; align-items: center; justify-content: center;
      font: 700 0.9rem/1 'Geist';
      color: var(--color-dark);
      cursor: pointer;
      overflow: hidden;
      flex-shrink: 0;
    }
    .header-logo {
      font: italic 900 1.45rem/1 'Geist';
      letter-spacing: -0.03em;
      text-transform: uppercase;
      color: var(--color-text-primary);
    }
    .header-logo span { color: var(--color-green); }
    .header-pts {
      background: var(--color-dark);
      color: var(--color-text-inverse);
      padding: 7px 13px;
      border-radius: var(--radius-full);
      font: 700 0.78rem/1 'Geist';
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .header-pts-val { color: var(--color-green); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes revealUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim { opacity: 0; animation: fadeUp 320ms ease-out forwards; }
    .anim-1 { animation-delay: 40ms; }
    .anim-2 { animation-delay: 80ms; }

    /* ── [B] Hero Oracle ── */
    .oracle-hero {
      background: var(--color-dark);
      padding: 28px 16px 24px;
      position: relative;
      overflow: hidden;
    }
    .oracle-hero::after {
      content: '✦';
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 5rem;
      opacity: 0.05;
      color: var(--color-green);
      pointer-events: none;
      line-height: 1;
    }
    .oracle-hero-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .oracle-icon-block {
      width: 40px; height: 40px;
      background: #1A1A19;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      border: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .oracle-hero-title {
      font: italic 900 2.8rem/0.95 'Geist';
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: var(--color-text-inverse);
      margin-bottom: 10px;
    }
    .oracle-hero-title .accent { color: var(--color-green); }
    .oracle-premium-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(245,166,35,0.15);
      border: 1px solid rgba(245,166,35,0.4);
      color: var(--color-gold);
      padding: 5px 10px;
      border-radius: var(--radius-full);
      font: 700 0.65rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.08em;
      cursor: default;
    }
    .oracle-premium-badge--locked {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.35);
      cursor: pointer;
    }
    .oracle-hero-desc {
      font: 400 0.8rem/1.4 'Geist';
      color: rgba(255,255,255,0.45);
      margin-top: 10px;
      max-width: 280px;
    }

    /* ── [C] Section label ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font: 700 0.62rem/1 'Geist';
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-secondary);
      padding: 20px 16px 12px;
    }
    .section-label::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--color-green);
      flex-shrink: 0;
    }

    /* ── Date separator ── */
    .date-separator {
      padding: 16px 16px 8px;
      font: 700 0.62rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-tertiary);
    }

    /* ── [D] Match row ── */
    .match-row {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin: 0 16px 8px;
      box-shadow: var(--shadow-card);
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: transform 150ms ease;
      min-height: 68px;
      opacity: 0;
      animation: fadeUp 320ms ease-out forwards;
    }
    .match-row:active { transform: scale(0.985); }
    .match-row--live  { box-shadow: 0 0 0 2px var(--color-green); }
    .match-row--past .match-row-name { color: var(--color-text-secondary); }
    .match-row--past .match-row-date { color: var(--color-text-tertiary); }

    .match-row-flags {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      width: 52px;
    }
    .match-row-flag { font-size: 1.45rem; line-height: 1; }
    .match-row-info { flex: 1; min-width: 0; }
    .match-row-name {
      font: 700 0.95rem/1.2 'Geist';
      color: var(--color-text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .match-row-date {
      font: 500 0.75rem/1 'Geist';
      color: var(--color-text-secondary);
      white-space: nowrap;
    }

    .match-row-live-badge {
      background: var(--color-green);
      color: var(--color-dark);
      padding: 3px 7px;
      border-radius: var(--radius-full);
      font: 700 0.58rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .match-row-analysed-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--color-green);
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 4px;
    }

    .btn-analyser {
      background: var(--color-green);
      color: var(--color-dark);
      padding: 10px 16px;
      border-radius: var(--radius-full);
      font: 700 0.82rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.02em;
      border: none;
      cursor: pointer;
      flex-shrink: 0;
      white-space: nowrap;
      transition: background 150ms ease, transform 150ms ease;
    }
    .btn-analyser:hover  { background: var(--color-green-dim); }
    .btn-analyser:active { transform: scale(0.94); }

    .btn-analyser--past {
      background: transparent;
      border: 1.5px solid var(--color-border);
      color: var(--color-text-secondary);
      padding: 9px 14px;
    }
    .btn-analyser--past:hover { background: #F7F6F4; }

    .btn-analyser--locked {
      background: var(--color-border);
      color: var(--color-text-tertiary);
      position: relative;
      cursor: pointer;
    }

    /* ── Skeleton ── */
    .skeleton-row {
      background: linear-gradient(90deg, #EEECE8 25%, #F5F4F1 50%, #EEECE8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--radius-lg);
      height: 68px;
      margin: 0 16px 8px;
    }

    /* ── Loading oracle ── */
    .oracle-loading {
      text-align: center;
      padding: 48px 24px;
      animation: revealUp .3s ease;
    }
    .oracle-loading .orb {
      font-size: 56px;
      display: block;
      margin-bottom: 16px;
    }
    .oracle-loading .text {
      font-size: 15px;
      font-weight: 700;
      color: var(--color-text-secondary);
      margin-bottom: 8px;
    }
    .oracle-loading .sub {
      font-size: 12px;
      color: var(--color-text-tertiary);
    }
    .oracle-spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(0,224,90,0.15);
      border-top-color: var(--color-green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto 0;
    }

    /* ── Analysis card ── */
    .analysis-card {
      margin: 0 16px;
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      animation: revealUp .45s cubic-bezier(.32,.72,0,1);
    }
    .analysis-header {
      background: var(--color-dark);
      padding: 20px 16px 16px;
      position: relative;
      overflow: hidden;
    }
    .analysis-header::after {
      content: '';
      position: absolute; right: -60px; bottom: -60px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(0,224,90,0.20), transparent 65%);
      pointer-events: none;
    }
    .analysis-match-label {
      font: 500 0.68rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }
    .analysis-verdict {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font: 700 0.68rem/1 'Geist';
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--color-dark);
      background: var(--color-green);
      margin-bottom: 14px;
    }
    .analysis-score-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 16px;
    }
    .analysis-team {
      display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1;
    }
    .analysis-team .flag { font-size: 2rem; line-height: 1; }
    .analysis-team .name {
      font: 700 0.72rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.45);
      text-align: center;
    }
    .analysis-score {
      font: italic 900 3rem/1 'Geist';
      letter-spacing: -0.04em;
      color: var(--color-text-inverse);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .analysis-score .sep {
      font-size: 1.4rem;
      color: rgba(255,255,255,0.25);
      font-style: normal;
      font-weight: 400;
      margin: 0 4px;
    }
    .confidence-wrap { padding: 0; }
    .confidence-label {
      font: 700 0.6rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .confidence-pct { font: 900 1rem/1 'Geist'; color: var(--color-green); }
    .confidence-track {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .confidence-fill {
      height: 100%;
      border-radius: var(--radius-full);
      background: var(--color-green);
      transition: width 1.4s cubic-bezier(.22,1,.36,1);
    }

    /* Analysis sections */
    .analysis-section {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .analysis-block-hd {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font: 700 0.72rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-secondary);
    }
    .analysis-text {
      font: 400 0.85rem/1.55 'Geist';
      color: var(--color-text-secondary);
    }
    .facteur-cle {
      background: #FFF6D8;
      border: 1px solid rgba(212,165,0,0.25);
      border-radius: var(--radius-md);
      padding: 12px;
    }
    .facteur-cle-hd {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 4px;
      font: 700 0.62rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #7A5500;
    }
    .facteur-cle p { font: 600 0.82rem/1.45 'Geist'; color: #4A3500; }
    .buteur-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--color-green);
      color: var(--color-dark);
      border-radius: var(--radius-full);
      padding: 7px 14px;
      font: 700 0.82rem/1 'Geist';
    }
    .players-grid { display: flex; flex-direction: column; gap: 6px; }
    .player-row { display: flex; align-items: center; gap: 8px; }
    .player-avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--color-dark);
      color: var(--color-text-inverse);
      display: flex; align-items: center; justify-content: center;
      font: 700 0.62rem/1 'Geist';
      flex-shrink: 0;
    }
    .player-name  { font: 600 0.85rem/1 'Geist'; flex: 1; }
    .player-role  { font: 500 0.75rem/1 'Geist'; color: var(--color-text-tertiary); }
    .form-wrap { display: flex; align-items: center; gap: 8px; }
    .form-flag { font-size: 1.1rem; }
    .form-team { font: 700 0.82rem/1 'Geist'; flex: 1; }
    .form-dots { display: inline-flex; gap: 4px; }
    .form-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font: 700 0.65rem/1 'Geist';
      color: #fff;
    }
    .form-dot.W { background: var(--color-green-dim); color: var(--color-dark); }
    .form-dot.D { background: var(--color-text-tertiary); }
    .form-dot.L { background: #C42B36; }
    .stats-list { display: flex; flex-direction: column; gap: 10px; }
    .stat-row-label {
      font: 700 0.62rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-tertiary);
      margin-bottom: 4px;
    }
    .stat-bar-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .stat-track {
      flex: 1; height: 6px;
      background: var(--color-border);
      border-radius: var(--radius-full);
      overflow: hidden;
    }
    .stat-fill { height: 100%; border-radius: var(--radius-full); transition: width 1s cubic-bezier(.22,1,.36,1); }
    .stat-fill.green { background: var(--color-green); }
    .stat-fill.gray  { background: var(--color-text-tertiary); }
    .stat-val { font: 700 0.82rem/1 'Geist'; min-width: 30px; text-align: right; }

    /* ── Upsell bottom sheet ── */
    .upsell-overlay {
      position: fixed; inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: flex-end; justify-content: center;
    }
    .upsell-sheet {
      background: var(--color-surface);
      border-radius: 20px 20px 0 0;
      width: 100%; max-width: 430px;
      padding: 20px 16px 40px;
      animation: slideUp 280ms cubic-bezier(0.32,0.72,0,1);
      text-align: center;
    }
    .upsell-handle {
      width: 36px; height: 4px;
      border-radius: 2px;
      background: var(--color-border);
      margin: 0 auto 20px;
    }
    .upsell-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .upsell-title {
      font: 700 1rem/1.3 'Geist';
      color: var(--color-text-primary);
      margin-bottom: 8px;
    }
    .upsell-sub {
      font: 400 0.85rem/1.5 'Geist';
      color: var(--color-text-secondary);
      margin-bottom: 20px;
    }
    .upsell-cta {
      display: block; width: 100%;
      background: var(--color-green);
      color: var(--color-dark);
      border: none;
      border-radius: var(--radius-full);
      padding: 14px 24px;
      font: 700 0.9rem/1 'Geist';
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 150ms ease;
    }
    .upsell-cta:hover { background: var(--color-green-dim); }
    .upsell-skip {
      font: 400 0.82rem/1 'Geist';
      color: var(--color-text-secondary);
      cursor: pointer;
      background: none;
      border: none;
    }

    /* ── Nav bottom ── */
    .nav-bottom {
      position: fixed; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      height: 80px;
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      display: flex; align-items: flex-start;
      padding: 10px 0 0;
      z-index: 100;
    }
    .nav-tab {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      cursor: pointer;
      text-decoration: none;
      padding: 2px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-tab-icon  { font-size: 1.35rem; line-height: 1; transition: transform 150ms ease; }
    .nav-tab:active .nav-tab-icon { transform: scale(0.88); }
    .nav-tab-label {
      font: 500 0.58rem/1 'Geist';
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--color-text-secondary);
    }
    .nav-tab.active .nav-tab-label { color: var(--color-green); font-weight: 700; }
  </style>
</head>
<body>
  <div class="page">

    <!-- ── [A] Header ── -->
    <header class="header">
      <div class="header-avatar" id="user-avatar" onclick="window.location.href='/src/pages/profil.html'">?</div>
      <div class="header-logo">FOOTZY<span>.</span></div>
      <div class="header-pts"><span class="header-pts-val" id="pts-val">0</span> PTS</div>
    </header>

    <div class="content">

      <!-- ── [B] Hero Oracle ── -->
      <div class="oracle-hero anim anim-1">
        <div class="oracle-hero-top">
          <div class="oracle-icon-block">✦</div>
        </div>
        <div class="oracle-hero-title">Oracle <span class="accent">IA</span></div>
        <div id="plan-badge" class="oracle-premium-badge">⭐ PREMIUM</div>
        <div class="oracle-hero-desc">Analyse IA pré-match · Score prédit · Buteurs probables</div>
      </div>

      <!-- ── [C] Section label ── -->
      <div class="section-label anim anim-2">Choisir un match à analyser</div>

      <!-- ── [D] Liste ── -->
      <div id="match-list" role="list">
        <!-- Skeletons -->
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
      </div>

      <!-- Zone analyse -->
      <div id="analysis-zone" style="padding:16px 0 0"></div>

    </div>

    <!-- ── Nav bottom ── -->
    <nav class="nav-bottom">
      <a href="/src/pages/accueil.html" class="nav-tab">
        <span class="nav-tab-icon">🏠</span>
        <span class="nav-tab-label">Accueil</span>
      </a>
      <a href="/src/pages/home.html" class="nav-tab">
        <span class="nav-tab-icon">⚽</span>
        <span class="nav-tab-label">Matchs</span>
      </a>
      <a href="/src/pages/oracle.html" class="nav-tab active" aria-current="page">
        <span class="nav-tab-icon">🔮</span>
        <span class="nav-tab-label">Oracle</span>
      </a>
      <a href="/src/pages/groupe.html" class="nav-tab">
        <span class="nav-tab-icon">👥</span>
        <span class="nav-tab-label">Groupe</span>
      </a>
      <a href="/src/pages/profil.html" class="nav-tab">
        <span class="nav-tab-icon">🪪</span>
        <span class="nav-tab-label">Profil</span>
      </a>
    </nav>

  </div>

  <script type="module">
    import { supabase, requireAuth, getCurrentProfile } from '/src/js/lib/supabase.js';
    import { createCheckout, checkPremiumAccess, PLANS } from '/src/js/lib/whop.js';
    import { formatKickoff } from '/src/js/lib/utils.js';

    (async () => {
    const user    = await requireAuth();
    if (!user) throw new Error('not authed');
    const profile = await getCurrentProfile();
    const isPremium = await checkPremiumAccess(profile);

    // ── Header ──
    if (profile) {
      const av = document.getElementById('user-avatar');
      if (profile.avatar_url) {
        av.innerHTML = `<img src="${profile.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      } else {
        av.textContent = (profile.pseudo?.[0] || '?').toUpperCase();
      }
      document.getElementById('pts-val').textContent = (profile.points_totaux || 0).toLocaleString('fr-FR');
    }

    // ── Badge plan ──
    const badge = document.getElementById('plan-badge');
    if (!isPremium) {
      badge.textContent = '🔒 PREMIUM — débloquer';
      badge.classList.add('oracle-premium-badge--locked');
      badge.addEventListener('click', showUpsell);
    }

    // ── Upsell sheet ──
    function showUpsell() {
      const el = document.createElement('div');
      el.className = 'upsell-overlay';
      el.innerHTML = `
        <div class="upsell-sheet">
          <div class="upsell-handle"></div>
          <div class="upsell-icon">🔮</div>
          <div class="upsell-title">Oracle IA — Fonctionnalité Premium</div>
          <div class="upsell-sub">Débloquez l'analyse IA complète pour chaque match : score prédit, buteurs probables, analyse tactique.</div>
          <button class="upsell-cta" id="upsell-btn">Passer Premium — 5,99€/mois</button>
          <button class="upsell-skip">Continuer en Free</button>
        </div>`;
      document.body.appendChild(el);
      el.querySelector('#upsell-btn').addEventListener('click', () => createCheckout(PLANS.premium, user.id, user.email));
      el.querySelector('.upsell-skip').addEventListener('click', () => el.remove());
      el.addEventListener('click', e => { if (e.target === el) el.remove(); });
    }

    // ── Load matches ──
    const list = document.getElementById('match-list');

    try {
      const now  = new Date().toISOString();
      const from = new Date(); from.setDate(from.getDate() - 2);

      const { data: matches } = await supabase
        .from('matchs')
        .select('id, home_team, away_team, home_flag, away_flag, kickoff_at, status, phase, groupe')
        .gte('kickoff_at', from.toISOString())
        .order('kickoff_at')
        .limit(20);

      if (!matches?.length) {
        list.innerHTML = `
          <div style="text-align:center;padding:40px 16px;color:var(--color-text-tertiary)">
            <div style="font-size:2.5rem;margin-bottom:12px">🔮</div>
            <div style="font:400 0.88rem/1 'Geist'">Aucun match à analyser pour le moment</div>
          </div>`;
        return;
      }

      // Cached analyses
      const matchIds = matches.map(m => m.id);
      const { data: cached } = await supabase
        .from('oracle_analyses').select('match_id').in('match_id', matchIds);
      const cachedSet = new Set(cached?.map(c => c.match_id) || []);

      // Group by day
      const groups = {};
      for (const m of matches) {
        const d   = new Date(m.kickoff_at);
        const key = d.toDateString();
        if (!groups[key]) groups[key] = { label: formatDayLabel(d), items: [] };
        groups[key].items.push(m);
      }

      let html = '';
      let delay = 80;
      for (const { label, items } of Object.values(groups)) {
        if (Object.keys(groups).length > 1) {
          html += `<div class="date-separator">${label}</div>`;
        }
        for (const m of items) {
          const isLive    = m.status === 'live' || m.status === 'halftime';
          const isPast    = m.status === 'finished';
          const analysed  = cachedSet.has(m.id);
          const d         = new Date(m.kickoff_at);
          const dateStr   = d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' }) + ' · ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

          let btnHTML;
          if (isLive) {
            btnHTML = `<span class="match-row-live-badge">LIVE</span>`;
          } else if (isPast) {
            btnHTML = `<button class="btn-analyser btn-analyser--past" aria-label="Voir analyse ${m.home_team} vs ${m.away_team}">Voir analyse</button>`;
          } else if (!isPremium) {
            btnHTML = `<button class="btn-analyser btn-analyser--locked" aria-label="Analyser ${m.home_team} vs ${m.away_team}" aria-disabled="true">🔒 Analyser</button>`;
          } else {
            btnHTML = `<button class="btn-analyser" aria-label="Analyser ${m.home_team} vs ${m.away_team}">Analyser</button>`;
          }

          html += `
            <div class="match-row${isLive ? ' match-row--live' : ''}${isPast ? ' match-row--past' : ''}"
              role="listitem"
              data-match-id="${m.id}"
              data-idx="${matchIds.indexOf(m.id)}"
              style="animation-delay:${delay}ms">
              <div class="match-row-flags">
                <span class="match-row-flag">${m.home_flag || ''}</span>
                <span class="match-row-flag">${m.away_flag || ''}</span>
              </div>
              <div class="match-row-info">
                <div class="match-row-name">${m.home_team} vs ${m.away_team}</div>
                <div class="match-row-date">${dateStr}</div>
              </div>
              ${analysed && !isLive ? '<span class="match-row-analysed-dot" title="Déjà analysé"></span>' : ''}
              ${btnHTML}
            </div>`;
          delay += 40;
        }
      }

      list.innerHTML = html;

      // Click handlers
      list.querySelectorAll('.match-row').forEach(row => {
        row.addEventListener('click', () => {
          const idx   = parseInt(row.dataset.idx);
          const match = matches[idx];
          if (!isPremium) { showUpsell(); return; }
          analyzeMatch(match);
        });
      });

    } catch(e) {
      console.warn('Oracle list failed silently', e);
      list.innerHTML = `<div style="text-align:center;padding:40px 16px;color:var(--color-text-tertiary)">Erreur de chargement</div>`;
    }

    function formatDayLabel(d) {
      const today = new Date();
      const tom   = new Date(today); tom.setDate(today.getDate() + 1);
      if (d.toDateString() === today.toDateString()) return 'Aujourd\'hui';
      if (d.toDateString() === tom.toDateString())   return 'Demain';
      return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();
    }

    // ─────────────────────────────────────────
    // ANALYSE
    // ─────────────────────────────────────────
    let currentMatchId = null;

    async function analyzeMatch(match) {
      if (currentMatchId === match.id) return;
      currentMatchId = match.id;

      // Highlight selected row
      document.querySelectorAll('.match-row').forEach(r => r.style.boxShadow = '');
      const row = document.querySelector(`[data-match-id="${match.id}"]`);
      if (row && match.status !== 'live' && match.status !== 'halftime') {
        row.style.boxShadow = '0 0 0 2px var(--color-green)';
      }

      const zone = document.getElementById('analysis-zone');
      zone.innerHTML = `
        <div class="oracle-loading">
          <span class="orb">🔮</span>
          <div class="text">L'Oracle analyse ce match…</div>
          <div class="sub">Traitement des données tactiques et historiques</div>
          <div class="oracle-spinner"></div>
        </div>`;
      zone.scrollIntoView({ behavior: 'smooth', block: 'start' });

      try {
        const { data: { session } } = await supabase.auth.getSession();
        const jwt = session?.access_token;

        const res = await fetch('/api/oracle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${jwt}` },
          body: JSON.stringify({
            matchId:   match.id,
            homeTeam:  match.home_team,
            awayTeam:  match.away_team,
            homeFlag:  match.home_flag,
            awayFlag:  match.away_flag,
            phase:     match.phase,
            kickoffAt: match.kickoff_at,
          })
        });

        if (!res.ok) throw new Error('API error ' + res.status);
        const data = await res.json();
        renderAnalysis(data, match, zone);

        // Mark as analysed
        const dot = document.querySelector(`[data-match-id="${match.id}"] .match-row-analysed-dot`);
        if (!dot) {
          const info = document.querySelector(`[data-match-id="${match.id}"] .match-row-info`);
          if (info) {
            const d = document.createElement('span');
            d.className = 'match-row-analysed-dot';
            d.title = 'Déjà analysé';
            info.after(d);
          }
        }

      } catch (err) {
        zone.innerHTML = `
          <div style="margin:0 16px;background:var(--color-surface);border-radius:var(--radius-lg);padding:28px 20px;text-align:center;box-shadow:var(--shadow-card)">
            <div style="font-size:2rem;margin-bottom:8px">⚠️</div>
            <div style="font:700 0.9rem/1 'Geist';color:var(--color-text-primary);margin-bottom:6px">Erreur Oracle</div>
            <div style="font:400 0.78rem/1 'Geist';color:var(--color-text-tertiary)">${err.message}</div>
          </div>`;
        currentMatchId = null;
      }
    }

    function renderAnalysis(d, match, zone) {
      const formDots = (form) => (form || 'WWDLD').split('').map(c =>
        `<span class="form-dot ${c}">${c}</span>`).join('');

      const stats      = d.stats || {};
      const keyPlayers = Array.isArray(d.key_players) ? d.key_players : [];

      zone.innerHTML = `
        <div class="analysis-card">
          <div class="analysis-header">
            <div class="analysis-match-label">${match.home_team} · ${match.away_team}</div>
            <div class="analysis-verdict">${d.verdict || '—'}</div>
            <div class="analysis-score-wrap">
              <div class="analysis-team">
                <span class="flag">${match.home_flag}</span>
                <span class="name">${match.home_team?.slice(0,3).toUpperCase()}</span>
              </div>
              <span class="analysis-score">${d.home_score ?? '?'}<span class="sep">–</span>${d.away_score ?? '?'}</span>
              <div class="analysis-team">
                <span class="flag">${match.away_flag}</span>
                <span class="name">${match.away_team?.slice(0,3).toUpperCase()}</span>
              </div>
            </div>
            <div class="confidence-wrap">
              <div class="confidence-label">
                <span>Confiance IA</span>
                <span class="confidence-pct">${d.confidence ?? 0}%</span>
              </div>
              <div class="confidence-track">
                <div class="confidence-fill" id="conf-fill" style="width:0%"></div>
              </div>
            </div>
          </div>

          <div class="analysis-section">
            <div>
              <div class="analysis-block-hd">✨ Analyse Oracle</div>
              <p class="analysis-text">${d.analysis || '—'}</p>
            </div>

            ${d.facteur_cle ? `
            <div class="facteur-cle">
              <div class="facteur-cle-hd">⚡ Facteur décisif</div>
              <p>${d.facteur_cle}</p>
            </div>` : ''}

            ${d.buteur ? `
            <div>
              <div class="analysis-block-hd">⚽ Buteur probable</div>
              <span class="buteur-chip">⚽ ${d.buteur}</span>
            </div>` : ''}

            ${keyPlayers.length ? `
            <div>
              <div class="analysis-block-hd">⭐ Joueurs à surveiller</div>
              <div class="players-grid">
                ${keyPlayers.map(p => `
                  <div class="player-row">
                    <span class="player-avatar">${(p.name||'?').split(' ').pop()[0]}</span>
                    <span class="player-name">${p.name}</span>
                    <span class="player-role">${p.role}</span>
                  </div>`).join('')}
              </div>
            </div>` : ''}

            <div>
              <div class="analysis-block-hd">📈 Forme récente</div>
              <div style="display:flex;flex-direction:column;gap:8px">
                <div class="form-wrap">
                  <span class="form-flag">${match.home_flag}</span>
                  <span class="form-team">${match.home_team}</span>
                  <div class="form-dots">${formDots(d.home_form)}</div>
                </div>
                <div class="form-wrap">
                  <span class="form-flag">${match.away_flag}</span>
                  <span class="form-team">${match.away_team}</span>
                  <div class="form-dots">${formDots(d.away_form)}</div>
                </div>
              </div>
            </div>

            <div>
              <div class="analysis-block-hd">📊 Forces en présence</div>
              <div class="stats-list">
                ${[
                  { label: 'Attaque',  home: stats.home_attack  || 0, away: stats.away_attack  || 0 },
                  { label: 'Défense',  home: stats.home_defense || 0, away: stats.away_defense || 0 },
                ].map(s => `
                  <div>
                    <div class="stat-row-label">${s.label}</div>
                    <div class="stat-bar-row">
                      <span style="font-size:1rem">${match.home_flag}</span>
                      <div class="stat-track"><div class="stat-fill green" style="width:${s.home}%"></div></div>
                      <span class="stat-val">${s.home}</span>
                    </div>
                    <div class="stat-bar-row">
                      <span style="font-size:1rem">${match.away_flag}</span>
                      <div class="stat-track"><div class="stat-fill gray" style="width:${s.away}%"></div></div>
                      <span class="stat-val">${s.away}</span>
                    </div>
                  </div>`).join('')}
              </div>
            </div>
          </div>
        </div>`;

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const fill = document.getElementById('conf-fill');
          if (fill) fill.style.width = (d.confidence || 0) + '%';
        });
      });
    }
    })();
  </script>
</body>
</html>
