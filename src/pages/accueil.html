<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Footzy — Accueil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:             #F2F2F0;
      --color-surface:        #FFFFFF;
      --color-dark:           #0F0F0E;
      --color-green:          #00E05A;
      --color-green-dim:      #00C44F;
      --color-green-bg:       #E8FFF1;
      --color-text-primary:   #0F0F0E;
      --color-text-secondary: #6B6966;
      --color-text-tertiary:  #A8A49F;
      --color-text-inverse:   #FFFFFF;
      --color-border:         #E8E6E2;
      --color-danger:         #E8453C;
      --color-danger-bg:      #FEF2F2;
      --radius-sm:   8px;
      --radius-md:   12px;
      --radius-lg:   16px;
      --radius-xl:   20px;
      --radius-full: 9999px;
      --shadow-card: 0 1px 4px rgba(0,0,0,0.05), 0 0 0 1px var(--color-border);
      --shadow-live: 0 0 0 2px var(--color-green);
    }

    html, body {
      height: 100%;
      background: var(--color-bg);
      font-family: 'Geist', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--color-text-primary);
    }

    /* ── Dot pattern background ── */
    .page {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      padding-bottom: 90px;
      position: relative;
    }
    .page::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #C8C5C0 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
      padding-top: 72px;
    }

    /* ── Header ── */
    .header {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: 56px;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
    }
    .header-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--color-green);
      display: flex; align-items: center; justify-content: center;
      font: 700 0.9rem/1 'Geist';
      color: var(--color-dark);
      cursor: pointer;
      overflow: hidden;
      flex-shrink: 0;
    }
    .header-logo {
      font: italic 900 1.45rem/1 'Geist';
      letter-spacing: -0.03em;
      text-transform: uppercase;
      color: var(--color-text-primary);
    }
    .header-logo span { color: var(--color-green); }
    .header-pts {
      background: var(--color-dark);
      color: var(--color-text-inverse);
      padding: 7px 13px;
      border-radius: var(--radius-full);
      font: 700 0.78rem/1 'Geist';
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .header-pts-val { color: var(--color-green); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.85); }
    }
    .anim { opacity: 0; animation: fadeUp 320ms ease-out forwards; }
    .anim-1 { animation-delay: 40ms; }
    .anim-2 { animation-delay: 100ms; }
    .anim-3 { animation-delay: 160ms; }
    .anim-4 { animation-delay: 220ms; }
    .anim-5 { animation-delay: 280ms; }

    /* ── Hero titre ── */
    .hero-title {
      padding: 24px 16px 20px;
    }
    .hero-title h1 {
      font: italic 900 3rem/0.95 'Geist';
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: var(--color-text-primary);
      margin-bottom: 8px;
    }
    .hero-live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--color-green);
      color: var(--color-dark);
      padding: 5px 10px 5px 8px;
      border-radius: var(--radius-full);
      font: 700 0.72rem/1 'Geist';
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--color-dark);
      animation: livePulse 1.4s ease-in-out infinite;
    }

    /* ── Section label ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font: 700 0.62rem/1 'Geist';
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-secondary);
      padding: 0 16px;
      margin-bottom: 12px;
    }
    .section-label::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--color-green);
      flex-shrink: 0;
    }

    /* ── Section spacing ── */
    .matches-live-section  { margin-bottom: 28px; }
    .upcoming-section      { margin-bottom: 28px; }
    .defi-section          { margin-bottom: 28px; }
    .actu-section          { margin-bottom: 28px; }

    /* ── Carousel live ── */
    .matches-live-scroll {
      display: flex;
      gap: 10px;
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
    }
    .matches-live-scroll::-webkit-scrollbar { display: none; }

    .match-live-card {
      flex-shrink: 0;
      width: calc(100vw - 48px);
      max-width: 382px;
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      padding: 16px;
      box-shadow: var(--shadow-live);
      scroll-snap-align: start;
      cursor: pointer;
      transition: transform 150ms ease;
      position: relative;
      overflow: hidden;
    }
    .match-live-card:active { transform: scale(0.98); }
    .match-live-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--color-green);
      border-radius: 20px 20px 0 0;
    }
    .match-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .match-phase {
      font: 500 0.6rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-secondary);
    }
    .match-minute-badge {
      background: var(--color-green);
      color: var(--color-dark);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font: 700 0.72rem/1 'Geist';
    }
    .match-score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 14px;
    }
    .match-team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .match-team-flag  { font-size: 2rem; line-height: 1; }
    .match-team-code  {
      font: 700 0.78rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-secondary);
    }
    .match-score {
      font: italic 900 3rem/1 'Geist';
      letter-spacing: -0.04em;
      color: var(--color-text-primary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Prono banner */
    .prono-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      margin-top: 4px;
    }
    .prono-banner--live   { background: var(--color-green-bg); border: 1.5px solid var(--color-green); }
    .prono-banner--danger { background: var(--color-danger-bg); border: 1.5px solid var(--color-danger); }
    .prono-banner--none   { background: #F7F6F4; border: 1.5px solid var(--color-border); }
    .prono-banner-left    { display: flex; align-items: center; gap: 7px; }
    .prono-banner-dot     { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .prono-banner--live   .prono-banner-dot    { background: var(--color-green); }
    .prono-banner--danger .prono-banner-dot    { background: var(--color-danger); }
    .prono-banner--none   .prono-banner-dot    { background: var(--color-text-tertiary); }
    .prono-banner-status  { font: 700 0.68rem/1 'Geist'; text-transform: uppercase; letter-spacing: 0.06em; }
    .prono-banner--live   .prono-banner-status { color: var(--color-green-dim); }
    .prono-banner--danger .prono-banner-status { color: var(--color-danger); }
    .prono-banner--none   .prono-banner-status { color: var(--color-text-secondary); }
    .prono-banner-score   { font: 700 0.78rem/1 'Geist'; color: var(--color-text-secondary); }
    .prono-banner-pts     { font: 700 0.72rem/1 'Geist'; color: var(--color-green-dim); }
    .prono-banner-cta     {
      font: 600 0.72rem/1 'Geist';
      color: var(--color-text-secondary);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      padding: 5px 10px;
      border-radius: var(--radius-full);
      text-decoration: none;
      cursor: pointer;
    }

    /* ── Empty state ── */
    .empty-live {
      text-align: center;
      padding: 40px 16px;
      color: var(--color-text-tertiary);
    }
    .empty-live-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-live p    { font: 400 0.88rem/1 'Geist'; }

    /* ── Prochains matchs ── */
    .match-upcoming-card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin: 0 16px 8px;
      box-shadow: var(--shadow-card);
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 150ms ease;
    }
    .match-upcoming-card:active { transform: scale(0.98); }
    .match-upcoming-team {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }
    .match-upcoming-team.right { justify-content: flex-end; }
    .match-upcoming-team-flag  { font-size: 1.5rem; line-height: 1; flex-shrink: 0; }
    .match-upcoming-team-name  {
      font: 700 0.78rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80px;
    }
    .match-upcoming-time-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
      min-width: 72px;
    }
    .match-upcoming-date {
      font: 600 0.55rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--color-text-secondary);
    }
    .match-upcoming-hour {
      font: 900 1.1rem/1 'Geist';
      color: var(--color-text-primary);
      letter-spacing: -0.02em;
    }
    .match-upcoming-prono-done {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--color-green);
      flex-shrink: 0;
    }

    /* ── Défi quotidien ── */
    .defi-card {
      background: var(--color-dark);
      border-radius: var(--radius-xl);
      padding: 20px 16px;
      margin: 0 16px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .defi-card::after {
      content: '⚡';
      position: absolute;
      right: -8px; top: -8px;
      font-size: 5rem;
      opacity: 0.06;
      line-height: 1;
      pointer-events: none;
    }
    .defi-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .defi-label {
      font: 700 0.6rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-green);
      display: flex; align-items: center; gap: 6px;
    }
    .defi-label::before {
      content: ''; width: 6px; height: 6px;
      border-radius: 50%; background: var(--color-green);
    }
    .defi-pts-badge {
      background: var(--color-green);
      color: var(--color-dark);
      padding: 5px 10px;
      border-radius: var(--radius-full);
      font: 700 0.72rem/1 'Geist';
    }
    .defi-question {
      font: 700 1.05rem/1.35 'Geist';
      color: var(--color-text-inverse);
      margin-bottom: 12px;
    }
    .defi-timer {
      display: flex; align-items: center; gap: 6px;
      font: 500 0.7rem/1 'Geist';
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
    }
    .defi-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .defi-option {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-md);
      padding: 12px 10px;
      font: 600 0.82rem/1.2 'Geist';
      color: var(--color-text-inverse);
      text-align: center;
      cursor: pointer;
      transition: background 150ms ease, border-color 150ms ease;
    }
    .defi-option:hover  { background: rgba(0,224,90,0.12); border-color: var(--color-green); }
    .defi-option:active { transform: scale(0.97); }
    .defi-option.correct { background: var(--color-green); border-color: var(--color-green); color: var(--color-dark); }
    .defi-option.wrong   { background: rgba(232,69,60,0.15); border-color: var(--color-danger); color: var(--color-danger); }
    .defi-option:disabled { pointer-events: none; }
    .defi-streak {
      display: flex; align-items: center; gap: 10px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .defi-streak-label {
      font: 500 0.62rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.4);
    }
    .defi-streak-dots  { display: flex; gap: 5px; }
    .defi-streak-dot   { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.15); }
    .defi-streak-dot.active { background: var(--color-green); }

    /* Défi non dispo */
    .defi-unavailable {
      text-align: center;
      padding: 28px 0 8px;
      color: rgba(255,255,255,0.35);
      font: 500 0.82rem/1 'Geist';
    }

    /* ── Actu Flash ── */
    .actu-card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin: 0 16px 8px;
      box-shadow: var(--shadow-card);
      border-left: 3px solid var(--color-danger);
      position: relative;
    }
    .actu-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--color-danger);
      color: white;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font: 700 0.62rem/1 'Geist';
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .actu-card--stats  { border-left-color: #00B4FF; }
    .actu-card--stats  .actu-badge { background: #00B4FF; }
    .actu-card--debrief { border-left-color: #B66DFF; }
    .actu-card--debrief .actu-badge { background: #B66DFF; }
    .actu-title {
      font: 700 0.92rem/1.3 'Geist';
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }
    .actu-desc {
      font: 400 0.82rem/1.4 'Geist';
      color: var(--color-text-secondary);
      margin-bottom: 8px;
    }
    .actu-desc strong { font: 700 0.82rem/1.4 'Geist'; color: var(--color-text-primary); }
    .actu-time {
      font: 400 0.68rem/1 'Geist';
      color: var(--color-text-tertiary);
    }

    /* ── Nav bottom ── */
    .nav-bottom {
      position: fixed;
      bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      height: 80px;
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: flex-start;
      padding: 10px 0 0;
      z-index: 100;
    }
    .nav-tab {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      cursor: pointer;
      text-decoration: none;
      padding: 2px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-tab-icon  { font-size: 1.35rem; line-height: 1; transition: transform 150ms ease; }
    .nav-tab:active .nav-tab-icon { transform: scale(0.88); }
    .nav-tab-label {
      font: 500 0.58rem/1 'Geist';
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--color-text-secondary);
    }
    .nav-tab.active .nav-tab-label { color: var(--color-green); font-weight: 700; }

    /* ── Skeleton loader ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #E8E6E2 25%, #F2F0EC 50%, #E8E6E2 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- ── [A] Header ── -->
    <header class="header">
      <div class="header-avatar" id="user-avatar" onclick="window.location.href='/src/pages/profil.html'">?</div>
      <div class="header-logo">FOOTZY<span>.</span></div>
      <div class="header-pts" id="score-pill"><span class="header-pts-val" id="pts-val">0</span> PTS</div>
    </header>

    <div class="content">

      <!-- ── [B] Hero titre ── -->
      <section class="hero-title anim anim-1">
        <h1>Aujourd'hui</h1>
        <div class="hero-live-badge" id="hero-live-badge" style="display:none">
          <span class="live-dot"></span>
          <span id="hero-live-count">0 match en direct</span>
        </div>
      </section>

      <!-- ── [C] Matchs en direct ── -->
      <section class="matches-live-section anim anim-2" id="live-section">
        <div class="section-label">Matchs en direct</div>
        <div class="matches-live-scroll" id="live-scroll">
          <div class="match-live-card" style="display:flex;align-items:center;justify-content:center;min-height:160px">
            <div style="text-align:center">
              <div class="skeleton" style="width:48px;height:48px;border-radius:50%;margin:0 auto 12px"></div>
              <div class="skeleton" style="width:120px;height:12px;margin:0 auto"></div>
            </div>
          </div>
        </div>
      </section>

      <!-- ── [D] Prochains matchs ── -->
      <section class="upcoming-section anim anim-3" id="upcoming-section">
        <div class="section-label">Prochains matchs</div>
        <div id="upcoming-list">
          <div class="match-upcoming-card"><div class="skeleton" style="width:100%;height:20px"></div></div>
          <div class="match-upcoming-card"><div class="skeleton" style="width:100%;height:20px"></div></div>
        </div>
      </section>

      <!-- ── [E] Défi quotidien ── -->
      <section class="defi-section anim anim-4">
        <div class="section-label">Défi quotidien</div>
        <div class="defi-card" id="defi-card">
          <div class="defi-card-top">
            <span class="defi-label">Question du jour</span>
            <span class="defi-pts-badge">+50 PTS</span>
          </div>
          <div class="defi-question" id="defi-question">Chargement…</div>
          <div class="defi-timer" id="defi-timer">⏱ 30 secondes pour répondre</div>
          <div class="defi-options" id="defi-options"></div>
          <div class="defi-streak" id="defi-streak" style="display:none">
            <span class="defi-streak-label">Streak</span>
            <div class="defi-streak-dots" id="defi-streak-dots"></div>
          </div>
        </div>
      </section>

      <!-- ── [F] Actu Flash ── -->
      <section class="actu-section anim anim-5">
        <div class="section-label">Actu Flash</div>
        <div id="actu-list">
          <div style="margin:0 16px"><div class="skeleton" style="height:80px;border-radius:16px;margin-bottom:8px"></div></div>
          <div style="margin:0 16px"><div class="skeleton" style="height:80px;border-radius:16px"></div></div>
        </div>
      </section>

    </div>

    <!-- ── [G] Nav bottom ── -->
    <nav class="nav-bottom">
      <a href="/src/pages/accueil.html" class="nav-tab active" aria-current="page">
        <span class="nav-tab-icon">🏠</span>
        <span class="nav-tab-label">Accueil</span>
      </a>
      <a href="/src/pages/home.html" class="nav-tab">
        <span class="nav-tab-icon">⚽</span>
        <span class="nav-tab-label">Matchs</span>
      </a>
      <a href="/src/pages/oracle.html" class="nav-tab">
        <span class="nav-tab-icon">🔮</span>
        <span class="nav-tab-label">Oracle</span>
      </a>
      <a href="/src/pages/groupe.html" class="nav-tab">
        <span class="nav-tab-icon">👥</span>
        <span class="nav-tab-label">Groupe</span>
      </a>
      <a href="/src/pages/profil.html" class="nav-tab">
        <span class="nav-tab-icon">🪪</span>
        <span class="nav-tab-label">Profil</span>
      </a>
    </nav>

  </div>

  <script type="module">
    import { supabase, requireAuth, getCurrentProfile } from '/src/js/lib/supabase.js';
    import { formatTime, formatKickoff } from '/src/js/lib/utils.js';

    const user    = await requireAuth();
    if (!user) throw new Error('not authed');
    const profile = await getCurrentProfile();

    // ── Profil incomplet → auto-pseudo ──
    if (!profile?.pseudo) {
      const rawName  = user.user_metadata?.full_name || user.user_metadata?.name || user.email?.split('@')[0] || 'User';
      const basePseudo = rawName.replace(/\s+/g, '').replace(/[^a-zA-Z0-9_\-\.]/g, '').slice(0, 18) || 'User';
      let pseudo = basePseudo.length >= 3 ? basePseudo : 'User' + basePseudo;
      let counter = 1;
      while (true) {
        const { data: ex } = await supabase.from('profiles').select('id').eq('pseudo', pseudo).maybeSingle();
        if (!ex) break;
        pseudo = basePseudo.slice(0, 15) + counter++;
      }
      if (profile) {
        await supabase.from('profiles').update({ pseudo }).eq('id', user.id);
      } else {
        await supabase.from('profiles').insert({ id: user.id, pseudo, points_totaux: 0, plan: 'free' });
      }
      window.location.reload();
    }

    // ── Header ──
    if (profile) {
      const av = document.getElementById('user-avatar');
      if (profile.avatar_url) {
        av.innerHTML = `<img src="${profile.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      } else {
        av.textContent = (profile.pseudo?.[0] || '?').toUpperCase();
      }
      document.getElementById('pts-val').textContent = (profile.points_totaux || 0).toLocaleString('fr-FR');
    }

    // ── Phase label ──
    function phaseLabel(m) {
      if (m.phase === 'groupes') return `Groupe ${m.groupe || ''}`;
      if (m.groupe === 'UCL')    return 'Finale UCL';
      const L = { huitiemes: '1/8', quarts: 'Quart', demis: 'Demi', finale: 'Finale' };
      return L[m.phase] || m.phase || '';
    }

    // ── Time ago ──
    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1)  return 'à l\'instant';
      if (m < 60) return `il y a ${m}min`;
      const h = Math.floor(m / 60);
      if (h < 24) return `il y a ${h}h`;
      return `il y a ${Math.floor(h / 24)}j`;
    }

    // ─────────────────────────────────────────
    // [C] MATCHS EN DIRECT
    // ─────────────────────────────────────────
    async function loadLive() {
      const { data: matches } = await supabase
        .from('matchs')
        .select('*')
        .in('status', ['live', 'halftime'])
        .order('kickoff_at');

      const scroll     = document.getElementById('live-scroll');
      const heroBadge  = document.getElementById('hero-live-badge');
      const heroCount  = document.getElementById('hero-live-count');
      const liveSection = document.getElementById('live-section');

      if (!matches?.length) {
        liveSection.style.display = 'none';
        heroBadge.style.display   = 'none';
        return;
      }

      liveSection.style.display = '';
      heroBadge.style.display   = 'inline-flex';
      heroCount.textContent     = `${matches.length} match${matches.length > 1 ? 's' : ''} en direct`;

      // Fetch my pronos for these live matches
      const matchIds = matches.map(m => m.id);
      const { data: myPronos } = await supabase
        .from('pronostics')
        .select('match_id, home_score, away_score, status, points')
        .eq('user_id', user.id)
        .in('match_id', matchIds);
      const pronosMap = {};
      myPronos?.forEach(p => { pronosMap[p.match_id] = p; });

      scroll.innerHTML = matches.map(m => {
        const phase = phaseLabel(m);
        const prono = pronosMap[m.id];

        let bannerHTML = '';
        if (prono) {
          const hs = m.home_score ?? 0, as = m.away_score ?? 0;
          const ph = prono.home_score, pa = prono.away_score;
          const exact    = ph === hs && pa === as;
          const liveWin  = (hs > as && ph > pa) || (as > hs && pa > ph) || (hs === as && ph === pa);
          const cls      = exact || liveWin ? 'prono-banner--live' : 'prono-banner--danger';
          const label    = exact ? 'Score exact en cours' : liveWin ? 'En vie' : 'Compromis';
          bannerHTML = `
            <div class="prono-banner ${cls}">
              <div class="prono-banner-left">
                <span class="prono-banner-dot"></span>
                <span class="prono-banner-status">${label}</span>
              </div>
              <span class="prono-banner-score">${ph}–${pa}</span>
            </div>`;
        } else {
          bannerHTML = `
            <div class="prono-banner prono-banner--none">
              <div class="prono-banner-left">
                <span class="prono-banner-dot"></span>
                <span class="prono-banner-status">Pas de pronostic</span>
              </div>
              <a class="prono-banner-cta" href="/src/pages/match.html?id=${m.id}">Pronostiquer →</a>
            </div>`;
        }

        return `
          <div class="match-live-card" onclick="window.location.href='/src/pages/match.html?id=${m.id}'">
            <div class="match-card-top">
              <span class="match-phase">${phase}</span>
              <span class="match-minute-badge">${m.minute ? m.minute + "'" : 'LIVE'}</span>
            </div>
            <div class="match-score-row">
              <div class="match-team">
                <span class="match-team-flag">${m.home_flag || ''}</span>
                <span class="match-team-code">${m.home_team?.slice(0, 3).toUpperCase() || ''}</span>
              </div>
              <span class="match-score" aria-live="polite">${m.home_score ?? 0}–${m.away_score ?? 0}</span>
              <div class="match-team">
                <span class="match-team-flag">${m.away_flag || ''}</span>
                <span class="match-team-code">${m.away_team?.slice(0, 3).toUpperCase() || ''}</span>
              </div>
            </div>
            ${bannerHTML}
          </div>`;
      }).join('');
    }

    // ── Nom d'équipe court pour affichage compact ──
    function shortName(name) {
      if (!name) return '';
      const n = name.toUpperCase().trim();
      const map = {
        'PARIS SAINT-GERMAIN': 'PSG',   'PARIS SG': 'PSG',
        'AFRIQUE DU SUD': 'AFR. SUD',   'CORÉE DU SUD': 'CORÉE S.',
        'BOSNIE-HERZÉGOVINE': 'BOSNIE', 'ÉTATS-UNIS': 'USA',
        'ARABIE SAOUDITE': 'ARABIE S.', 'NOUVELLE-ZÉLANDE': 'N. ZÉL.',
        'COSTA RICA': 'C. RICA',        'RÉP. TCHÈQUE': 'TCHÈQUE',
        'BURKINA FASO': 'B. FASO',      'CÔTE D\'IVOIRE': 'CIV',
        'SIERRA LEONE': 'S. LEONE',     'PAYS-BAS': 'P.-BAS',
        'GUINÉE ÉQUATORIALE': 'GUI. EQ.','GUINÉE-BISSAU': 'GUI.-B.',
        'TRINIDAD ET TOBAGO': 'TRI.',    'SAINT-KITTS': 'SKN',
        'EL SALVADOR': 'EL SALV.',      'RÉP. DOMINICAINE': 'DOM.',
        'CORÉE DU NORD': 'CORÉE N.',    'HONG KONG': 'HKG',
        'ARABIE SAOUDITE': 'ARA. SOUD', 'ÉMIRATS ARABES UNIS': 'EAU',
        'IRISH': 'IRL',                  'NORTHERN IRELAND': 'NIR',
      };
      return map[n] || (n.length > 8 ? n.slice(0, 3) : n);
    }

    // ─────────────────────────────────────────
    // [D] PROCHAINS MATCHS
    // ─────────────────────────────────────────
    async function loadUpcoming() {
      const now = new Date().toISOString();
      const { data: matches } = await supabase
        .from('matchs')
        .select('id, home_team, away_team, home_flag, away_flag, kickoff_at, phase, groupe')
        .eq('status', 'scheduled')
        .gt('kickoff_at', now)
        .order('kickoff_at')
        .limit(5);

      const list    = document.getElementById('upcoming-list');
      const section = document.getElementById('upcoming-section');

      if (!matches?.length) {
        section.style.display = 'none';
        return;
      }

      // Fetch done pronos
      const matchIds = matches.map(m => m.id);
      const { data: donePronos } = await supabase
        .from('pronostics')
        .select('match_id')
        .eq('user_id', user.id)
        .in('match_id', matchIds);
      const doneSet = new Set(donePronos?.map(p => p.match_id) || []);

      list.innerHTML = matches.map(m => {
        const d     = new Date(m.kickoff_at);
        const today = new Date();
        const isToday = d.toDateString() === today.toDateString();
        const tom     = new Date(today); tom.setDate(today.getDate() + 1);
        const isTom   = d.toDateString() === tom.toDateString();
        const dayLabel = isToday ? 'Aujourd\'hui' : isTom ? 'Demain' : d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
        const hour  = d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        const done  = doneSet.has(m.id);

        return `
          <div class="match-upcoming-card" onclick="window.location.href='/src/pages/match.html?id=${m.id}'">
            <div class="match-upcoming-team">
              <span class="match-upcoming-team-flag">${m.home_flag || ''}</span>
              <span class="match-upcoming-team-name">${shortName(m.home_team)}</span>
            </div>
            <div class="match-upcoming-time-block">
              <span class="match-upcoming-date">${dayLabel}</span>
              <span class="match-upcoming-hour">${hour}</span>
              ${done ? '<span style="width:6px;height:6px;border-radius:50%;background:var(--color-green);display:block;margin-top:3px"></span>' : ''}
            </div>
            <div class="match-upcoming-team right">
              <span class="match-upcoming-team-name">${shortName(m.away_team)}</span>
              <span class="match-upcoming-team-flag">${m.away_flag || ''}</span>
            </div>
          </div>`;
      }).join('');
    }

    // ─────────────────────────────────────────
    // [E] DÉFI QUOTIDIEN
    // ─────────────────────────────────────────
    let defiAnswered  = false;
    let defiSeconds   = 30;
    let defiInterval  = null;

    function startDefiTimer() {
      const timerEl = document.getElementById('defi-timer');
      defiInterval = setInterval(() => {
        defiSeconds--;
        if (timerEl) timerEl.textContent = `⏱ ${defiSeconds} secondes pour répondre`;
        if (defiSeconds <= 0) {
          clearInterval(defiInterval);
          if (!defiAnswered) {
            if (timerEl) timerEl.textContent = 'Temps écoulé !';
            document.querySelectorAll('.defi-option').forEach(o => o.setAttribute('disabled', ''));
          }
        }
      }, 1000);
    }

    window.selectDefi = function(el, isCorrect, defiId) {
      if (defiAnswered) return;
      defiAnswered = true;
      clearInterval(defiInterval);

      document.querySelectorAll('.defi-option').forEach(o => o.setAttribute('disabled', ''));

      const timerEl = document.getElementById('defi-timer');
      if (isCorrect) {
        el.classList.add('correct');
        if (timerEl) timerEl.textContent = '✅ Bonne réponse ! +50 pts';
        if (navigator.vibrate) navigator.vibrate([30, 20, 60]);
        // Save to supabase
        supabase.from('defi_responses').upsert(
          { user_id: user.id, defi_id: defiId, correct: true },
          { onConflict: 'user_id,defi_id' }
        ).then(() => {
          supabase.from('profiles').update({ points_totaux: (profile?.points_totaux || 0) + 50 }).eq('id', user.id);
        });
      } else {
        el.classList.add('wrong');
        document.querySelectorAll('.defi-option').forEach(o => {
          if (o.dataset.correct === 'true') o.classList.add('correct');
        });
        if (timerEl) timerEl.textContent = '❌ Raté — bonne chance demain !';
        if (navigator.vibrate) navigator.vibrate(60);
        supabase.from('defi_responses').upsert(
          { user_id: user.id, defi_id: defiId, correct: false },
          { onConflict: 'user_id,defi_id' }
        );
      }
    };

    async function loadDefi() {
      const today = new Date().toISOString().slice(0, 10);
      const { data: defi } = await supabase
        .from('defis_quotidiens')
        .select('*')
        .eq('date', today)
        .maybeSingle();

      const card    = document.getElementById('defi-card');
      const qEl     = document.getElementById('defi-question');
      const optsEl  = document.getElementById('defi-options');
      const timerEl = document.getElementById('defi-timer');
      const strEl   = document.getElementById('defi-streak');

      // Streak dots
      const streak = profile?.streak_quotidien || 0;
      if (streak > 0) {
        strEl.style.display = 'flex';
        const dotsEl = document.getElementById('defi-streak-dots');
        dotsEl.innerHTML = Array.from({ length: 7 }, (_, i) =>
          `<span class="defi-streak-dot${i < streak ? ' active' : ''}"></span>`
        ).join('');
      }

      const now = new Date();
      const noonToday = new Date(now.toDateString() + ' 12:00');

      if (!defi) {
        if (now < noonToday) {
          qEl.textContent = 'Disponible à 12:00';
          timerEl.style.display = 'none';
          optsEl.innerHTML = '<div class="defi-unavailable">La question du jour arrive à midi !</div>';
        } else {
          qEl.textContent = 'Aucun défi aujourd\'hui.';
          timerEl.style.display = 'none';
          optsEl.innerHTML = '';
        }
        return;
      }

      // Check if already answered
      const { data: myResponse } = await supabase
        .from('defi_responses')
        .select('correct')
        .eq('user_id', user.id)
        .eq('defi_id', defi.id)
        .maybeSingle();

      qEl.textContent = defi.question || 'Question du jour';

      const options = defi.options || [];
      optsEl.innerHTML = options.map(opt => {
        const isCorrect = opt === defi.correct_answer;
        return `<button class="defi-option${myResponse ? (isCorrect ? ' correct' : ' wrong') : ''}"
          data-correct="${isCorrect}"
          onclick="selectDefi(this, ${isCorrect}, '${defi.id}')"
          ${myResponse ? 'disabled' : ''}
        >${opt}</button>`;
      }).join('');

      if (myResponse) {
        defiAnswered = true;
        timerEl.textContent = myResponse.correct ? '✅ Tu as déjà répondu aujourd\'hui' : '❌ Tu as déjà répondu aujourd\'hui';
      } else if (now >= noonToday) {
        startDefiTimer();
      } else {
        timerEl.textContent = 'Disponible à 12:00';
        optsEl.querySelectorAll('.defi-option').forEach(o => o.setAttribute('disabled', ''));
      }
    }

    // ─────────────────────────────────────────
    // [F] ACTU FLASH
    // ─────────────────────────────────────────
    function buildAutoActu(matches, allGroupMatches) {
      const now      = new Date();
      const auto     = [];
      const live     = matches.filter(m => m.status === 'live' || m.status === 'halftime');
      const finished = matches.filter(m => m.status === 'finished');
      const today    = matches.filter(m => {
        if (m.status !== 'scheduled') return false;
        return new Date(m.kickoff_at).toDateString() === now.toDateString();
      });
      const soon = matches.filter(m => {
        if (m.status !== 'scheduled') return false;
        const diff = new Date(m.kickoff_at) - now;
        return diff > 0 && diff < 3 * 3600 * 1000;
      });

      // Imminents
      for (const m of soon) {
        const mins  = Math.round((new Date(m.kickoff_at) - now) / 60000);
        const delay = mins < 60 ? `dans ${mins} min` : `dans ${Math.round(mins / 60)}h`;
        auto.push({ type: 'flash', emoji: '⏰', titre: `${m.home_flag} ${m.home_team} vs ${m.away_team} ${m.away_flag} — ${delay}`, contenu: `Coup d'envoi ${delay} · ${phaseLabel(m)}`, created_at: now.toISOString() });
      }

      // Programme du jour (> 3h)
      const todayOther = today.filter(m => new Date(m.kickoff_at) - now >= 3 * 3600 * 1000);
      if (todayOther.length) {
        const lines = todayOther.map(m =>
          `${m.home_flag} <strong>${m.home_team}</strong> vs <strong>${m.away_team}</strong> ${m.away_flag} · ${new Date(m.kickoff_at).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' })} · ${phaseLabel(m)}`
        ).join('<br>');
        auto.push({ type: 'flash', emoji: '📅', titre: `${todayOther.length} match${todayOther.length > 1 ? 's' : ''} aujourd'hui`, contenu: lines, created_at: now.toISOString() });
      }

      // Résultats récents
      const recent = finished.filter(m => now - new Date(m.kickoff_at) < 24 * 3600 * 1000);
      for (const m of recent.slice(-4).reverse()) {
        const winner = m.home_score > m.away_score ? m.home_team : m.away_score > m.home_score ? m.away_team : null;
        const ctx    = winner ? `<strong>${winner}</strong> s'impose !` : `Match nul.`;
        auto.push({ type: 'debrief', emoji: '📊', titre: `${m.home_flag} ${m.home_team} ${m.home_score}–${m.away_score} ${m.away_team} ${m.away_flag}`, contenu: `Résultat final · ${phaseLabel(m)}. ${ctx}`, created_at: m.updated_at || m.kickoff_at });
      }

      return auto;
    }

    async function loadActu() {
      const list = document.getElementById('actu-list');
      const from = new Date(); from.setDate(from.getDate() - 1);
      const to   = new Date(); to.setDate(to.getDate() + 2);

      try {
        const [matchesRes, postsRes] = await Promise.all([
          supabase.from('matchs').select('*')
            .gte('kickoff_at', from.toISOString())
            .lte('kickoff_at', to.toISOString())
            .order('kickoff_at'),
          supabase.from('actualite_posts').select('*')
            .order('is_pinned', { ascending: false })
            .order('created_at', { ascending: false })
            .limit(8),
        ]);

        const auto   = buildAutoActu(matchesRes.data || [], []);
        const manual = (postsRes.data || []);
        const all    = [...auto, ...manual];

        if (!all.length) {
          list.innerHTML = `<div style="text-align:center;padding:40px 16px;color:var(--color-text-tertiary)"><div style="font-size:2rem;margin-bottom:12px">📰</div><div>Aucune actu pour l'instant</div></div>`;
          return;
        }

        const TYPE_META = {
          flash:   { label: '⚡ Actu Flash', cls: '' },
          stats:   { label: '📊 Stats',      cls: 'actu-card--stats' },
          debrief: { label: '🎙️ Débrief',    cls: 'actu-card--debrief' },
        };

        list.innerHTML = all.slice(0, 8).map(p => {
          const meta = TYPE_META[p.type] || TYPE_META.flash;
          return `
            <div class="actu-card ${meta.cls}">
              <div class="actu-badge">${meta.label}</div>
              <div class="actu-title">${p.emoji ? p.emoji + ' ' : ''}${p.titre || ''}</div>
              <div class="actu-desc">${p.contenu || ''}</div>
              <div class="actu-time">${timeAgo(p.created_at)}</div>
            </div>`;
        }).join('');
      } catch(e) {
        console.warn('Actu load failed silently', e);
      }
    }

    // ─────────────────────────────────────────
    // INIT — load all sections in parallel
    // ─────────────────────────────────────────
    await Promise.all([loadLive(), loadUpcoming(), loadDefi(), loadActu()]);

    // Polling live toutes les 60s
    setInterval(loadLive, 60_000);
  </script>
