<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Footzy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #0F0F0E !important;
      min-height: 100vh; min-height: 100dvh;
    }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px calc(40px + env(safe-area-inset-bottom));
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #fff;
    }

    .wrap { width: 100%; max-width: 360px; display: flex; flex-direction: column; }

    /* ── Brand ── */
    .brand { text-align: center; margin-bottom: 40px; }
    .logo  {
      font-size: 42px; font-weight: 900; letter-spacing: -0.04em;
      color: #fff; line-height: 1;
    }
    .logo b { color: #00E05A; }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 12px;
      background: rgba(0,224,90,0.12);
      border: 1px solid rgba(0,224,90,0.25);
      border-radius: 50px; padding: 5px 14px;
      font-size: 13px; font-weight: 700; color: #00E05A;
    }
    .tagline { margin-top: 8px; font-size: 13px; color: rgba(255,255,255,0.32); }

    /* ── SSO ── */
    .sso {
      width: 100%; height: 56px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-size: 15px; font-weight: 700; letter-spacing: -0.01em;
      cursor: pointer; border: none;
      transition: opacity .15s, transform .1s;
      margin-bottom: 12px;
    }
    .sso:active { opacity: 0.82; transform: scale(0.98); }
    .sso:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .sso--google { background: #fff; color: #1F1F1F; }
    .sso--apple  { background: #050505; color: #fff; border: 1px solid #2a2a2a; }

    /* ── Separator ── */
    .sep {
      display: flex; align-items: center; gap: 12px;
      margin: 18px 0 16px;
    }
    .sep::before, .sep::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .sep span {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(255,255,255,0.22);
      white-space: nowrap;
    }

    /* ── Inputs ── */
    .inp {
      width: 100%; height: 50px;
      background: #1C1C1A;
      border: 1.5px solid #2E2E2C;
      border-radius: 13px; color: #fff;
      font-size: 15px; padding: 0 15px;
      outline: none; font-family: inherit;
      transition: border-color .15s;
      margin-bottom: 9px;
    }
    .inp::placeholder { color: rgba(255,255,255,0.28); }
    .inp:focus        { border-color: #00E05A; }

    /* ── Email submit ── */
    .email-btn {
      width: 100%; height: 50px;
      background: #1C1C1A; border: 1.5px solid #2E2E2C;
      border-radius: 13px; color: rgba(255,255,255,0.75);
      font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background .15s, transform .1s;
      font-family: inherit; letter-spacing: -0.01em;
    }
    .email-btn:hover   { background: #252523; }
    .email-btn:active  { transform: scale(0.98); }
    .email-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Footer ── */
    .foot {
      margin-top: 16px; text-align: center;
      font-size: 13px; color: rgba(255,255,255,0.32);
    }
    .foot button {
      background: none; border: none; cursor: pointer;
      color: #00E05A; font-weight: 700;
      font-size: 13px; font-family: inherit;
    }

    .err {
      color: #FF6B6B; font-size: 13px;
      text-align: center; margin-bottom: 10px;
      display: none; line-height: 1.4;
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Brand -->
  <div class="brand">
    <div class="logo">Footzy<b>.</b></div>
    <div class="pill">🏆 CdM 2026</div>
    <div class="tagline">Pronostiques · Groupes · Classements</div>
  </div>

  <!-- Google -->
  <button class="sso sso--google" id="google-btn">
    <svg width="20" height="20" viewBox="0 0 18 18" aria-hidden="true">
      <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
      <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
      <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>
    </svg>
    Continuer avec Google
  </button>

  <!-- Separator -->
  <div class="sep"><span>ou par email</span></div>

  <!-- Error -->
  <div id="err" class="err"></div>

  <!-- Pseudo (register only) -->
  <div id="pseudo-wrap" style="display:none">
    <input class="inp" id="inp-pseudo" type="text"
           placeholder="Pseudo (ex: ZidaneOG)" minlength="3" maxlength="20"
           autocomplete="username" autocapitalize="none" />
  </div>

  <input class="inp" id="inp-email"    type="email"    placeholder="Adresse email"    autocomplete="email" />
  <input class="inp" id="inp-password" type="password" placeholder="Mot de passe"     autocomplete="current-password" />

  <button class="email-btn" id="email-btn">Se connecter</button>

  <div class="foot" id="foot">
    Pas de compte ? <button id="switch-btn">S'inscrire</button>
  </div>

</div>

<script type="module">
  import { supabase } from '/src/js/lib/supabase.js';

  const CALLBACK = window.location.origin + '/src/pages/auth-callback.html';

  // Redirect if already authed
  const { data: { session } } = await supabase.auth.getSession();
  if (session) { window.location.href = '/src/pages/accueil.html'; }

  // Open in register mode if ?mode=register
  let mode = new URLSearchParams(location.search).get('mode') === 'register' ? 'register' : 'login';
  if (mode === 'register') applyMode();

  // ── Google ──
  document.getElementById('google-btn').addEventListener('click', async (e) => {
    e.currentTarget.disabled = true;
    await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: CALLBACK, queryParams: { prompt: 'select_account' } }
    });
  });

  // ── Toggle mode ──
  function applyMode() {
    const isReg = mode === 'register';
    document.getElementById('pseudo-wrap').style.display         = isReg ? '' : 'none';
    document.getElementById('inp-password').autocomplete         = isReg ? 'new-password' : 'current-password';
    document.getElementById('inp-password').placeholder          = isReg ? 'Mot de passe (8 car. min)' : 'Mot de passe';
    document.getElementById('email-btn').textContent             = isReg ? 'Créer mon compte' : 'Se connecter';
    document.getElementById('foot').innerHTML = isReg
      ? 'Déjà un compte ? <button id="switch-btn">Se connecter</button>'
      : 'Pas de compte ? <button id="switch-btn">S\'inscrire</button>';
    document.getElementById('switch-btn').addEventListener('click', () => {
      mode = mode === 'login' ? 'register' : 'login';
      document.getElementById('err').style.display = 'none';
      applyMode();
    });
  }
  document.getElementById('switch-btn').addEventListener('click', () => {
    mode = 'register'; applyMode();
  });

  // ── Email submit ──
  document.getElementById('email-btn').addEventListener('click', async () => {
    const email    = document.getElementById('inp-email').value.trim();
    const password = document.getElementById('inp-password').value;
    const pseudo   = document.getElementById('inp-pseudo').value.trim();
    const errEl    = document.getElementById('err');
    const btn      = document.getElementById('email-btn');
    errEl.style.display = 'none';

    if (!email || !password) {
      errEl.textContent = 'Remplis l\'email et le mot de passe.';
      errEl.style.display = 'block'; return;
    }

    btn.disabled = true; btn.textContent = '…';

    if (mode === 'register') {
      if (!pseudo || pseudo.length < 3) {
        errEl.textContent = 'Pseudo trop court (3 car. min).';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Créer mon compte'; return;
      }
      const { data: ex } = await supabase.from('profiles').select('id').eq('pseudo', pseudo).maybeSingle();
      if (ex) {
        errEl.textContent = 'Ce pseudo est déjà pris.';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Créer mon compte'; return;
      }
      const { data, error } = await supabase.auth.signUp({
        email, password, options: { data: { pseudo } }
      });
      if (error) {
        errEl.textContent = error.message;
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Créer mon compte'; return;
      }
      if (data.user) {
        await supabase.from('profiles').upsert(
          { id: data.user.id, pseudo, points_totaux: 0, plan: 'free' },
          { onConflict: 'id' }
        );
        window.location.href = '/src/pages/onboarding.html';
      }
    } else {
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = 'Email ou mot de passe incorrect.';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Se connecter'; return;
      }
      window.location.href = '/src/pages/accueil.html';
    }
  });
</script>
</body>
</html>
