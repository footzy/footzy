<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Footzy — Accueil</title>
  <link rel="stylesheet" href="/src/css/tokens.css" />
  <link rel="stylesheet" href="/src/css/components.css" />
  <link rel="stylesheet" href="/src/css/fz-components.css" />
  <link rel="stylesheet" href="/src/css/pages.css" />
  <style>
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    /* ── FAB (+) ── */
    #fab-post {
      position: fixed;
      /* Sit above nav + iPhone home indicator */
      bottom: calc(72px + env(safe-area-inset-bottom));
      right: max(20px, env(safe-area-inset-right));
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--green-accent);
      color: #080808;
      font-size: 28px;
      font-weight: 300;
      line-height: 1;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(0,224,90,0.40), 0 2px 8px rgba(0,0,0,0.15);
      cursor: pointer;
      z-index: 99;
      transition: transform 0.15s, box-shadow 0.15s;
      border: none;
      /* Prevent text selection on tap */
      user-select: none;
      -webkit-user-select: none;
    }
    #fab-post:active { transform: scale(0.90); box-shadow: 0 2px 10px rgba(0,224,90,0.2); }

    /* ── Feed card ── */
    .feed-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow-xs);
      overflow: hidden;
    }
    .feed-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
    }
    .feed-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--fg-on-dark);
      flex-shrink: 0;
    }
    .feed-user-info { flex: 1; min-width: 0; }
    .feed-pseudo {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--fg);
    }
    .feed-plan-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-weight: 800;
      color: var(--accent-strong);
      background: var(--accent-soft);
      border-radius: var(--r-pill);
      padding: 2px 8px;
      margin-top: 3px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .feed-status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 50px;
      flex-shrink: 0;
    }
    .feed-status-badge.won   { background: var(--green-dim); color: var(--green-accent); border: 1px solid var(--green-border); }
    .feed-status-badge.exact { background: rgba(255,215,0,0.1); color: var(--gold); border: 1px solid rgba(255,215,0,0.25); }
    .feed-status-badge.lost  { background: rgba(255,68,68,0.08); color: var(--danger); border: 1px solid rgba(255,68,68,0.18); }

    .feed-match-info {
      padding: 0 16px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .feed-match-flags { font-size: 20px; flex-shrink: 0; }
    .feed-match-name  { font-size: 13px; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
    .feed-match-date  { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }

    .feed-prono-display {
      margin: 0 16px 12px;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .feed-prono-team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
    }
    .feed-prono-team .flag { font-size: 24px; }
    .feed-prono-team .name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); }
    .feed-prono-score {
      font-size: 36px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .feed-prono-score .sep { font-size: 22px; opacity: 0.25; font-style: normal; font-weight: 400; }

    .feed-reactions {
      padding: 0 16px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .reaction-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 11px;
      background: var(--bg-card-2);
      border: 1px solid var(--border);
      border-radius: var(--r-pill);
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      cursor: pointer;
      transition: transform .15s, background .15s;
      user-select: none;
    }
    .reaction-btn .count { font-size: 12px; opacity: 0.8; font-weight: 600; }
    .reaction-btn.active { background: var(--accent-soft); border-color: var(--accent); }
    .reaction-btn.active .count { color: var(--accent-strong); }
    .reaction-btn:active { transform: scale(0.92); }

    /* ── Delete button on own cards ── */
    .feed-delete-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,68,68,0.08);
      border: 1px solid rgba(255,68,68,0.18);
      color: var(--danger);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .feed-delete-btn:active { background: rgba(255,68,68,0.18); transform: scale(0.9); }

    /* ── War button ── */
    .war-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,140,0,0.08);
      border: 1px solid rgba(255,140,0,0.22);
      color: #FF8C00;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .war-btn:active { background: rgba(255,140,0,0.18); transform: scale(0.9); }

    /* ── War popup ── */
    @keyframes warSlideUp {
      from { transform: translateY(24px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .war-opt-btn:active { transform: scale(0.95) !important; }

    /* ── Post overlay sheet ── */
    .post-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      /* Prevent scroll-through on iOS */
      overscroll-behavior: none;
    }
    .post-sheet {
      background: var(--bg);
      border-radius: 28px 28px 0 0;
      width: 100%;
      max-width: 480px;
      max-height: calc(88vh - env(safe-area-inset-top));
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 0 calc(24px + env(safe-area-inset-bottom));
      animation: slideUp .32s cubic-bezier(.32,.72,0,1);
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.18);
    }
    .post-sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--border-strong);
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .post-sheet-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: sticky;
      top: 0;
      background: var(--bg-surface);
      color: var(--text-primary);
      z-index: 1;
      border-bottom: 1px solid var(--border);
    }
    .post-sheet-back {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 16px;
    }

    /* ── Match picker rows ── */
    .picker-match-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      /* Minimum touch target */
      min-height: 64px;
    }
    .picker-match-row:last-child { border-bottom: none; }
    .picker-match-row:active { background: var(--bg-muted); }
    .picker-flags      { font-size: 24px; flex-shrink: 0; letter-spacing: -2px; }
    .picker-teams      { flex: 1; min-width: 0; }
    .picker-teams-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }
    .picker-teams-date { font-size: 12px; color: var(--text-tertiary); margin-top: 3px; }
    .picker-arrow      { color: var(--text-tertiary); font-size: 18px; flex-shrink: 0; }

    /* ── Score stepper (in sheet) ── */
    .sheet-stepper-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 28px 16px 20px;
    }
    .sheet-stepper-team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .sheet-stepper-flag { font-size: 40px; }
    .sheet-stepper-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-tertiary); text-align: center; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sheet-stepper-ctrl { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .sheet-stepper-btn {
      /* Large tap target for mobile */
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }
    .sheet-stepper-btn:active { background: var(--green-dim); border-color: var(--green-border); transform: scale(0.92); }
    .sheet-stepper-val  { font-size: 56px; font-weight: 900; font-style: italic; letter-spacing: -0.03em; min-width: 52px; text-align: center; line-height: 1; color: var(--text-primary); }
    .sheet-score-sep    { font-size: 28px; font-weight: 400; opacity: 0.4; padding-top: 32px; flex-shrink: 0; color: var(--text-secondary); }

    /* ── Empty / placeholder states ── */
    .empty-state       { text-align: center; padding: 60px 24px 40px; color: var(--text-tertiary); }
    .empty-state .icon { font-size: 52px; margin-bottom: 14px; }
    .empty-state h3    { font-size: 16px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; }
    .empty-state p     { font-size: 13px; line-height: 1.7; }

    /* ── Actualité cards ── */
    .actu-card {
      border-radius: var(--r);
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-xs);
      padding: 16px 16px 14px 20px;
      position: relative;
    }
    .actu-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
    }
    /* Type colours */
    .actu-flash::before   { background: var(--live); }
    .actu-stats::before   { background: #00B4FF; }
    .actu-prono::before   { background: var(--accent); }
    .actu-debrief::before { background: #B66DFF; }
    .actu-question::before{ background: #FFB800; }

    .actu-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      border-radius: var(--r-pill);
      padding: 4px 9px;
      margin-bottom: 8px;
      color: var(--bg-dark);
    }
    .actu-flash    .actu-type-badge { background: var(--live); }
    .actu-stats    .actu-type-badge { background: #00B4FF; color: #fff; }
    .actu-prono    .actu-type-badge { background: var(--accent); }
    .actu-debrief  .actu-type-badge { background: #B66DFF; color: #fff; }
    .actu-question .actu-type-badge { background: #FFB800; }

    .actu-title  { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 6px; line-height: 1.35; color: var(--fg); }
    .actu-body   { font-size: 13px; color: var(--fg-muted); line-height: 1.65; }
    .actu-time   { font-size: 11px; color: var(--fg-faint); margin-top: 10px; }

    /* Prono oracle score */
    .actu-prono-score {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--accent-bg);
      border: 1px solid rgba(0,224,90,0.15);
      border-radius: 14px;
      padding: 10px 16px;
      margin: 10px 0;
    }
    .actu-prono-score .score { font-size: 28px; font-weight: 900; font-style: italic; color: var(--green-accent); letter-spacing: -0.02em; }
    .actu-prono-score .sep   { font-size: 18px; opacity: 0.3; }
    .actu-prono-score .team  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-tertiary); }

    /* Question reactions */
    .actu-reactions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .actu-vote-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 50px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.18s;
      border: 1px solid;
      user-select: none;
    }
    .actu-vote-btn.agree  { background: var(--accent-bg); border-color: rgba(0,224,90,0.2); color: var(--green-accent); }
    .actu-vote-btn.agree.voted  { background: var(--green-dim); border-color: var(--green-border); }
    .actu-vote-btn.disagree     { background: rgba(255,68,68,0.06); border-color: rgba(255,68,68,0.2); color: #FF6B6B; }
    .actu-vote-btn.disagree.voted { background: rgba(255,68,68,0.14); border-color: rgba(255,68,68,0.35); }
    .actu-vote-btn:active { transform: scale(0.94); }
    .actu-comments-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 600;
      margin-left: auto;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="fz-main-header">
    <div id="user-avatar" class="fz-main-header__avatar" onclick="window.location.href='/src/pages/profil.html'">?</div>
    <div class="fz-main-header__logo">FOOTZY<span>.</span></div>
    <div id="score-pill" class="fz-main-header__pts">0 PTS</div>
  </header>

  <div class="page-content">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" id="tab-actu" onclick="switchTab('actu')">Actualité</button>
      <button class="tab-btn"        id="tab-feed" onclick="switchTab('feed')">Feed ⭐</button>
    </div>

    <!-- ── Actualité tab ── -->
    <div id="panel-actu">
      <div id="actu-list" style="display:flex;flex-direction:column;gap:10px;padding:12px 16px 16px">
        <div style="text-align:center;padding:48px 20px;color:var(--text-tertiary)">Chargement…</div>
      </div>
    </div>

    <!-- ── Feed tab ── -->
    <div id="panel-feed" style="display:none">
      <div id="feed-list" style="display:flex;flex-direction:column;gap:10px;padding:0 16px 16px">
        <div style="text-align:center;padding:48px 20px;color:var(--text-tertiary)">Chargement…</div>
      </div>
    </div>

  </div>

  <!-- FAB (+) — visible only for premium users in Feed tab -->
  <button id="fab-post" title="Poster un pronostic">+</button>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/src/pages/accueil.html" class="active">
      <span style="font-size:22px">🏠</span>
      <span>Accueil</span>
    </a>
    <a href="/src/pages/home.html">
      <span style="font-size:22px">⚽</span>
      <span>Matchs</span>
    </a>
    <a href="/src/pages/oracle.html">
      <span style="font-size:22px">🔮</span>
      <span>Oracle</span>
    </a>
    <a href="/src/pages/groupe.html">
      <span style="font-size:22px">🫂</span>
      <span>Groupe</span>
    </a>
    <a href="/src/pages/profil.html">
      <span style="font-size:22px">🪪</span>
      <span>Profil</span>
    </a>
  </nav>

  <script type="module">
    import { supabase, requireAuth, getCurrentProfile } from '/src/js/lib/supabase.js';
    import { formatDate, formatKickoff, formatTime, toast } from '/src/js/lib/utils.js';
    import { createCheckout, PLANS } from '/src/js/lib/whop.js';

    const user    = await requireAuth();
    if (!user) throw new Error('not authed');
    const profile = await getCurrentProfile();

    // Profil incomplet (Google sans pseudo) → auto-assigner un pseudo
    if (!profile?.pseudo) {
      const rawName = user.user_metadata?.full_name || user.user_metadata?.name || user.email?.split('@')[0] || 'User';
      const basePseudo = rawName.replace(/\s+/g, '').replace(/[^a-zA-Z0-9_\-\.]/g, '').slice(0, 18) || 'User';
      let pseudo = basePseudo.length >= 3 ? basePseudo : 'User' + basePseudo;
      let counter = 1;
      while (true) {
        const { data: ex } = await supabase.from('profiles').select('id').eq('pseudo', pseudo).maybeSingle();
        if (!ex) break;
        pseudo = basePseudo.slice(0, 15) + counter++;
      }
      if (profile) {
        // Profil existe mais sans pseudo → update uniquement le pseudo
        await supabase.from('profiles').update({ pseudo }).eq('id', user.id);
      } else {
        // Pas de profil du tout → insert complet
        await supabase.from('profiles').insert({ id: user.id, pseudo, points_totaux: 0, plan: 'free' });
      }
      window.location.reload();
    }

    const isPremium = profile?.plan === 'premium';
    const fab = document.getElementById('fab-post');

    // ── Header ──
    if (profile) {
      const av = document.getElementById('user-avatar');
      if (profile.avatar_url) {
        av.innerHTML = `<img src="${profile.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      } else {
        av.textContent = (profile.pseudo?.[0] || '?').toUpperCase();
      }
      document.getElementById('score-pill').textContent = `${(profile.points_totaux || 0).toLocaleString('fr-FR')} PTS`;
      if (profile.streak_quotidien > 0)
        const streakEl = document.getElementById('user-streak');
        if (streakEl) streakEl.textContent = `🔥 ${profile.streak_quotidien}`;
    }

    // ── Tab switching ──
    let feedLoaded = false;
    let actuLoaded = false;
    window.switchTab = (tab) => {
      document.getElementById('tab-actu').classList.toggle('active', tab === 'actu');
      document.getElementById('tab-feed').classList.toggle('active', tab === 'feed');
      document.getElementById('panel-actu').style.display = tab === 'actu' ? '' : 'none';
      document.getElementById('panel-feed').style.display = tab === 'feed' ? '' : 'none';
      fab.style.display = (tab === 'feed' && isPremium) ? 'flex' : 'none';
      if (tab === 'feed' && !feedLoaded) loadFeed();
      if (tab === 'actu' && !actuLoaded) loadActu();
    };

    // Trigger first load since actu is the default tab
    loadActu();

    // ── FAB click → match picker ──
    fab.addEventListener('click', openMatchPicker);

    // ─────────────────────────────────────────
    // ACTUALITÉ — auto-générée depuis les matchs réels
    // ─────────────────────────────────────────
    let myVotes = {};
    let actuLiveInterval = null;

    function phaseLabel(m) {
      if (m.phase === 'groupes') return `Groupe ${m.groupe || ''}`;
      if (m.groupe === 'UCL')    return 'Finale UCL';
      const L = { huitiemes:'1/8 de finale', quarts:'Quart de finale', demis:'Demi-finale', finale:'Finale' };
      return L[m.phase] || m.phase;
    }

    // ── Classement d'un groupe calculé depuis Supabase ──
    function buildGroupStandingsCard(group, allGroupMatches) {
      const groupMatches = allGroupMatches.filter(m => m.groupe === group);
      const finished = groupMatches.filter(m => m.status === 'finished');
      if (!finished.length) return null;

      const teams = {};
      const init = (name, flag) => { if (!teams[name]) teams[name] = { name, flag, p:0, w:0, d:0, l:0, gf:0, ga:0 }; };
      for (const m of groupMatches) {
        init(m.home_team, m.home_flag);
        init(m.away_team, m.away_flag);
        if (m.status !== 'finished') continue;
        const h = m.home_score || 0, a = m.away_score || 0;
        teams[m.home_team].p++; teams[m.away_team].p++;
        teams[m.home_team].gf += h; teams[m.home_team].ga += a;
        teams[m.away_team].gf += a; teams[m.away_team].ga += h;
        if (h > a) { teams[m.home_team].w++; teams[m.away_team].l++; }
        else if (a > h) { teams[m.away_team].w++; teams[m.home_team].l++; }
        else { teams[m.home_team].d++; teams[m.away_team].d++; }
      }

      const standings = Object.values(teams)
        .map(t => ({ ...t, pts: t.w * 3 + t.d, gd: t.gf - t.ga }))
        .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);

      const rows = standings.map((t, i) => `
        <div style="display:flex;align-items:center;gap:6px;padding:5px 2px;${i < standings.length - 1 ? 'border-bottom:1px solid rgba(255,255,255,0.05)' : ''}">
          <span style="font-size:10px;font-weight:700;color:${i < 2 && finished.length >= 3 ? 'var(--green-accent)' : 'var(--text-tertiary)'};width:14px;text-align:center">${i + 1}</span>
          <span style="font-size:16px;line-height:1">${t.flag}</span>
          <span style="flex:1;font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.name}</span>
          <span style="font-size:11px;color:var(--text-tertiary);width:16px;text-align:center">${t.p}</span>
          <span style="font-size:11px;color:var(--text-tertiary);width:16px;text-align:center">${t.w}</span>
          <span style="font-size:11px;color:var(--text-tertiary);width:16px;text-align:center">${t.d}</span>
          <span style="font-size:11px;color:var(--text-tertiary);width:16px;text-align:center">${t.l}</span>
          <span style="font-size:11px;font-weight:600;color:${t.gd > 0 ? 'var(--green-accent)' : t.gd < 0 ? 'var(--danger)' : 'var(--text-tertiary)'};width:22px;text-align:right">${t.gd > 0 ? '+' : ''}${t.gd}</span>
          <span style="font-size:13px;font-weight:800;width:20px;text-align:center">${t.pts}</span>
        </div>`).join('');

      return {
        id: `auto-standing-${group}`, type: 'stats', is_pinned: false,
        emoji: '📋',
        titre: `Classement Groupe ${group}`,
        contenu: `<div style="margin-top:4px">
          <div style="display:flex;gap:6px;padding:0 2px 5px;border-bottom:1px solid var(--border)">
            <span style="width:14px"></span><span style="width:16px"></span>
            <span style="flex:1;font-size:9px;font-weight:700;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.06em">Équipe</span>
            <span style="font-size:9px;font-weight:700;color:var(--text-tertiary);width:16px;text-align:center" title="Joués">J</span>
            <span style="font-size:9px;font-weight:700;color:var(--text-tertiary);width:16px;text-align:center" title="Gagnés">G</span>
            <span style="font-size:9px;font-weight:700;color:var(--text-tertiary);width:16px;text-align:center" title="Nuls">N</span>
            <span style="font-size:9px;font-weight:700;color:var(--text-tertiary);width:16px;text-align:center" title="Perdus">P</span>
            <span style="font-size:9px;font-weight:700;color:var(--text-tertiary);width:22px;text-align:right" title="Différence">+/-</span>
            <span style="font-size:9px;font-weight:700;color:var(--text-tertiary);width:20px;text-align:center" title="Points">Pts</span>
          </div>
          ${rows}
          ${finished.length >= 3 ? '<div style="font-size:10px;color:var(--text-tertiary);margin-top:7px"><span style="color:var(--green-accent)">●</span> Top 2 qualifiés</div>' : ''}
        </div>`,
        created_at: new Date().toISOString(),
        _auto: true,
      };
    }

    // ── Auto-posts depuis les données réelles (enrichis) ──
    function buildAutoPostsFromMatches(matches, allGroupMatches) {
      const now = new Date();
      const auto = [];

      const live     = matches.filter(m => m.status === 'live' || m.status === 'halftime');
      const finished = matches.filter(m => m.status === 'finished');
      const today    = matches.filter(m => {
        if (m.status !== 'scheduled') return false;
        const k = new Date(m.kickoff_at);
        return k.toDateString() === now.toDateString();
      });
      const soon = matches.filter(m => {
        if (m.status !== 'scheduled') return false;
        const k = new Date(m.kickoff_at);
        const diff = k - now;
        return diff > 0 && diff < 3 * 3600 * 1000;
      });
      const tomorrow = matches.filter(m => {
        if (m.status !== 'scheduled') return false;
        const k = new Date(m.kickoff_at);
        const tom = new Date(now); tom.setDate(tom.getDate() + 1);
        return k.toDateString() === tom.toDateString();
      });

      // 1. LIVE — épinglé en tête
      for (const m of live) {
        auto.push({
          id: `auto-live-${m.id}`, type: 'flash', is_pinned: true,
          emoji: '🔴',
          titre: `${m.home_flag} ${m.home_team} ${m.home_score}–${m.away_score} ${m.away_team} ${m.away_flag}`,
          contenu: `<strong>EN DIRECT</strong> · ${m.minute ? m.minute + "' · " : ''}${phaseLabel(m)}. <a href="/src/pages/match.html?id=${m.id}" style="color:var(--green-accent);font-weight:700;text-decoration:none">Voir le match →</a>`,
          created_at: new Date().toISOString(),
          _auto: true,
        });
      }

      // 2. Coup d'envoi imminent (< 3h)
      for (const m of soon) {
        const mins = Math.round((new Date(m.kickoff_at) - now) / 60000);
        const delay = mins < 60 ? `dans ${mins} min` : `dans ${Math.round(mins / 60)}h`;
        const isKO = ['huitiemes','quarts','demis','finale'].includes(m.phase);
        auto.push({
          id: `auto-soon-${m.id}`, type: 'flash', is_pinned: false,
          emoji: isKO ? '🏆' : '⏰',
          titre: `${m.home_flag} ${m.home_team} vs ${m.away_team} ${m.away_flag} — ${delay}`,
          contenu: `Coup d'envoi ${delay} · ${phaseLabel(m)}${isKO ? ' · <strong>Élimination directe !</strong>' : ''}. Lance ton pronostic avant le début !`,
          created_at: new Date().toISOString(),
          _auto: true,
        });
      }

      // 3. Programme du jour (> 3h)
      const todayOther = today.filter(m => new Date(m.kickoff_at) - now >= 3 * 3600 * 1000);
      if (todayOther.length) {
        const lines = todayOther.map(m =>
          `${m.home_flag} <strong>${m.home_team}</strong> vs <strong>${m.away_team}</strong> ${m.away_flag} · ${formatTime(m.kickoff_at)} · ${phaseLabel(m)}`
        ).join('<br>');
        auto.push({
          id: 'auto-today', type: 'flash', is_pinned: false,
          emoji: '📅',
          titre: `${todayOther.length} match${todayOther.length > 1 ? 's' : ''} aujourd'hui`,
          contenu: lines,
          created_at: new Date().toISOString(),
          _auto: true,
        });
      }

      // 4. Résultats récents (< 24h) — enrichis avec contexte
      const recent = finished.filter(m => now - new Date(m.kickoff_at) < 24 * 3600 * 1000);
      for (const m of recent.slice(-5).reverse()) {
        const winner = m.home_score > m.away_score ? m.home_team
                     : m.away_score > m.home_score ? m.away_team : null;
        const isKO = ['huitiemes','quarts','demis','finale'].includes(m.phase);
        let ctx;
        if (isKO && winner)  ctx = `🎉 <strong>${winner}</strong> se qualifie pour le prochain tour !`;
        else if (isKO)       ctx = `Tirs au but nécessaires — match nul au temps réglementaire.`;
        else if (winner)     ctx = `<strong>${winner}</strong> s'impose !`;
        else                 ctx = `Match nul — un point chacun.`;
        auto.push({
          id: `auto-result-${m.id}`, type: 'debrief', is_pinned: false,
          emoji: '📊',
          titre: `${m.home_flag} ${m.home_team} ${m.home_score}–${m.away_score} ${m.away_team} ${m.away_flag}`,
          contenu: `Résultat final · ${phaseLabel(m)}. ${ctx}`,
          created_at: m.updated_at || m.kickoff_at,
          _auto: true,
        });
      }

      // 5. Programme de demain
      if (tomorrow.length) {
        const lines = tomorrow.map(m =>
          `${m.home_flag} <strong>${m.home_team}</strong> vs <strong>${m.away_team}</strong> ${m.away_flag} · ${formatTime(m.kickoff_at)} · ${phaseLabel(m)}`
        ).join('<br>');
        auto.push({
          id: 'auto-tomorrow', type: 'stats', is_pinned: false,
          emoji: '⏭️',
          titre: `Programme demain — ${tomorrow.length} match${tomorrow.length > 1 ? 's' : ''}`,
          contenu: lines,
          created_at: new Date().toISOString(),
          _auto: true,
        });
      }

      // 6. Classements de groupe (groupes actifs dans la fenêtre courante)
      const activeGroups = new Set(matches.filter(m => m.groupe).map(m => m.groupe));
      const groupsToShow = [...new Set(
        allGroupMatches
          .filter(m => m.status === 'finished' && m.groupe && activeGroups.has(m.groupe))
          .map(m => m.groupe)
      )].sort();
      for (const g of groupsToShow) {
        const card = buildGroupStandingsCard(g, allGroupMatches);
        if (card) auto.push(card);
      }

      // 7. Matchs à élimination directe dans les 7 prochains jours
      const nextWeek = new Date(now); nextWeek.setDate(nextWeek.getDate() + 7);
      const KNOCKOUT_EMOJI = { huitiemes: '⚔️', quarts: '🏹', demis: '🎯', finale: '🏆' };
      const knockouts = matches.filter(m =>
        m.status === 'scheduled' &&
        ['huitiemes','quarts','demis','finale'].includes(m.phase) &&
        new Date(m.kickoff_at) > now &&
        new Date(m.kickoff_at) < nextWeek
      );
      for (const m of knockouts) {
        auto.push({
          id: `auto-knockout-${m.id}`, type: 'flash', is_pinned: false,
          emoji: KNOCKOUT_EMOJI[m.phase] || '⚽',
          titre: `${m.home_flag} ${m.home_team} vs ${m.away_team} ${m.away_flag}`,
          contenu: `${phaseLabel(m)} · ${formatKickoff(m.kickoff_at)} · <strong>Élimination directe</strong> — le perdant rentre à la maison !`,
          created_at: new Date().toISOString(),
          _auto: true,
        });
      }

      // 8. Bilan phase de groupes
      const allPlayed = allGroupMatches.filter(m => m.status === 'finished');
      if (allPlayed.length) {
        const goals = allPlayed.reduce((s, m) => s + (m.home_score || 0) + (m.away_score || 0), 0);
        const avg   = (goals / allPlayed.length).toFixed(1);
        auto.push({
          id: 'auto-bilan', type: 'stats', is_pinned: false,
          emoji: '🌍',
          titre: `CdM 2026 — Bilan phase de groupes`,
          contenu: `<strong>${allPlayed.length}</strong> match${allPlayed.length > 1 ? 's' : ''} joué${allPlayed.length > 1 ? 's' : ''} · <strong>${goals}</strong> buts au total · Moyenne <strong>${avg}</strong> buts/match`,
          created_at: new Date().toISOString(),
          _auto: true,
        });
      }

      return auto;
    }

    async function loadActu() {
      actuLoaded = true;
      const list = document.getElementById('actu-list');

      // Fenêtre : hier → après-demain pour capter live, résultats récents et programme
      const from = new Date(); from.setDate(from.getDate() - 1);
      const to   = new Date(); to.setDate(to.getDate() + 2);

      const [matchesRes, allGroupRes, postsRes] = await Promise.all([
        supabase.from('matchs').select('*')
          .gte('kickoff_at', from.toISOString())
          .lte('kickoff_at', to.toISOString())
          .order('kickoff_at'),
        supabase.from('matchs')
          .select('id,home_team,away_team,home_flag,away_flag,home_score,away_score,status,groupe,phase,kickoff_at,updated_at')
          .eq('phase', 'groupes')
          .order('kickoff_at'),
        supabase.from('actualite_posts').select('*')
          .order('is_pinned', { ascending: false })
          .order('created_at',  { ascending: false })
          .limit(10),
      ]);

      const autoPosts   = buildAutoPostsFromMatches(matchesRes.data || [], allGroupRes.data || []);
      const manualPosts = (postsRes.data || []).filter(p => !p._auto);

      const allPosts = [...autoPosts, ...manualPosts];

      if (!allPosts.length) {
        list.innerHTML = `<div style="text-align:center;padding:48px 20px;color:var(--text-tertiary)">
          <div style="font-size:48px;margin-bottom:12px">📰</div>
          <div style="font-weight:700;color:var(--text-secondary)">Aucune actualité pour l'instant</div>
        </div>`;
        return;
      }

      // Réactions pour les posts manuels de type question
      const questionIds = manualPosts.filter(p => p.type === 'question').map(p => p.id);
      let rxCounts = {}, commentCounts = {};

      if (questionIds.length) {
        const { data: rxData } = await supabase
          .from('actualite_reactions').select('post_id, type').in('post_id', questionIds);
        rxData?.forEach(r => {
          if (!rxCounts[r.post_id]) rxCounts[r.post_id] = { agree: 0, disagree: 0 };
          rxCounts[r.post_id][r.type]++;
        });
        const { data: myRxData } = await supabase
          .from('actualite_reactions').select('post_id, type')
          .eq('user_id', user.id).in('post_id', questionIds);
        myRxData?.forEach(r => { myVotes[r.post_id] = r.type; });
        const { data: cmtData } = await supabase
          .from('actualite_comments').select('post_id').in('post_id', questionIds);
        cmtData?.forEach(c => { commentCounts[c.post_id] = (commentCounts[c.post_id] || 0) + 1; });
      }

      list.innerHTML = allPosts.map(p =>
        renderActuCard(p, rxCounts[p.id] || { agree:0, disagree:0 }, commentCounts[p.id] || 0)
      ).join('');

      list.querySelectorAll('.actu-vote-btn').forEach(btn => btn.addEventListener('click', handleVote));

      // Polling auto si des matchs sont en direct
      const hasLive = (matchesRes.data || []).some(m => m.status === 'live' || m.status === 'halftime');
      if (hasLive && !actuLiveInterval) {
        actuLiveInterval = setInterval(() => {
          actuLoaded = false;
          loadActu();
        }, 60_000);
      } else if (!hasLive && actuLiveInterval) {
        clearInterval(actuLiveInterval);
        actuLiveInterval = null;
      }
    }

    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1)  return 'à l\'instant';
      if (m < 60) return `il y a ${m}min`;
      const h = Math.floor(m / 60);
      if (h < 24) return `il y a ${h}h`;
      return `il y a ${Math.floor(h / 24)}j`;
    }

    const TYPE_META = {
      flash:    { label: '⚡ Actu Flash',        cls: 'actu-flash'    },
      stats:    { label: '📊 Stats du jour',      cls: 'actu-stats'    },
      prono:    { label: '🔮 Pronostic Oracle',   cls: 'actu-prono'    },
      debrief:  { label: '🎙️ Débrief',            cls: 'actu-debrief'  },
      question: { label: '💬 Question du jour',   cls: 'actu-question' },
    };

    function renderActuCard(p, rx, cmtCount) {
      const meta  = TYPE_META[p.type] || TYPE_META.flash;
      const pinHTML = p.is_pinned ? `<span style="font-size:10px;font-weight:700;color:var(--gold);background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.2);border-radius:50px;padding:2px 8px;margin-left:6px">📌 À la une</span>` : '';

      // Extra block for prono type (score display)
      let extraHTML = '';
      if (p.type === 'prono') {
        const scoreMatch = p.contenu.match(/(\d+)-(\d+)/);
        if (scoreMatch) {
          const [, h, a] = scoreMatch;
          const teams = p.titre?.split(' vs ') || ['', ''];
          extraHTML = `
            <div class="actu-prono-score">
              <span class="team">${teams[0] || ''}</span>
              <span class="score">${h}</span>
              <span class="sep">–</span>
              <span class="score">${a}</span>
              <span class="team">${teams[1] || ''}</span>
            </div>`;
        }
      }

      // Reactions for question type
      let reactHTML = '';
      if (p.type === 'question') {
        const myVote      = myVotes[p.id];
        const agreeActive = myVote === 'agree'    ? ' voted' : '';
        const disActive   = myVote === 'disagree' ? ' voted' : '';
        reactHTML = `
          <div class="actu-reactions">
            <button class="actu-vote-btn agree${agreeActive}" data-post="${p.id}" data-vote="agree">🔥 D'accord <strong>${rx.agree}</strong></button>
            <button class="actu-vote-btn disagree${disActive}" data-post="${p.id}" data-vote="disagree">❌ Pas d'accord <strong>${rx.disagree}</strong></button>
            <span class="actu-comments-chip">💬 ${cmtCount}</span>
          </div>`;
      }

      return `
        <div class="actu-card ${meta.cls}" data-post-id="${p.id}">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px">
            <span class="actu-type-badge">${meta.label}</span>${pinHTML}
          </div>
          ${p.titre ? `<div class="actu-title">${p.emoji ? p.emoji + ' ' : ''}${p.titre}</div>` : ''}
          ${extraHTML}
          <div class="actu-body">${p.contenu}</div>
          ${reactHTML}
          <div class="actu-time">${timeAgo(p.created_at)}</div>
        </div>`;
    }

    async function handleVote(e) {
      const btn    = e.currentTarget;
      const postId = btn.dataset.post;
      const vote   = btn.dataset.vote;
      const card   = btn.closest('.actu-card');

      if (myVotes[postId] === vote) {
        // Toggle off
        await supabase.from('actualite_reactions').delete().eq('post_id', postId).eq('user_id', user.id);
        delete myVotes[postId];
      } else {
        await supabase.from('actualite_reactions').upsert(
          { post_id: postId, user_id: user.id, type: vote },
          { onConflict: 'post_id,user_id' }
        );
        myVotes[postId] = vote;
      }

      // Refresh counts
      const { data: fresh } = await supabase.from('actualite_reactions').select('type').eq('post_id', postId);
      const newRx = { agree: 0, disagree: 0 };
      fresh?.forEach(r => newRx[r.type]++);

      const agreBtn = card.querySelector('[data-vote="agree"]');
      const disBtn  = card.querySelector('[data-vote="disagree"]');
      if (agreBtn) {
        agreBtn.className = `actu-vote-btn agree${myVotes[postId] === 'agree' ? ' voted' : ''}`;
        agreBtn.innerHTML = `🔥 D'accord <strong>${newRx.agree}</strong>`;
        agreBtn.addEventListener('click', handleVote);
      }
      if (disBtn) {
        disBtn.className = `actu-vote-btn disagree${myVotes[postId] === 'disagree' ? ' voted' : ''}`;
        disBtn.innerHTML = `❌ Pas d'accord <strong>${newRx.disagree}</strong>`;
        disBtn.addEventListener('click', handleVote);
      }
    }

    // ─────────────────────────────────────────
    // FEED LOADING
    // ─────────────────────────────────────────
    let myReactions = {};

    async function loadFeed() {
      feedLoaded = true;
      const feedList = document.getElementById('feed-list');

      const { data: premiumProfiles } = await supabase
        .from('profiles').select('id').eq('plan', 'premium');

      if (!premiumProfiles?.length) {
        feedList.innerHTML = emptyState('⭐', 'Aucun membre Premium', 'Sois le premier à passer Premium pour que tes pronos apparaissent ici !');
        return;
      }

      const premiumIds = premiumProfiles.map(p => p.id);

      // 2a. Load pronos — feed only (groupe_id IS NULL = posté publiquement via +)
      const { data: pronos, error } = await supabase
        .from('pronostics')
        .select(`
          id, user_id, home_score, away_score, status, points, created_at,
          matchs ( id, home_team, away_team, home_flag, away_flag, kickoff_at, status, home_score, away_score )
        `)
        .in('user_id', premiumIds)
        .is('groupe_id', null)
        .order('created_at', { ascending: false })
        .limit(30);

      if (error || !pronos?.length) {
        feedList.innerHTML = emptyState('📭', 'Feed vide', 'Aucun pronostic premium publié pour l\'instant. Appuie sur + pour poster le tien !');
        return;
      }

      // 2b. Load profiles separately and merge
      const { data: profilesData } = await supabase
        .from('profiles')
        .select('id, pseudo, plan, points_totaux, global_bm_pts, avatar_url')
        .in('id', premiumIds);
      const profilesMap = {};
      profilesData?.forEach(p => { profilesMap[p.id] = p; });
      pronos.forEach(p => { p.profiles = profilesMap[p.user_id] || null; });

      const pronoIds = pronos.map(p => p.id);

      const { data: myRxData } = await supabase
        .from('feed_reactions').select('prono_id, emoji')
        .eq('user_id', user.id).in('prono_id', pronoIds);
      myReactions = {};
      myRxData?.forEach(r => { myReactions[r.prono_id] = r.emoji; });

      const { data: allRxData } = await supabase
        .from('feed_reactions').select('prono_id, emoji').in('prono_id', pronoIds);
      const rxCounts = {};
      allRxData?.forEach(r => {
        if (!rxCounts[r.prono_id]) rxCounts[r.prono_id] = {};
        rxCounts[r.prono_id][r.emoji] = (rxCounts[r.prono_id][r.emoji] || 0) + 1;
      });

      feedList.innerHTML = pronos.map(p => renderCard(p, rxCounts[p.id] || {})).join('');
      feedList.querySelectorAll('.reaction-btn').forEach(btn => btn.addEventListener('click', handleReaction));
      feedList.querySelectorAll('.feed-delete-btn').forEach(btn => btn.addEventListener('click', handleDelete));
      feedList.querySelectorAll('.war-btn').forEach(btn => btn.addEventListener('click', e => {
        const card = e.currentTarget.closest('.feed-card');
        openWarPopup(card.dataset.targetId, card.dataset.targetPseudo, parseInt(card.dataset.targetPts || '0'));
      }));
      feedList.querySelectorAll('.feed-user-click').forEach(el => el.addEventListener('click', e => {
        const card = e.currentTarget.closest('.feed-card');
        openProfilePopup(card.dataset.targetId);
      }));
    }

    function renderCard(p, counts) {
      const m    = p.matchs;
      const prof = p.profiles;
      const init = (prof?.pseudo?.[0] || '?').toUpperCase();

      // Avatar (photo ou initiale)
      const avatarInner = prof?.avatar_url
        ? `<img src="${prof.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'${init}',style:'font-size:16px;font-weight:700'}))">`
        : init;

      // Points globaux (base + guerre globale)
      const globalPts = (prof?.points_totaux || 0) + (prof?.global_bm_pts || 0);
      const bmDelta   = prof?.global_bm_pts || 0;
      const bmHint    = bmDelta !== 0
        ? `<span style="font-size:10px;font-weight:700;color:${bmDelta > 0 ? 'var(--green-accent)' : 'var(--danger)'}">${bmDelta > 0 ? '+' : ''}${bmDelta}</span>`
        : '';

      let statusBadge = '';
      if (p.status === 'won')               statusBadge = `<span class="feed-status-badge won">+${p.points} pts</span>`;
      else if (p.status === 'en-vie-exact') statusBadge = `<span class="feed-status-badge exact">⭐ Exact</span>`;
      else if (p.status === 'lost')         statusBadge = `<span class="feed-status-badge lost">0 pt</span>`;

      const dateLabel = m ? formatDate(m.kickoff_at) : '';
      const isOwner   = p.user_id === user.id;

      const EMOJIS = ['🔥', '👏', '😱', '🎯'];
      const rxHTML = EMOJIS.map(emoji => {
        const cnt    = counts[emoji] || 0;
        const active = myReactions[p.id] === emoji;
        return `<button class="reaction-btn${active ? ' active' : ''}" data-prono="${p.id}" data-emoji="${emoji}">${emoji}${cnt > 0 ? ` <span class="count">${cnt}</span>` : ''}</button>`;
      }).join('');

      return `
        <div class="feed-card" data-id="${p.id}" data-target-id="${p.user_id}" data-target-pseudo="${prof?.pseudo || ''}" data-target-pts="${globalPts}">

                </div>
              </div>
            </div>
            ${statusBadge}
            ${!isOwner ? `<button class="war-btn" title="⚔️ Guerre Globale">⚔️</button>` : ''}

          </div>
          <div class="feed-match-info">
            <span class="feed-match-flags">${m?.home_flag || ''}${m?.away_flag || ''}</span>
            <div>
              <div class="feed-match-name">${m?.home_team || '?'} vs ${m?.away_team || '?'}</div>

            </div>
          </div>
          <div class="feed-prono-display">
            <div class="feed-prono-team">
              <span class="flag">${m?.home_flag || ''}</span>
              <span class="name">${m?.home_team || '?'}</span>
            </div>
            <div class="feed-prono-score">
              <span>${p.home_score}</span><span class="sep">–</span><span>${p.away_score}</span>
            </div>
            <div class="feed-prono-team">
              <span class="flag">${m?.away_flag || ''}</span>
              <span class="name">${m?.away_team || '?'}</span>
            </div>
          </div>
          <div class="feed-reactions">${rxHTML}</div>
        </div>`;
    }

    async function handleReaction(e) {
      const btn     = e.currentTarget;
      const pronoId = btn.dataset.prono;
      const emoji   = btn.dataset.emoji;
      const card    = btn.closest('.feed-card');

      if (myReactions[pronoId] === emoji) {
        await supabase.from('feed_reactions').delete().eq('prono_id', pronoId).eq('user_id', user.id);
        delete myReactions[pronoId];
      } else {
        await supabase.from('feed_reactions').upsert(
          { prono_id: pronoId, user_id: user.id, emoji },
          { onConflict: 'prono_id,user_id' }
        );
        myReactions[pronoId] = emoji;
      }

      const { data: fresh } = await supabase.from('feed_reactions').select('emoji').eq('prono_id', pronoId);
      const freshCounts = {};
      fresh?.forEach(r => { freshCounts[r.emoji] = (freshCounts[r.emoji] || 0) + 1; });

      const EMOJIS = ['🔥', '👏', '😱', '🎯'];
      [...card.querySelectorAll('.reaction-btn')].forEach((b, i) => {
        const em     = EMOJIS[i];
        const cnt    = freshCounts[em] || 0;
        const active = myReactions[pronoId] === em;
        const nb = b.cloneNode(false);
        nb.className = 'reaction-btn' + (active ? ' active' : '');
        nb.dataset.prono = pronoId;
        nb.dataset.emoji = em;
        nb.innerHTML = `${em}${cnt > 0 ? ` <span class="count">${cnt}</span>` : ''}`;
        nb.addEventListener('click', handleReaction);
        b.replaceWith(nb);
      });
    }

    // ─────────────────────────────────────────
    // MATCH PICKER
    // ─────────────────────────────────────────
    let upcomingMatchesCache = [];

    async function openMatchPicker() {
      // Create overlay
      const overlay = document.createElement('div');
      overlay.className = 'post-overlay';

      overlay.innerHTML = `
        <div class="post-sheet">
          <div class="post-sheet-handle"></div>
          <div class="post-sheet-title">
            <span style="flex:1">Choisir un match</span>
            <button class="post-sheet-back" id="picker-close" style="font-size:18px">✕</button>
          </div>
          <div id="picker-body">
            <div style="text-align:center;padding:40px;color:var(--text-tertiary)">Chargement…</div>
          </div>
        </div>`;

      document.body.appendChild(overlay);
      overlay.querySelector('#picker-close').addEventListener('click', () => overlay.remove());
      // Close on backdrop click
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

      // Load upcoming matches
      const now = new Date().toISOString();
      const { data: matches } = await supabase
        .from('matchs')
        .select('id, home_team, away_team, home_flag, away_flag, kickoff_at, phase, groupe')
        .gt('kickoff_at', now)
        .order('kickoff_at')
        .limit(20);

      upcomingMatchesCache = matches || [];
      const body = overlay.querySelector('#picker-body');

      if (!upcomingMatchesCache.length) {
        body.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-tertiary)">Aucun match à venir 😔</div>`;
        return;
      }

      body.innerHTML = upcomingMatchesCache.map((m, i) => `
        <div class="picker-match-row" data-idx="${i}">
          <span class="picker-flags">${m.home_flag}${m.away_flag}</span>
          <div class="picker-teams">
            <div class="picker-teams-name">${m.home_team} vs ${m.away_team}</div>
            <div class="picker-teams-date">${formatKickoff(m.kickoff_at)}</div>
          </div>
          <span class="picker-arrow">›</span>
        </div>`).join('');

      body.querySelectorAll('.picker-match-row').forEach(row => {
        row.addEventListener('click', () => {
          const match = upcomingMatchesCache[parseInt(row.dataset.idx)];
          showPronoForm(match, overlay);
        });
      });
    }

    // ─────────────────────────────────────────
    // PRONO FORM (inside the same overlay)
    // ─────────────────────────────────────────
    function showPronoForm(match, overlay) {
      let homeScore = 1;
      let awayScore = 1;

      const sheet = overlay.querySelector('.post-sheet');
      sheet.innerHTML = `
        <div class="post-sheet-handle"></div>
        <div class="post-sheet-title">
          <button class="post-sheet-back" id="form-back">←</button>
          <span style="flex:1">${match.home_flag} ${match.home_team} vs ${match.away_team} ${match.away_flag}</span>
        </div>

        <p style="text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text-tertiary);margin:0 0 4px">Ton pronostic</p>

        <div class="sheet-stepper-wrap">
          <div class="sheet-stepper-team">
            <span class="sheet-stepper-flag">${match.home_flag}</span>
            <span class="sheet-stepper-name">${match.home_team}</span>
            <div class="sheet-stepper-ctrl">
              <button class="sheet-stepper-btn" id="h-plus">+</button>
              <span class="sheet-stepper-val" id="h-val">1</span>
              <button class="sheet-stepper-btn" id="h-minus">−</button>
            </div>
          </div>

          <span class="sheet-score-sep">–</span>

          <div class="sheet-stepper-team">
            <span class="sheet-stepper-flag">${match.away_flag}</span>
            <span class="sheet-stepper-name">${match.away_team}</span>
            <div class="sheet-stepper-ctrl">
              <button class="sheet-stepper-btn" id="a-plus">+</button>
              <span class="sheet-stepper-val" id="a-val">1</span>
              <button class="sheet-stepper-btn" id="a-minus">−</button>
            </div>
          </div>
        </div>

        <div style="padding:0 20px 8px">
          <button id="submit-prono" style="background:var(--green-accent);color:#080808;border:none;border-radius:50px;height:52px;width:100%;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:-.01em">
            Publier sur le Feed 🚀
          </button>
        </div>
        <p style="text-align:center;font-size:11px;color:var(--text-tertiary);padding:8px 20px 0">Visible par tous les membres Footzy</p>`;

      // Back to match picker
      sheet.querySelector('#form-back').addEventListener('click', () => {
        overlay.remove();
        openMatchPicker();
      });

      // Score controls
      sheet.querySelector('#h-plus').addEventListener('click',  () => { homeScore = Math.min(20, homeScore + 1); sheet.querySelector('#h-val').textContent = homeScore; });
      sheet.querySelector('#h-minus').addEventListener('click', () => { homeScore = Math.max(0, homeScore - 1); sheet.querySelector('#h-val').textContent = homeScore; });
      sheet.querySelector('#a-plus').addEventListener('click',  () => { awayScore = Math.min(20, awayScore + 1); sheet.querySelector('#a-val').textContent = awayScore; });
      sheet.querySelector('#a-minus').addEventListener('click', () => { awayScore = Math.max(0, awayScore - 1); sheet.querySelector('#a-val').textContent = awayScore; });

      // Submit
      sheet.querySelector('#submit-prono').addEventListener('click', async () => {
        const btn = sheet.querySelector('#submit-prono');
        btn.disabled = true;
        btn.textContent = 'Publication…';

        // Check if prono already exists for this match (feed prono = groupe_id IS NULL)
        const { data: existing } = await supabase
          .from('pronostics')
          .select('id')
          .eq('user_id', user.id)
          .eq('match_id', match.id)
          .is('groupe_id', null)
          .maybeSingle();

        let err, saved;
        if (existing) {
          ({ data: saved, error: err } = await supabase.from('pronostics')
            .update({ home_score: homeScore, away_score: awayScore })
            .eq('id', existing.id)
            .select('id').single());
        } else {
          ({ data: saved, error: err } = await supabase.from('pronostics')
            .insert({ user_id: user.id, match_id: match.id, groupe_id: null, home_score: homeScore, away_score: awayScore })
            .select('id').single());
        }

        // Detect both explicit errors and silent RLS blocks (err=null but no row)
        if (err || !saved) {
          const msg = err?.message || 'Insert bloqué (RLS). Vérifie les policies Supabase.';
          toast('Erreur : ' + msg);
          btn.disabled = false;
          btn.textContent = 'Publier sur le Feed 🚀';
          return;
        }

        overlay.remove();
        toast('Pronostic publié sur le Feed ! 🚀');
        // Reload feed
        feedLoaded = false;
        document.getElementById('feed-list').innerHTML = '<div style="text-align:center;padding:48px 20px;color:var(--text-tertiary)">Chargement…</div>';
        loadFeed();
      });
    }

                <div style="font-size:12px;font-weight:700;color:${o.color}">${o.label.substring(o.label.indexOf(' ')+1)}</div>
                <div style="font-size:15px;font-weight:900;color:${o.color};margin-top:4px">${o.desc}</div>
                <div style="font-size:11px;color:var(--text-tertiary);margin-top:5px;font-weight:600">1,99€</div>
              </button>
            `).join('')}
          </div>
          <div style="text-align:center;font-size:11px;color:var(--text-tertiary);padding:4px 20px 0">
            Affecte le classement global · Paiement sécurisé
          </div>
        </div>
      `;

      document.body.appendChild(el);
      el.querySelector('#war-close').addEventListener('click', () => el.remove());
      el.addEventListener('click', e => { if (e.target === el) el.remove(); });

      el.querySelectorAll('.war-opt-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const o = WAR_OPTIONS[+btn.dataset.idx];
          el.remove();
          // Stocker l'action en attente puis rediriger vers le paiement
          localStorage.setItem('footzy_pending_war', JSON.stringify({
            targetId,
            targetPseudo,
            label:     o.label,
            pts:       o.pts,
            timestamp: Date.now(),
          }));
          createCheckout(PLANS.groupe_action, user.id, user.email);
        });
      });
    }

    // ─────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────
    // ── Delete a feed prono ──
    async function handleDelete(e) {
      const pronoId = e.currentTarget.dataset.prono;

      // Confirm via custom overlay
      const confirmed = await new Promise(resolve => {
        const el = document.createElement('div');
        el.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.85);display:flex;align-items:flex-end;justify-content:center';
        el.innerHTML = `
          <div style="background:#FAFAF8;border:1px solid #E0DCD6;border-radius:28px 28px 0 0;width:100%;max-width:480px;padding:28px 20px calc(28px + env(safe-area-inset-bottom));text-align:center">
            <div style="font-size:40px;margin-bottom:12px">🗑</div>
            <div style="font-size:17px;font-weight:700;margin-bottom:6px;color:#0F0F0E">Supprimer ce pronostic ?</div>
            <div style="font-size:13px;color:#6B6560;margin-bottom:24px">Il disparaîtra du Feed et de ton profil.</div>
            <button id="del-confirm" style="background:#E63946;color:#FAFAF8;border:none;border-radius:50px;height:50px;width:100%;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px">Supprimer</button>
            <button id="del-cancel" style="background:#E8E4DE;color:#0F0F0E;border:1px solid #E0DCD6;border-radius:50px;height:50px;width:100%;font-size:15px;font-weight:600;cursor:pointer">Annuler</button>
          </div>`;
        document.body.appendChild(el);
        el.querySelector('#del-confirm').onclick = () => { el.remove(); resolve(true);  };
        el.querySelector('#del-cancel').onclick  = () => { el.remove(); resolve(false); };
        el.addEventListener('click', ev => { if (ev.target === el) { el.remove(); resolve(false); } });
      });

      if (!confirmed) return;

      const { error } = await supabase.from('pronostics').delete().eq('id', pronoId).eq('user_id', user.id);
      if (error) { toast('Erreur : ' + error.message); return; }

      // Animate card out then remove
      const card = document.querySelector(`.feed-card[data-id="${pronoId}"]`);
      if (card) {
        card.style.transition = 'opacity 0.25s, transform 0.25s';
        card.style.opacity    = '0';
        card.style.transform  = 'scale(0.95)';
        setTimeout(() => card.remove(), 260);
      }
      toast('Pronostic supprimé 🗑');
    }

    function emptyState(icon, title, text) {
      return `<div class="empty-state"><div class="icon">${icon}</div><h3>${title}</h3><p>${text}</p></div>`;
    }
  </script>
</body>
</html>
