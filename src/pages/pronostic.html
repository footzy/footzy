<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Footzy — Pronostic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:             #F2F2F0;
      --color-surface:        #FFFFFF;
      --color-surface-score:  #F0EFED;
      --color-dark:           #0F0F0E;
      --color-green:          #00E05A;
      --color-green-dim:      #00C44F;
      --color-text-primary:   #0F0F0E;
      --color-text-secondary: #6B6966;
      --color-text-tertiary:  #A8A49F;
      --color-text-inverse:   #FFFFFF;
      --color-border:         #E8E6E2;
      --color-border-dashed:  #C8C5C0;
      --color-gold:           #F5A623;
      --color-danger:         #E8453C;
      --radius-sm:   8px;
      --radius-md:   12px;
      --radius-lg:   16px;
      --radius-xl:   20px;
      --radius-full: 9999px;
      --shadow-card: 0 1px 4px rgba(0,0,0,0.05), 0 0 0 1px var(--color-border);
    }

    html, body {
      height: 100%;
      background: var(--color-bg);
      font-family: 'Geist', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--color-text-primary);
    }

    /* ── Dot pattern ── */
    .page {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      padding-bottom: 100px;
      position: relative;
    }
    .page::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, #C8C5C0 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
      padding-top: 72px;
    }

    /* ── [A] Header ── */
    .header {
      position: fixed; top: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 430px;
      height: 56px;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
    }
    .header-back {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      color: var(--color-text-primary);
    }
    .header-logo {
      font: italic 900 1.45rem/1 'Geist';
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }
    .header-logo span { color: var(--color-green); }
    .header-pts {
      background: var(--color-dark);
      color: var(--color-text-inverse);
      padding: 7px 13px;
      border-radius: var(--radius-full);
      font: 700 0.78rem/1 'Geist';
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .header-pts-val { color: var(--color-green); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scoreBump {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
    @keyframes chipIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes toastPop {
      0%   { opacity: 0; transform: translateX(-50%) translateY(10px); }
      15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      75%  { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-8px); }
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .anim { opacity: 0; animation: fadeUp 320ms ease-out forwards; }
    .anim-1 { animation-delay: 40ms; }
    .anim-2 { animation-delay: 100ms; }
    .anim-3 { animation-delay: 160ms; }
    .anim-4 { animation-delay: 220ms; }

    /* ── [B] Card match ── */
    .match-header-card {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      padding: 16px;
      margin: 16px 16px 12px;
      box-shadow: var(--shadow-card);
      text-align: center;
    }
    .match-header-phase {
      font: 500 0.65rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-secondary);
      margin-bottom: 16px;
    }
    .match-header-teams {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 16px;
    }
    .match-header-team {
      display: flex; flex-direction: column;
      align-items: center; gap: 10px; flex: 1;
    }
    .match-header-flag { font-size: 2.8rem; line-height: 1; }
    .match-header-name {
      font: 700 1rem/1.2 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--color-text-primary);
    }
    .match-header-vs {
      font: italic 900 1.2rem/1 'Geist';
      color: var(--color-text-tertiary);
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }

    /* ── [C] Saisie score ── */
    .prono-section {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      padding: 20px 16px;
      margin: 0 16px 12px;
      box-shadow: var(--shadow-card);
    }
    .prono-title {
      font: italic 900 1.8rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: var(--color-text-primary);
      margin-bottom: 24px;
    }
    .score-grid {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .score-col {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
    }
    .score-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--color-surface);
      border: 1.5px solid var(--color-border);
      display: flex; align-items: center; justify-content: center;
      font: 700 1.2rem/1 'Geist';
      color: var(--color-text-primary);
      cursor: pointer;
      transition: background 120ms ease, transform 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    .score-btn:active {
      transform: scale(0.88);
      background: var(--color-surface-score);
    }
    .score-btn--minus { color: var(--color-text-secondary); }
    .score-btn--minus:disabled {
      opacity: 0.3;
      pointer-events: none;
    }
    .score-display {
      width: 100px; height: 100px;
      background: var(--color-surface-score);
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
    }
    .score-value {
      font: 900 4rem/1 'Geist';
      letter-spacing: -0.04em;
      color: var(--color-text-primary);
      white-space: nowrap;
    }
    .score-value.bump { animation: scoreBump 150ms ease-out; }
    .score-separator {
      font: 900 2rem/1 'Geist';
      color: var(--color-text-tertiary);
      flex-shrink: 0;
      align-self: center;
      margin-top: 24px;
    }

    /* ── [D] Buteurs ── */
    .buteurs-section {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      padding: 16px;
      margin: 0 16px 12px;
      box-shadow: var(--shadow-card);
    }
    .buteurs-label {
      font: 700 0.62rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-secondary);
      margin-bottom: 12px;
    }
    .buteurs-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip-buteur {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--color-green);
      color: var(--color-dark);
      padding: 8px 12px;
      border-radius: var(--radius-full);
      font: 700 0.78rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.02em;
      animation: chipIn 200ms ease-out;
      cursor: default;
    }
    .chip-buteur-remove {
      font-size: 0.7rem; cursor: pointer;
      opacity: 0.7; transition: opacity 150ms ease;
      padding: 2px; margin-left: 2px;
    }
    .chip-buteur-remove:hover { opacity: 1; }
    .chip-buteur--inactive {
      background: var(--color-surface-score);
      color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
      cursor: pointer;
      animation: none;
    }
    .chip-buteur--inactive:active { transform: scale(0.95); }
    .chip-add {
      display: inline-flex; align-items: center; gap: 5px;
      background: transparent;
      border: 1.5px dashed var(--color-border-dashed);
      color: var(--color-text-secondary);
      padding: 8px 12px;
      border-radius: var(--radius-full);
      font: 600 0.75rem/1 'Geist';
      cursor: pointer;
      transition: border-color 150ms ease, color 150ms ease;
    }
    .chip-add:hover { border-color: var(--color-green); color: var(--color-green); }
    .chip-add:active { transform: scale(0.96); }

    /* ── [E] Oracle IA ── */
    .oracle-section {
      background: var(--color-dark);
      border-radius: var(--radius-xl);
      padding: 20px 16px;
      margin: 0 16px 12px;
      position: relative;
      overflow: hidden;
    }
    .oracle-section::after {
      content: '⚙';
      position: absolute; right: -10px; bottom: -10px;
      font-size: 6rem; opacity: 0.04;
      color: var(--color-green);
      pointer-events: none; line-height: 1;
    }
    .oracle-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 16px;
    }
    .oracle-header-left { display: flex; align-items: center; gap: 8px; }
    .oracle-icon { color: var(--color-green); font-size: 1rem; }
    .oracle-title {
      font: 700 0.85rem/1 'Geist';
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--color-text-inverse);
    }
    .oracle-premium-badge {
      background: rgba(245,166,35,0.15);
      border: 1px solid rgba(245,166,35,0.4);
      color: var(--color-gold);
      padding: 4px 9px;
      border-radius: var(--radius-full);
      font: 700 0.6rem/1 'Geist';
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .oracle-score-row {
      display: flex; align-items: flex-end;
      justify-content: space-between; margin-bottom: 16px;
    }
    .oracle-score-label {
      font: 700 0.6rem/1 'Geist';
      text-transform: uppercase; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4); margin-bottom: 6px;
    }
    .oracle-score-value {
      font: italic 900 2.6rem/1 'Geist';
      letter-spacing: -0.03em;
      color: var(--color-green);
      white-space: nowrap;
    }
    .oracle-confidence-col { text-align: right; }
    .oracle-confidence-label {
      font: 700 0.6rem/1 'Geist';
      text-transform: uppercase; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4); margin-bottom: 6px;
    }
    .oracle-confidence-value {
      font: 700 1.1rem/1 'Geist';
      color: var(--color-green);
    }
    .oracle-analysis {
      font: 400 0.82rem/1.5 'Geist';
      color: rgba(255,255,255,0.7);
      position: relative;
    }
    .oracle-analysis strong { font-weight: 700; color: var(--color-text-inverse); }
    .oracle-analysis--blurred {
      filter: blur(5px);
      user-select: none; pointer-events: none;
    }
    .oracle-blur-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
    }
    .oracle-blur-cta {
      background: var(--color-green); color: var(--color-dark);
      padding: 10px 20px; border-radius: var(--radius-full);
      font: 700 0.8rem/1 'Geist';
      text-transform: uppercase; cursor: pointer; border: none;
    }

    /* Loading state oracle */
    .oracle-loading-text {
      font: 400 0.82rem/1.5 'Geist';
      color: rgba(255,255,255,0.35);
      font-style: italic;
    }

    /* ── [C2] Analyse automatique ── */
    .auto-section {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      padding: 16px;
      margin: 0 16px 12px;
      box-shadow: var(--shadow-card);
    }
    .auto-section-label {
      font: 700 0.62rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-secondary);
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .auto-section-label::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--color-green);
      flex-shrink: 0;
    }
    .auto-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      background: #F7F6F4;
      border-radius: var(--radius-md);
      margin-bottom: 7px;
    }
    .auto-row:last-child { margin-bottom: 0; }
    .auto-row-label { font: 500 0.78rem/1 'Geist'; color: var(--color-text-secondary); }
    .auto-row-value { font: 700 0.78rem/1 'Geist'; color: var(--color-text-primary); text-align: right; }
    .auto-val-green { color: var(--color-green-dim) !important; }
    .auto-val-grey  { color: var(--color-text-tertiary) !important; }
    .auto-val-amber { color: var(--color-gold) !important; }

    /* ── [C3] Score mi-temps ── */
    .halftime-section {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      padding: 20px 16px;
      margin: 0 16px 12px;
      box-shadow: var(--shadow-card);
    }
    .halftime-title {
      font: italic 900 1.3rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: var(--color-text-primary);
      margin-bottom: 20px;
    }
    .score-display--sm {
      width: 80px; height: 80px;
      background: var(--color-surface-score);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
    }
    .score-value--sm {
      font: 900 2.8rem/1 'Geist';
      letter-spacing: -0.04em;
      color: var(--color-text-primary);
    }
    .score-value--sm.bump { animation: scoreBump 150ms ease-out; }
    .score-btn--sm {
      width: 38px; height: 38px;
      font-size: 1rem;
    }

    /* ── [C4] Cartons jaunes ── */
    .cartons-section {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      padding: 16px;
      margin: 0 16px 12px;
      box-shadow: var(--shadow-card);
    }
    .cartons-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cartons-info-label {
      font: 700 0.62rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-secondary);
      margin-bottom: 3px;
    }
    .cartons-info-sub {
      font: 400 0.68rem/1 'Geist';
      color: var(--color-text-tertiary);
    }
    .cartons-stepper {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .cartons-count {
      font: 900 1.9rem/1 'Geist';
      letter-spacing: -0.03em;
      color: var(--color-text-primary);
      min-width: 28px;
      text-align: center;
    }

    /* ── Grille joueurs Premium ── */
    .player-grid-wrap {
      padding: 14px 16px;
      border-bottom: 1px solid var(--color-border);
    }
    .player-grid-team {
      font: 700 0.58rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-text-tertiary);
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .player-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 14px;
    }
    .player-grid:last-child { margin-bottom: 0; }
    .player-chip-select {
      background: var(--color-surface-score);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-full);
      padding: 7px 12px;
      font: 600 0.78rem/1 'Geist';
      color: var(--color-text-primary);
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    .player-chip-select:active {
      background: var(--color-green-bg);
      border-color: var(--color-green);
      color: var(--color-green-dim);
    }
    .player-chip-select.already {
      background: var(--color-green);
      border-color: var(--color-green);
      color: var(--color-dark);
      pointer-events: none;
    }
    .player-grid-loading {
      padding: 20px 16px;
      text-align: center;
      font: 400 0.82rem/1 'Geist';
      color: var(--color-text-tertiary);
      border-bottom: 1px solid var(--color-border);
    }
    .player-free-hint {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px;
      background: rgba(245,166,35,0.07);
      border-bottom: 1px solid rgba(245,166,35,0.2);
      font: 500 0.75rem/1.3 'Geist';
      color: #B87B10;
      cursor: pointer;
    }

    /* ── [F] CTA bar fixe ── */
    .cta-bar {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--color-surface);
      padding: 12px 16px calc(28px + env(safe-area-inset-bottom));
      box-shadow: 0 -1px 0 var(--color-border);
      z-index: 100;
    }
    .btn-valider {
      width: 100%; height: 56px;
      background: var(--color-green);
      color: var(--color-dark);
      border: none; border-radius: var(--radius-full);
      font: 900 1rem/1 'Geist';
      text-transform: uppercase; letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 150ms ease, transform 150ms ease;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-valider:active {
      transform: scale(0.97);
      background: var(--color-green-dim);
    }
    .btn-valider:disabled {
      background: var(--color-border);
      color: var(--color-text-tertiary);
      cursor: not-allowed; pointer-events: none;
    }
    .cta-deadline-msg {
      text-align: center;
      font: 500 0.75rem/1 'Geist';
      color: var(--color-text-secondary);
      margin-bottom: 8px;
    }

    /* ── Toast ── */
    .toast-success {
      position: fixed; bottom: 110px;
      left: 50%; transform: translateX(-50%);
      background: var(--color-dark); color: var(--color-green);
      padding: 12px 20px; border-radius: var(--radius-full);
      font: 700 0.82rem/1 'Geist';
      white-space: nowrap;
      animation: toastPop 2000ms ease forwards;
      z-index: 200;
    }

    /* ── Error message ── */
    .error-msg {
      font: 500 0.82rem/1 'Geist';
      color: var(--color-danger);
      margin-bottom: 8px; text-align: center;
    }

    /* ── Bottom sheet joueur ── */
    .sheet-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: flex-end; justify-content: center;
    }
    .sheet {
      background: var(--color-surface);
      border-radius: 20px 20px 0 0;
      width: 100%; max-width: 430px;
      max-height: 70vh;
      overflow-y: auto;
      padding: 0 0 calc(20px + env(safe-area-inset-bottom));
      animation: slideUp 280ms cubic-bezier(0.32,0.72,0,1);
    }
    .sheet-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--color-border); margin: 12px auto 0;
    }
    .sheet-title {
      font: 700 1rem/1 'Geist';
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--color-border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .sheet-close {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--color-bg); border: 1px solid var(--color-border);
      color: var(--color-text-primary);
      font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .player-search-input {
      width: calc(100% - 32px); margin: 12px 16px;
      height: 48px;
      background: var(--color-surface-score);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 0 14px;
      font: 500 0.92rem/1 'Geist';
      color: var(--color-text-primary);
      outline: none;
    }
    .player-search-input:focus { border-color: var(--color-green); }
    .player-result {
      padding: 14px 16px;
      font: 600 0.9rem/1 'Geist';
      cursor: pointer;
      border-bottom: 1px solid var(--color-border);
      transition: background 150ms;
    }
    .player-result:active { background: var(--color-bg); }
    .player-results-empty {
      padding: 24px 16px;
      text-align: center;
      font: 400 0.85rem/1 'Geist';
      color: var(--color-text-tertiary);
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- ── [A] Header ── -->
    <header class="header">
      <button class="header-back" id="btn-back" aria-label="Retour">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </button>
      <div class="header-logo">FOOTZY<span>.</span></div>
      <div class="header-pts"><span class="header-pts-val" id="pts-val">0</span> PTS</div>
    </header>

    <div class="content">

      <!-- ── [B] Card match ── -->
      <div class="match-header-card anim anim-1">
        <div class="match-header-phase" id="match-phase">CdM 2026 · Match</div>
        <div class="match-header-teams">
          <div class="match-header-team">
            <span class="match-header-flag" id="home-flag">🏳</span>
            <span class="match-header-name" id="home-name">—</span>
          </div>
          <span class="match-header-vs">vs</span>
          <div class="match-header-team">
            <span class="match-header-flag" id="away-flag">🏳</span>
            <span class="match-header-name" id="away-name">—</span>
          </div>
        </div>
      </div>

      <!-- ── [C] Saisie score ── -->
      <div class="prono-section anim anim-2">
        <div class="prono-title">Votre pronostic</div>
        <div class="score-grid">
          <!-- Home -->
          <div class="score-col">
            <button class="score-btn" id="home-plus"
              aria-label="Augmenter score domicile">+</button>
            <div class="score-display">
              <span class="score-value" id="home-score-val"
                aria-live="polite" aria-label="Score domicile : 0">0</span>
            </div>
            <button class="score-btn score-btn--minus" id="home-minus"
              aria-label="Diminuer score domicile" disabled>−</button>
          </div>

          <span class="score-separator">:</span>

          <!-- Away -->
          <div class="score-col">
            <button class="score-btn" id="away-plus"
              aria-label="Augmenter score extérieur">+</button>
            <div class="score-display">
              <span class="score-value" id="away-score-val"
                aria-live="polite" aria-label="Score extérieur : 0">0</span>
            </div>
            <button class="score-btn score-btn--minus" id="away-minus"
              aria-label="Diminuer score extérieur" disabled>−</button>
          </div>
        </div>
      </div>

      <!-- ── [C2] Analyse automatique (live) ── -->
      <div class="auto-section anim anim-3">
        <div class="auto-section-label">Analyse de ton prono</div>
        <div class="auto-row">
          <span class="auto-row-label">🏆 Résultat</span>
          <span class="auto-row-value" id="auto-result">—</span>
        </div>
        <div class="auto-row">
          <span class="auto-row-label">⚽ Les 2 équipes marquent</span>
          <span class="auto-row-value" id="auto-btts">—</span>
        </div>
        <div class="auto-row">
          <span class="auto-row-label">📊 Total de buts</span>
          <span class="auto-row-value" id="auto-total">—</span>
        </div>
      </div>

      <!-- ── [C3] Score mi-temps ── -->
      <div class="halftime-section anim anim-3">
        <div class="halftime-title">Score mi-temps</div>
        <div class="score-grid">
          <div class="score-col">
            <button class="score-btn score-btn--sm" id="ht-home-plus">+</button>
            <div class="score-display--sm">
              <span class="score-value--sm" id="ht-home-val">0</span>
            </div>
            <button class="score-btn score-btn--sm score-btn--minus" id="ht-home-minus" disabled>−</button>
          </div>
          <span class="score-separator" style="font-size:1.5rem;margin-top:16px">:</span>
          <div class="score-col">
            <button class="score-btn score-btn--sm" id="ht-away-plus">+</button>
            <div class="score-display--sm">
              <span class="score-value--sm" id="ht-away-val">0</span>
            </div>
            <button class="score-btn score-btn--sm score-btn--minus" id="ht-away-minus" disabled>−</button>
          </div>
        </div>
      </div>

      <!-- ── [C4] Cartons jaunes ── -->
      <div class="cartons-section anim anim-3">
        <div class="cartons-row">
          <div>
            <div class="cartons-info-label">🟨 Cartons jaunes</div>
            <div class="cartons-info-sub">Total dans le match</div>
          </div>
          <div class="cartons-stepper">
            <button class="score-btn score-btn--minus" id="yc-minus" disabled>−</button>
            <span class="cartons-count" id="yc-val">0</span>
            <button class="score-btn" id="yc-plus">+</button>
          </div>
        </div>
      </div>

      <!-- ── [D] Buteurs ── -->
      <div class="buteurs-section anim anim-3">
        <div class="buteurs-label">Buteurs</div>
        <div class="buteurs-chips" id="buteurs-chips">
          <button class="chip-add" id="chip-add-btn">+ Joueur</button>
        </div>
      </div>

      <!-- ── [E] Oracle IA ── -->
      <div class="oracle-section anim anim-4" id="oracle-section">
        <div class="oracle-header">
          <div class="oracle-header-left">
            <span class="oracle-icon">✦</span>
            <span class="oracle-title">Oracle IA</span>
          </div>
          <span class="oracle-premium-badge" id="oracle-badge">⭐ PREMIUM</span>
        </div>
        <div id="oracle-body">
          <p class="oracle-loading-text">Chargement de l'analyse…</p>
        </div>
      </div>

    </div>

    <!-- ── [F] CTA fixe ── -->
    <div class="cta-bar">
      <div class="error-msg" id="error-msg" style="display:none"></div>
      <div class="cta-deadline-msg" id="deadline-msg" style="display:none">Délai de pronostic dépassé</div>
      <button class="btn-valider" id="btn-valider">Valider mon prono</button>
    </div>

  </div>

  <script type="module">
    import { supabase, requireAuth, getCurrentProfile } from '/src/js/lib/supabase.js';
    import { searchPlayer, getLineups } from '/src/js/lib/football-api.js';
    import { isBeforeKickoff } from '/src/js/lib/utils.js';
    import { checkPremiumAccess, createCheckout, PLANS } from '/src/js/lib/whop.js';

    (async () => {
    const user    = await requireAuth();
    if (!user) throw new Error('not authed');
    const profile = await getCurrentProfile();
    const isPremium = await checkPremiumAccess(profile);

    // Header pts
    if (profile) {
      document.getElementById('pts-val').textContent = (profile.points_totaux || 0).toLocaleString('fr-FR');
    }

    // Match ID from URL
    const params  = new URLSearchParams(location.search);
    const matchId = params.get('id');
    if (!matchId) { window.location.href = '/src/pages/home.html'; return; }

    // Bouton retour — fiable même en PWA / deep link
    document.getElementById('btn-back').addEventListener('click', () => {
      if (history.length > 1) {
        history.back();
      } else {
        window.location.href = matchId
          ? '/src/pages/match.html?id=' + matchId
          : '/src/pages/home.html';
      }
    });

    // Load match
    const { data: match } = await supabase.from('matchs').select('*').eq('id', matchId).single();
    if (!match) { window.location.href = '/src/pages/home.html'; return; }

    const beforeKickoff = isBeforeKickoff(match.kickoff_at);

    // Fill match info
    document.getElementById('home-flag').textContent = match.home_flag || '🏳';
    document.getElementById('home-name').textContent = match.home_team || '—';
    document.getElementById('away-flag').textContent = match.away_flag || '🏳';
    document.getElementById('away-name').textContent = match.away_team || '—';

    // Phase label
    const phaseMap = { groupes: 'Groupe', huitiemes: '1/8 de finale', quarts: 'Quart', demis: 'Demi-finale', finale: 'Finale' };
    const phaseLabel = phaseMap[match.phase] || match.phase || 'Match';
    const kickoffDate = new Date(match.kickoff_at).toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
    document.getElementById('match-phase').textContent = `CdM 2026 · ${phaseLabel} · ${kickoffDate}`;

    // Deadline
    if (!beforeKickoff) {
      document.getElementById('deadline-msg').style.display = 'block';
      document.getElementById('btn-valider').disabled = true;
      ['home-plus','away-plus','home-minus','away-minus',
       'ht-home-plus','ht-away-plus','ht-home-minus','ht-away-minus',
       'yc-plus','yc-minus'].forEach(id => {
        const el = document.getElementById(id); if (el) el.disabled = true;
      });
      document.getElementById('chip-add-btn').style.display = 'none';
    }


    // State
    let homeScore = 0, awayScore = 0;
    let htHomeScore = 0, htAwayScore = 0;
    let yellowCards = 0;
    let existingPronoId = null;
    let buteurs = [];
    const MAX_SCORE = 15;
    const MAX_YC    = 12;

    // ── Analyse automatique (live) ──
    const homeShort = (match.home_team || 'Dom.').split(/[\s-]/)[0];
    const awayShort = (match.away_team || 'Ext.').split(/[\s-]/)[0];

    function updateAutoAnalysis() {
      const total = homeScore + awayScore;

      // Résultat 1 / N / 2
      const resEl = document.getElementById('auto-result');
      if (homeScore > awayScore) {
        resEl.textContent = `Victoire ${homeShort} (1)`;
        resEl.className = 'auto-row-value auto-val-green';
      } else if (awayScore > homeScore) {
        resEl.textContent = `Victoire ${awayShort} (2)`;
        resEl.className = 'auto-row-value auto-val-green';
      } else {
        resEl.textContent = 'Match nul (N)';
        resEl.className = 'auto-row-value auto-val-amber';
      }

      // BTTS
      const bttsEl = document.getElementById('auto-btts');
      if (homeScore > 0 && awayScore > 0) {
        bttsEl.textContent = 'Oui ✓';
        bttsEl.className = 'auto-row-value auto-val-green';
      } else {
        bttsEl.textContent = 'Non';
        bttsEl.className = 'auto-row-value auto-val-grey';
      }

      // Over/Under
      const totEl = document.getElementById('auto-total');
      if (total >= 3) {
        totEl.textContent = `Over 2.5 — ${total} buts`;
        totEl.className = 'auto-row-value auto-val-green';
      } else if (total === 2) {
        totEl.textContent = `Under 2.5 — ${total} buts`;
        totEl.className = 'auto-row-value auto-val-amber';
      } else {
        totEl.textContent = `Under 1.5 — ${total} but${total !== 1 ? 's' : ''}`;
        totEl.className = 'auto-row-value auto-val-grey';
      }
    }
    updateAutoAnalysis();

    // ── Score steppers ──
    function updateScore(team, delta) {
      if (team === 'home') {
        homeScore = Math.max(0, Math.min(MAX_SCORE, homeScore + delta));
        // Clamp mi-temps si nécessaire
        if (htHomeScore > homeScore) {
          htHomeScore = homeScore;
          document.getElementById('ht-home-val').textContent = htHomeScore;
          document.getElementById('ht-home-minus').disabled = htHomeScore === 0;
        }
        document.getElementById('ht-home-plus').disabled = !beforeKickoff || htHomeScore >= homeScore;
      } else {
        awayScore = Math.max(0, Math.min(MAX_SCORE, awayScore + delta));
        if (htAwayScore > awayScore) {
          htAwayScore = awayScore;
          document.getElementById('ht-away-val').textContent = htAwayScore;
          document.getElementById('ht-away-minus').disabled = htAwayScore === 0;
        }
        document.getElementById('ht-away-plus').disabled = !beforeKickoff || htAwayScore >= awayScore;
      }
      animateScore(team);
      updateMinusBtns();
      updateAutoAnalysis();
      if (navigator.vibrate) navigator.vibrate(8);
    }

    function animateScore(team) {
      const el = document.getElementById(team === 'home' ? 'home-score-val' : 'away-score-val');
      el.textContent = team === 'home' ? homeScore : awayScore;
      el.setAttribute('aria-label', `Score ${team === 'home' ? 'domicile' : 'extérieur'} : ${el.textContent}`);
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');
    }

    function updateMinusBtns() {
      document.getElementById('home-minus').disabled = homeScore === 0;
      document.getElementById('away-minus').disabled = awayScore === 0;
    }

    document.getElementById('home-plus').addEventListener('click',  () => updateScore('home', +1));
    document.getElementById('home-minus').addEventListener('click', () => updateScore('home', -1));
    document.getElementById('away-plus').addEventListener('click',  () => updateScore('away', +1));
    document.getElementById('away-minus').addEventListener('click', () => updateScore('away', -1));

    // ── Score mi-temps ──
    function updateHT(team, delta) {
      const max = team === 'home' ? homeScore : awayScore;
      if (team === 'home') {
        htHomeScore = Math.max(0, Math.min(max, htHomeScore + delta));
        const el = document.getElementById('ht-home-val');
        el.textContent = htHomeScore;
        el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
        document.getElementById('ht-home-minus').disabled = htHomeScore === 0;
        document.getElementById('ht-home-plus').disabled  = htHomeScore >= max;
      } else {
        htAwayScore = Math.max(0, Math.min(max, htAwayScore + delta));
        const el = document.getElementById('ht-away-val');
        el.textContent = htAwayScore;
        el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
        document.getElementById('ht-away-minus').disabled = htAwayScore === 0;
        document.getElementById('ht-away-plus').disabled  = htAwayScore >= max;
      }
      if (navigator.vibrate) navigator.vibrate(8);
    }

    document.getElementById('ht-home-plus').addEventListener('click',  () => updateHT('home', +1));
    document.getElementById('ht-home-minus').addEventListener('click', () => updateHT('home', -1));
    document.getElementById('ht-away-plus').addEventListener('click',  () => updateHT('away', +1));
    document.getElementById('ht-away-minus').addEventListener('click', () => updateHT('away', -1));

    // ── Cartons jaunes ──
    function updateYC(delta) {
      yellowCards = Math.max(0, Math.min(MAX_YC, yellowCards + delta));
      document.getElementById('yc-val').textContent = yellowCards;
      document.getElementById('yc-minus').disabled = yellowCards === 0;
      if (navigator.vibrate) navigator.vibrate(8);
    }
    document.getElementById('yc-plus').addEventListener('click',  () => updateYC(+1));
    document.getElementById('yc-minus').addEventListener('click', () => updateYC(-1));

    // ── Buteurs chips ──
    function renderChips() {
      const container = document.getElementById('buteurs-chips');
      const addBtn    = document.getElementById('chip-add-btn');
      // Remove existing chips (keep addBtn)
      container.querySelectorAll('.chip-buteur').forEach(c => c.remove());

      buteurs.forEach((nom, idx) => {
        const chip = document.createElement('span');
        chip.className = 'chip-buteur';
        chip.innerHTML = `${nom} <span class="chip-buteur-remove" data-idx="${idx}" aria-label="Supprimer ${nom}">×</span>`;
        container.insertBefore(chip, addBtn);
      });

      // Hide add btn if max reached
      addBtn.style.display = buteurs.length >= 3 ? 'none' : 'inline-flex';

      // Remove listeners
      container.querySelectorAll('.chip-buteur-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          buteurs.splice(parseInt(btn.dataset.idx), 1);
          renderChips();
        });
      });
    }

    document.getElementById('chip-add-btn').addEventListener('click', openPlayerSheet);

    function openPlayerSheet() {
      const overlay = document.createElement('div');
      overlay.className = 'sheet-overlay';
      overlay.innerHTML = `
        <div class="sheet" style="max-height:82vh">
          <div class="sheet-handle"></div>
          <div class="sheet-title">
            <span>Choisir un buteur (max 3)</span>
            <button class="sheet-close" id="sheet-close">✕</button>
          </div>
          ${isPremium
            ? `<div class="player-grid-loading" id="player-grid-area">⏳ Chargement des joueurs…</div>`
            : `<div class="player-free-hint" id="player-free-hint">
                ⭐ <span>Passe Premium pour voir la liste des joueurs directement</span>
               </div>`}
          <input class="player-search-input" id="player-search"
            placeholder="${isPremium ? 'Ou rechercher un joueur…' : 'Rechercher un joueur…'}" autocomplete="off" />
          <div id="player-results"></div>
        </div>`;
      document.body.appendChild(overlay);

      const input   = overlay.querySelector('#player-search');
      const results = overlay.querySelector('#player-results');

      overlay.querySelector('#sheet-close').addEventListener('click', () => overlay.remove());
      overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

      // Upsell si Free clique sur le hint
      overlay.querySelector('#player-free-hint')?.addEventListener('click', () => {
        overlay.remove();
        createCheckout(PLANS.premium, user.id, user.email);
      });

      // ── Premium : charger les joueurs ──
      if (isPremium) {
        (async () => {
          const gridArea = overlay.querySelector('#player-grid-area');
          try {
            let home = [], away = [];

            // 1. Essai composition API (si fixture_id disponible)
            const fixtureId = match.fixture_id || match.api_id || match.external_id;
            if (fixtureId) {
              const data = await getLineups(fixtureId);
              const lineups = data?.response || [];
              lineups.forEach(t => {
                const players = [
                  ...(t.startXI || []),
                  ...(t.substitutes || [])
                ].map(p => p?.player?.name).filter(Boolean);
                // Associer à home ou away par nom d'équipe
                const tname = (t.team?.name || '').toLowerCase();
                const hname = (match.home_team || '').toLowerCase().slice(0, 5);
                if (tname.includes(hname) || hname.includes(tname.slice(0, 5))) {
                  home = players;
                } else {
                  away = players;
                }
              });
            }

            // Pas de composition disponible → message informatif
            if (!home.length && !away.length) {
              gridArea.className = '';
              gridArea.style.cssText = 'padding:14px 16px;border-bottom:1px solid var(--color-border)';
              gridArea.innerHTML = `<div style="font:400 0.8rem/1.4 'Geist';color:var(--color-text-tertiary);display:flex;align-items:center;gap:8px">
                <span>📋</span>
                <span>Composition indisponible pour ce match.<br>Utilisez la recherche ci-dessous.</span>
              </div>`;
              setTimeout(() => input.focus(), 100);
              return;
            }

            function chipsHtml(players) {
              return players.map(nom => {
                const already = buteurs.includes(nom);
                return `<button class="player-chip-select${already ? ' already' : ''}" data-name="${nom}">${nom}${already ? ' ✓' : ''}</button>`;
              }).join('');
            }

            gridArea.className = 'player-grid-wrap';
            gridArea.innerHTML = `
              ${home.length ? `
                <div class="player-grid-team">${match.home_flag || ''} ${match.home_team || ''}</div>
                <div class="player-grid" id="grid-home">${chipsHtml(home)}</div>` : ''}
              ${away.length ? `
                <div class="player-grid-team">${match.away_flag || ''} ${match.away_team || ''}</div>
                <div class="player-grid" id="grid-away">${chipsHtml(away)}</div>` : ''}`;

            // Listeners sur les chips
            gridArea.querySelectorAll('.player-chip-select:not(.already)').forEach(chip => {
              chip.addEventListener('click', () => {
                const nom = chip.dataset.name;
                if (buteurs.length >= 3) return;
                if (!buteurs.includes(nom)) {
                  buteurs.push(nom);
                  renderChips();
                }
                overlay.remove();
                if (navigator.vibrate) navigator.vibrate(20);
              });
            });

          } catch(e) {
            console.warn('Player grid failed', e);
            const g = overlay.querySelector('#player-grid-area');
            if (g) {
              g.className = '';
              g.style.cssText = 'padding:14px 16px;border-bottom:1px solid var(--color-border)';
              g.innerHTML = `<div style="font:400 0.8rem/1.4 'Geist';color:var(--color-text-tertiary);display:flex;align-items:center;gap:8px">
                <span>📋</span><span>Composition indisponible. Utilisez la recherche.</span>
              </div>`;
            }
            setTimeout(() => input.focus(), 100);
          }
        })();
      }

      // ── Recherche (tous) ──
      setTimeout(() => input.focus(), 300);
      let searchTimeout;
      input.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        const q = input.value.trim();
        if (q.length < 2) { results.innerHTML = ''; return; }
        searchTimeout = setTimeout(async () => {
          try {
            const res = await searchPlayer(q);
            if (!res.length) {
              results.innerHTML = '<div class="player-results-empty">Aucun joueur trouvé</div>';
              return;
            }
            results.innerHTML = res.slice(0, 6).map(p => {
              const name = p.name || p.player?.name || p.strPlayer || String(p);
              return `<div class="player-result" data-name="${name}">${name}</div>`;
            }).join('');
            results.querySelectorAll('.player-result').forEach(item => {
              item.addEventListener('click', () => {
                const nom = item.dataset.name;
                if (buteurs.length < 3 && !buteurs.includes(nom)) {
                  buteurs.push(nom);
                  renderChips();
                }
                overlay.remove();
              });
            });
          } catch(e) {
            console.warn('Player search failed', e);
          }
        }, 350);
      });
    }

    // ── Load existing prono ──
    async function loadExistingProno() {
      try {
        const { data } = await supabase.from('pronostics').select('*')
          .eq('user_id', user.id).eq('match_id', matchId)
          .order('created_at', { ascending: false })
          .limit(1).maybeSingle();

        if (data) {
          homeScore   = data.home_score   ?? 0;
          awayScore   = data.away_score   ?? 0;
          buteurs     = data.buteurs      || [];
          htHomeScore = data.ht_home      ?? 0;
          htAwayScore = data.ht_away      ?? 0;
          yellowCards = data.yellow_cards ?? 0;

          animateScore('home'); animateScore('away');
          updateMinusBtns();
          renderChips();
          updateAutoAnalysis();

          document.getElementById('ht-home-val').textContent = htHomeScore;
          document.getElementById('ht-away-val').textContent = htAwayScore;
          document.getElementById('yc-val').textContent      = yellowCards;
          document.getElementById('ht-home-minus').disabled  = htHomeScore === 0;
          document.getElementById('ht-away-minus').disabled  = htAwayScore === 0;
          document.getElementById('ht-home-plus').disabled   = !beforeKickoff || htHomeScore >= homeScore;
          document.getElementById('ht-away-plus').disabled   = !beforeKickoff || htAwayScore >= awayScore;
          document.getElementById('yc-minus').disabled       = yellowCards === 0;

          document.getElementById('btn-valider').textContent = 'Modifier mon prono';
          existingPronoId = data.id;
        } else {
          homeScore = 0; awayScore = 0; buteurs = [];
          htHomeScore = 0; htAwayScore = 0; yellowCards = 0;
          animateScore('home'); animateScore('away');
          updateMinusBtns(); renderChips(); updateAutoAnalysis();
          document.getElementById('btn-valider').textContent = 'Valider mon prono';
          existingPronoId = null;
        }
      } catch(e) {
        console.warn('Load prono failed silently', e);
      }
    }

    await loadExistingProno();

    // ── Oracle IA ──
    if (!isPremium) {
      document.getElementById('oracle-badge').textContent = '🔒 PREMIUM';
      document.getElementById('oracle-badge').style.cssText =
        'background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.35)';
    }

    try {
      const { data: { session } } = await supabase.auth.getSession();
      const jwt = session?.access_token;

      const res = await fetch('/api/oracle', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${jwt}` },
        body: JSON.stringify({
          matchId: match.id, homeTeam: match.home_team, awayTeam: match.away_team,
          homeFlag: match.home_flag, awayFlag: match.away_flag,
          phase: match.phase, kickoffAt: match.kickoff_at,
        })
      });

      const oracleData = res.ok ? await res.json() : null;

      const oracleBody = document.getElementById('oracle-body');
      if (oracleData) {
        const scoreHtml = `
          <div class="oracle-score-row">
            <div>
              <div class="oracle-score-label">Score prédit</div>
              <div class="oracle-score-value">${oracleData.home_score ?? '?'}–${oracleData.away_score ?? '?'}</div>
            </div>
            <div class="oracle-confidence-col">
              <div class="oracle-confidence-label">Confiance</div>
              <div class="oracle-confidence-value">↗ ${oracleData.confidence ?? 0}%</div>
            </div>
          </div>`;

        const analysisText = oracleData.analysis || '—';
        const analysisHtml = isPremium
          ? `<div class="oracle-analysis">${analysisText}</div>`
          : `<div style="position:relative">
               <div class="oracle-analysis oracle-analysis--blurred">${analysisText}</div>
               <div class="oracle-blur-overlay">
                 <button class="oracle-blur-cta" id="oracle-unlock-btn">Débloquer l'analyse — Premium</button>
               </div>
             </div>`;

        oracleBody.innerHTML = scoreHtml + analysisHtml;

        // Chips suggestions Oracle (buteurs probables)
        if (oracleData.buteur && buteurs.length < 3) {
          const container = document.getElementById('buteurs-chips');
          const addBtn    = document.getElementById('chip-add-btn');
          const suggested = [oracleData.buteur];
          suggested.forEach(nom => {
            if (buteurs.includes(nom)) return;
            const chip = document.createElement('span');
            chip.className = 'chip-buteur chip-buteur--inactive';
            chip.textContent = nom;
            chip.addEventListener('click', () => {
              if (buteurs.length >= 3) return;
              buteurs.push(nom);
              chip.remove();
              renderChips();
            });
            container.insertBefore(chip, addBtn);
          });
        }

        document.getElementById('oracle-unlock-btn')?.addEventListener('click', () => {
          createCheckout(PLANS.premium, user.id, user.email);
        });
      } else {
        document.getElementById('oracle-body').innerHTML =
          '<p class="oracle-loading-text">Analyse indisponible pour ce match.</p>';
      }
    } catch(e) {
      console.warn('Oracle failed silently', e);
      document.getElementById('oracle-body').innerHTML =
        '<p class="oracle-loading-text">Analyse indisponible pour ce match.</p>';
    }

    // ── Valider — synchronise le score sur tous les groupes ──
    document.getElementById('btn-valider').addEventListener('click', async () => {
      const errEl = document.getElementById('error-msg');
      errEl.style.display = 'none';
      if (!beforeKickoff) return;


      const btn = document.getElementById('btn-valider');
      btn.disabled = true;
      btn.textContent = 'Enregistrement…';

      const coreFields = {
        home_score: homeScore,
        away_score: awayScore,
        buteurs:    buteurs.filter(Boolean),
      };
      // Champs bonus (nécessitent colonnes DB ht_home, ht_away, yellow_cards)
      const scoreFields = {
        ...coreFields,
        ht_home:      htHomeScore,
        ht_away:      htAwayScore,
        yellow_cards: yellowCards,
      };
      const selectedGroupeId = null; // groupe_id géré par la page groupe dédiée

      try {
        // Récupérer tous les pronos existants pour user+match
        const { data: allPronos } = await supabase.from('pronostics')
          .select('id, groupe_id')
          .eq('user_id', user.id)
          .eq('match_id', matchId);

        // Helper : save avec fallback si colonnes bonus absentes
        async function saveFields(method, data, filter) {
          let res = await method(data);
          if (filter) res = filter(res);
          if (res.error?.message?.includes('column')) {
            // Colonnes bonus manquantes : retry avec champs core seulement
            const coreData = Object.fromEntries(
              Object.entries(data).filter(([k]) => ['home_score','away_score','buteurs','user_id','match_id','groupe_id'].includes(k))
            );
            res = await method(coreData);
            if (filter) res = filter(res);
          }
          return res.error;
        }

        if (allPronos?.length) {
          // Mettre à jour le score sur TOUS les pronos existants (synchronisation)
          const error = await saveFields(
            (d) => supabase.from('pronostics').update(d).eq('user_id', user.id).eq('match_id', matchId),
            scoreFields
          );
          if (error) throw error;

          // Créer un prono pour le contexte sélectionné si absent
          if (selectedGroupeId) {
            if (!allPronos.some(p => p.groupe_id === selectedGroupeId)) {
              await supabase.from('pronostics').insert({
                user_id: user.id, match_id: matchId, groupe_id: selectedGroupeId, ...scoreFields
              });
            }
          } else {
            // Public : créer une row groupe_id = null si absente
            if (!allPronos.some(p => p.groupe_id === null)) {
              await supabase.from('pronostics').insert({
                user_id: user.id, match_id: matchId, groupe_id: null, ...scoreFields
              });
            }
          }
        } else {
          // Premier prono : insérer pour le contexte sélectionné
          const error = await saveFields(
            (d) => supabase.from('pronostics').insert(d),
            { user_id: user.id, match_id: matchId, groupe_id: selectedGroupeId, ...scoreFields }
          );
          if (error) throw error;
        }

        if (navigator.vibrate) navigator.vibrate([20, 10, 40]);
        showToast('Prono enregistré ! ✓');
        btn.textContent = 'Modifier mon prono';
        btn.disabled = false;
        existingPronoId = true;

      } catch(e) {
        errEl.textContent = 'Erreur : ' + (e.message || 'Réessaie');
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = existingPronoId ? 'Modifier mon prono' : 'Valider mon prono';
      }
    });

    function showToast(msg) {
      const el = document.createElement('div');
      el.className = 'toast-success';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2100);
    }
    })();
  </script>
</body>
</html>
