<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Footzy — Accueil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:             #F2F2F0;
      --color-surface:        #FFFFFF;
      --color-dark:           #0F0F0E;
      --color-green:          #00E05A;
      --color-green-dim:      #00C44F;
      --color-green-bg:       #E8FFF1;
      --color-text-primary:   #0F0F0E;
      --color-text-secondary: #6B6966;
      --color-text-tertiary:  #A8A49F;
      --color-text-inverse:   #FFFFFF;
      --color-border:         #E8E6E2;
      --color-danger:         #E8453C;
      --color-danger-bg:      #FEF2F2;
      --radius-sm:   8px;
      --radius-md:   12px;
      --radius-lg:   16px;
      --radius-xl:   20px;
      --radius-full: 9999px;
      --shadow-card: 0 1px 4px rgba(0,0,0,0.05), 0 0 0 1px var(--color-border);
      --shadow-live: 0 0 0 2px var(--color-green);
    }

    html, body {
      height: 100%;
      background: var(--color-bg);
      font-family: 'Geist', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--color-text-primary);
      overflow-x: hidden; /* ← empêche le scroll horizontal sur iPhone */
    }

    /* ── Dot pattern background ── */
    .page {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      padding-bottom: 90px;
      position: relative;
      overflow-x: hidden; /* ← bloque tout débordement interne */
    }
    .page::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #C8C5C0 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
      padding-top: 72px;
    }

    /* ── Header ── */
    .header {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: 56px;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
    }
    .header-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--color-green);
      display: flex; align-items: center; justify-content: center;
      font: 700 0.9rem/1 'Geist';
      color: var(--color-dark);
      cursor: pointer;
      overflow: hidden;
      flex-shrink: 0;
    }
    .header-logo {
      font: italic 900 1.45rem/1 'Geist';
      letter-spacing: -0.03em;
      text-transform: uppercase;
      color: var(--color-text-primary);
    }
    .header-logo span { color: var(--color-green); }
    .header-pts {
      background: var(--color-dark);
      color: var(--color-text-inverse);
      padding: 7px 13px;
      border-radius: var(--radius-full);
      font: 700 0.78rem/1 'Geist';
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .header-pts-val { color: var(--color-green); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.85); }
    }
    .anim { opacity: 0; animation: fadeUp 320ms ease-out forwards; }
    .anim-1 { animation-delay: 40ms; }
    .anim-2 { animation-delay: 100ms; }
    .anim-3 { animation-delay: 160ms; }
    .anim-4 { animation-delay: 220ms; }
    .anim-5 { animation-delay: 280ms; }

    /* ── Titres de section grands ── */
    .section-big-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 0 16px;
      margin-bottom: 14px;
      gap: 10px;
      overflow: hidden; /* évite le débordement du titre sur petits écrans */
    }
    .section-big-title {
      font: italic 900 2.2rem/0.95 'Geist';
      font-size: clamp(1.3rem, 7vw, 2.2rem); /* légèrement réduit pour petits écrans */
      text-transform: uppercase;
      letter-spacing: -0.03em;
      color: var(--color-text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
      min-width: 0;
      flex: 1;
    }
    .hero-live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--color-green);
      color: var(--color-dark);
      padding: 5px 10px 5px 8px;
      border-radius: var(--radius-full);
      font: 700 0.72rem/1 'Geist';
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--color-dark);
      animation: livePulse 1.4s ease-in-out infinite;
    }

    /* ── Section label (petit — défi, actu) ── */
    .section-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font: 700 0.62rem/1 'Geist';
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-secondary);
      padding: 0 16px;
      margin-bottom: 12px;
    }
    .section-label::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--color-green);
      flex-shrink: 0;
    }

    /* ── Section spacing ── */
    .matches-live-section  { padding-top: 20px; margin-bottom: 28px; }
    .upcoming-section      { margin-bottom: 28px; }
    .defi-section          { margin-bottom: 28px; }
    .actu-section          { margin-bottom: 28px; }

    /* ── Carte countdown (prochain match) ── */
    .match-countdown-card {
      flex-shrink: 0;
      width: min(calc(100vw - 48px), 382px);
      background:
        radial-gradient(ellipse at 50% 85%, rgba(0,224,90,0.12) 0%, transparent 60%),
        #0F0F0E;
      border-radius: var(--radius-xl);
      padding: 18px 16px;
      box-shadow: 0 0 0 1px rgba(0,224,90,0.22), 0 14px 44px rgba(0,0,0,0.38);
      scroll-snap-align: start;
      position: relative;
      overflow: hidden;
    }
    .match-countdown-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--color-green);
      border-radius: 20px 20px 0 0;
    }
    /* Centre du terrain — texture subtile */
    .match-countdown-card::after {
      content: '';
      position: absolute;
      width: 170px; height: 170px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.045);
      bottom: -60px; left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02);
    }
    .match-countdown-badge {
      background: var(--color-green);
      color: var(--color-dark);
      padding: 5px 11px;
      border-radius: var(--radius-sm);
      font: 700 0.72rem/1 'Geist';
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .countdown-vs-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }
    .countdown-vs {
      font: italic 900 2.8rem/1 'Geist';
      letter-spacing: -0.04em;
      color: rgba(0,224,90,0.18);
    }
    .countdown-kickoff {
      font: 700 0.78rem/1 'Geist';
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.02em;
    }

    /* ── Carousel live ── */
    .matches-live-scroll {
      display: flex;
      gap: 10px;
      padding: 0 16px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
    }
    .matches-live-scroll::-webkit-scrollbar { display: none; }

    .match-live-card {
      flex-shrink: 0;
      width: min(calc(100vw - 48px), 382px);
      background:
        radial-gradient(ellipse at 50% 85%, rgba(0,224,90,0.09) 0%, transparent 58%),
        #0F0F0E;
      border-radius: var(--radius-xl);
      padding: 18px 16px;
      box-shadow: 0 0 0 2px var(--color-green), 0 8px 36px rgba(0,224,90,0.22);
      scroll-snap-align: start;
      cursor: pointer;
      transition: transform 150ms ease, box-shadow 150ms ease;
      position: relative;
      overflow: hidden;
    }
    .match-live-card:active { transform: scale(0.98); box-shadow: 0 0 0 2px var(--color-green), 0 4px 16px rgba(0,224,90,0.15); }
    .match-live-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--color-green);
      border-radius: 20px 20px 0 0;
    }
    .match-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .match-phase {
      font: 500 0.6rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-secondary);
    }
    .match-minute-badge {
      background: var(--color-green);
      color: var(--color-dark);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font: 700 0.72rem/1 'Geist';
    }
    .match-score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 14px;
    }
    .match-team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .match-team-flag  { font-size: 2rem; line-height: 1; }
    .match-team-code  {
      font: 700 0.78rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-secondary);
    }
    .match-score {
      font: italic 900 3rem/1 'Geist';
      letter-spacing: -0.04em;
      color: var(--color-text-primary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Prono banner */
    .prono-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      margin-top: 4px;
    }
    .prono-banner--live   { background: var(--color-green-bg); border: 1.5px solid var(--color-green); }
    .prono-banner--danger { background: var(--color-danger-bg); border: 1.5px solid var(--color-danger); }
    .prono-banner--none   { background: #F7F6F4; border: 1.5px solid var(--color-border); }
    .prono-banner-left    { display: flex; align-items: center; gap: 7px; }
    .prono-banner-dot     { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .prono-banner--live   .prono-banner-dot    { background: var(--color-green); }
    .prono-banner--danger .prono-banner-dot    { background: var(--color-danger); }
    .prono-banner--none   .prono-banner-dot    { background: var(--color-text-tertiary); }
    .prono-banner-status  { font: 700 0.68rem/1 'Geist'; text-transform: uppercase; letter-spacing: 0.06em; }
    .prono-banner--live   .prono-banner-status { color: var(--color-green-dim); }
    .prono-banner--danger .prono-banner-status { color: var(--color-danger); }
    .prono-banner--none   .prono-banner-status { color: var(--color-text-secondary); }
    .prono-banner-score   { font: 700 0.78rem/1 'Geist'; color: var(--color-text-secondary); }
    .prono-banner-pts     { font: 700 0.72rem/1 'Geist'; color: var(--color-green-dim); }
    .prono-banner-cta     {
      font: 600 0.72rem/1 'Geist';
      color: var(--color-text-secondary);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      padding: 5px 10px;
      border-radius: var(--radius-full);
      text-decoration: none;
      cursor: pointer;
    }

    /* ── Empty state ── */
    .empty-live {
      text-align: center;
      padding: 40px 16px;
      color: var(--color-text-tertiary);
    }
    .empty-live-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-live p    { font: 400 0.88rem/1 'Geist'; }

    /* ── Prochains matchs ── */
    .match-upcoming-card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin: 0 16px 8px;
      box-shadow: var(--shadow-card);
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 150ms ease;
    }
    .match-upcoming-card:active { transform: scale(0.98); }
    .match-upcoming-team {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }
    .match-upcoming-team.right { justify-content: flex-end; }
    .match-upcoming-team-flag  { font-size: 1.5rem; line-height: 1; flex-shrink: 0; }
    .match-upcoming-team-name  {
      font: 700 0.78rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80px;
    }
    .match-upcoming-time-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex-shrink: 0;
      min-width: 72px;
    }
    .match-upcoming-date {
      font: 600 0.55rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--color-text-secondary);
    }
    .match-upcoming-hour {
      font: 900 1.1rem/1 'Geist';
      color: var(--color-text-primary);
      letter-spacing: -0.02em;
    }
    .match-upcoming-prono-done {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--color-green);
      flex-shrink: 0;
    }

    /* ── Défi quotidien ── */
    .defi-card {
      background: var(--color-dark);
      border-radius: var(--radius-xl);
      padding: 20px 16px;
      margin: 0 16px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .defi-card::after {
      content: '⚡';
      position: absolute;
      right: -8px; top: -8px;
      font-size: 5rem;
      opacity: 0.06;
      line-height: 1;
      pointer-events: none;
    }
    .defi-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .defi-label {
      font: 700 0.6rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--color-green);
      display: flex; align-items: center; gap: 6px;
    }
    .defi-label::before {
      content: ''; width: 6px; height: 6px;
      border-radius: 50%; background: var(--color-green);
    }
    .defi-pts-badge {
      background: var(--color-green);
      color: var(--color-dark);
      padding: 5px 10px;
      border-radius: var(--radius-full);
      font: 700 0.72rem/1 'Geist';
    }
    .defi-question {
      font: 700 1.05rem/1.35 'Geist';
      color: var(--color-text-inverse);
      margin-bottom: 12px;
    }
    .defi-timer {
      display: flex; align-items: center; gap: 6px;
      font: 500 0.7rem/1 'Geist';
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
    }
    .defi-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .defi-option {
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-md);
      padding: 12px 10px;
      font: 600 0.82rem/1.2 'Geist';
      color: var(--color-text-inverse);
      text-align: center;
      cursor: pointer;
      transition: background 150ms ease, border-color 150ms ease;
    }
    .defi-option:hover  { background: rgba(0,224,90,0.12); border-color: var(--color-green); }
    .defi-option:active { transform: scale(0.97); }
    .defi-option.correct { background: var(--color-green); border-color: var(--color-green); color: var(--color-dark); }
    .defi-option.wrong   { background: rgba(232,69,60,0.15); border-color: var(--color-danger); color: var(--color-danger); }
    .defi-option:disabled { pointer-events: none; }
    .defi-streak {
      display: flex; align-items: center; gap: 10px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .defi-streak-label {
      font: 500 0.62rem/1 'Geist';
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.4);
    }
    .defi-streak-dots  { display: flex; gap: 5px; }
    .defi-streak-dot   { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.15); }
    .defi-streak-dot.active { background: var(--color-green); }

    /* Défi non dispo */
    .defi-unavailable {
      text-align: center;
      padding: 28px 0 8px;
      color: rgba(255,255,255,0.35);
      font: 500 0.82rem/1 'Geist';
    }

    /* ── Actu Flash ── */
    .actu-card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin: 0 16px 8px;
      box-shadow: var(--shadow-card);
      border-left: 3px solid var(--color-danger);
      position: relative;
    }
    .actu-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--color-danger);
      color: white;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font: 700 0.62rem/1 'Geist';
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .actu-card--stats  { border-left-color: #00B4FF; }
    .actu-card--stats  .actu-badge { background: #00B4FF; }
    .actu-card--debrief { border-left-color: #B66DFF; }
    .actu-card--debrief .actu-badge { background: #B66DFF; }
    .actu-title {
      font: 700 0.92rem/1.3 'Geist';
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }
    .actu-desc {
      font: 400 0.82rem/1.4 'Geist';
      color: var(--color-text-secondary);
      margin-bottom: 8px;
    }
    .actu-desc strong { font: 700 0.82rem/1.4 'Geist'; color: var(--color-text-primary); }
    .actu-time {
      font: 400 0.68rem/1 'Geist';
      color: var(--color-text-tertiary);
    }

    /* ── Nav bottom ── */
    .nav-bottom {
      position: fixed;
      bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      height: 80px;
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: flex-start;
      padding: 10px 0 0;
      z-index: 100;
    }
    .nav-tab {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      cursor: pointer;
      text-decoration: none;
      padding: 2px 0;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-tab-icon  { font-size: 1.35rem; line-height: 1; transition: transform 150ms ease; }
    .nav-tab:active .nav-tab-icon { transform: scale(0.88); }
    .nav-tab-label {
      font: 500 0.58rem/1 'Geist';
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--color-text-secondary);
    }
    .nav-tab.active .nav-tab-label { color: var(--color-green); font-weight: 700; }

    /* ── Tab switcher ── */
    .tab-switcher {
      display: flex;
      background: var(--color-surface);
      border-radius: var(--radius-full);
      padding: 3px;
      margin: 16px 16px 4px;
      box-shadow: var(--shadow-card);
    }
    .tab-btn {
      flex: 1;
      padding: 9px 0;
      border-radius: var(--radius-full);
      border: none;
      background: transparent;
      font: 700 0.72rem/1 'Geist';
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active {
      background: var(--color-dark);
      color: #fff;
    }

    /* ── Feed pronostics ── */
    .feed-section { padding-top: 8px; }
    .feed-card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      margin: 0 16px 10px;
      box-shadow: var(--shadow-card);
    }
    .feed-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .feed-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--color-green);
      display: flex; align-items: center; justify-content: center;
      font: 700 0.88rem/1 'Geist';
      color: var(--color-dark);
      flex-shrink: 0;
      overflow: hidden;
    }
    .feed-user-info { flex: 1; min-width: 0; }
    .feed-pseudo {
      font: 700 0.88rem/1 'Geist';
      color: var(--color-text-primary);
      margin-bottom: 3px;
    }
    .feed-match-label {

      font: italic 900 1.9rem/1 'Geist';

    /* ── Bottom sheet ── */
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .sheet-overlay {
      position: fixed; inset: 0; z-index: 9999;

      width: 36px; height: 4px; border-radius: 2px;

      width: 28px; height: 28px; border-radius: 50%;
      background: var(--color-bg); border: 1px solid var(--color-border);
      color: var(--color-text-primary); font-size: 14px; cursor: pointer;

    /* ── FAB ── */
    .feed-fab {
      position: fixed;
      bottom: 96px; right: 20px;
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--color-green);
      color: var(--color-dark);

      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,224,90,0.45);

      transition: transform 150ms ease, box-shadow 150ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    .feed-fab:active { transform: scale(0.90); box-shadow: 0 2px 8px rgba(0,224,90,0.3); }

    /* ── Textes cartes sombres (countdown + live) ── */
    .match-countdown-card .match-phase,
    .match-live-card .match-phase { color: rgba(255,255,255,0.38); }

    .match-countdown-card .match-team-flag { font-size: 2.8rem; }

    .match-live-card .match-team-code {

      letter-spacing: 0.07em;
    }

    .match-live-card .prono-banner--danger { background: rgba(232,69,60,0.13);   border-color: rgba(232,69,60,0.4); }

      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.65);
    }

    /* ── Skeleton loader ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #E8E6E2 25%, #F2F0EC 50%, #E8E6E2 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 8px;

  </style>

  <script type="module">
    import { supabase, requireAuth, getCurrentProfile } from '/src/js/lib/supabase.js';
    import { formatTime, formatKickoff } from '/src/js/lib/utils.js';
    import { createCheckout, PLANS } from '/src/js/lib/whop.js';

    const user    = await requireAuth();
    if (!user) throw new Error('not authed');
    const profile = await getCurrentProfile();

    // ── Profil incomplet → auto-pseudo ──
    if (!profile?.pseudo) {
      const rawName  = user.user_metadata?.full_name || user.user_metadata?.name || user.email?.split('@')[0] || 'User';
      const basePseudo = rawName.replace(/\s+/g, '').replace(/[^a-zA-Z0-9_\-\.]/g, '').slice(0, 18) || 'User';
      let pseudo = basePseudo.length >= 3 ? basePseudo : 'User' + basePseudo;
      let counter = 1;
      while (true) {
        const { data: ex } = await supabase.from('profiles').select('id').eq('pseudo', pseudo).maybeSingle();
        if (!ex) break;
        pseudo = basePseudo.slice(0, 15) + counter++;
      }
      if (profile) {
        await supabase.from('profiles').update({ pseudo }).eq('id', user.id);
      } else {
        await supabase.from('profiles').insert({ id: user.id, pseudo, points_totaux: 0, plan: 'free' });
      }
      window.location.reload();
    }

    const isPremium = profile?.plan === 'premium';

    // ── Header ──
    if (profile) {
      const av = document.getElementById('user-avatar');
      if (profile.avatar_url) {
        av.innerHTML = `<img src="${profile.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
      } else {
        av.textContent = (profile.pseudo?.[0] || '?').toUpperCase();
      }
      document.getElementById('pts-val').textContent = (profile.points_totaux || 0).toLocaleString('fr-FR');
    }

    // ── Phase label ──
    function phaseLabel(m) {
      if (m.phase === 'groupes') return `Groupe ${m.groupe || ''}`;
      if (m.groupe === 'UCL')    return 'Finale UCL';
      const L = { huitiemes: '1/8', quarts: 'Quart', demis: 'Demi', finale: 'Finale' };
      return L[m.phase] || m.phase || '';
    }

    // ── Time ago ──
    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1)  return 'à l\'instant';
      if (m < 60) return `il y a ${m}min`;
      const h = Math.floor(m / 60);
      if (h < 24) return `il y a ${h}h`;
      return `il y a ${Math.floor(h / 24)}j`;
    }

    // ─────────────────────────────────────────
    // [C] MATCHS EN DIRECT + COUNTDOWN
    // ─────────────────────────────────────────
    let _countdownTimer = null;

    function formatCountdown(kickoffAt) {
      const diff = new Date(kickoffAt) - Date.now();
      if (diff <= 0) return '⚡ Coup d\'envoi !';
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      if (h > 0) return `${h}h ${String(m).padStart(2,'0')}min ${String(s).padStart(2,'0')}s`;
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function showCountdownCard(match) {
      if (_countdownTimer) clearInterval(_countdownTimer);
      const scroll  = document.getElementById('live-scroll');
      const phase   = phaseLabel(match);
      const kickoff = new Date(match.kickoff_at);
      const hour    = kickoff.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

      // Titre dynamique → "Prochain match"
      const titleEl = document.querySelector('#live-section .section-big-title');
      if (titleEl) titleEl.textContent = 'Prochain match';

      scroll.innerHTML = `
        <div class="match-countdown-card">
          <div class="match-card-top">
            <span class="match-phase">${phase}</span>
            <span class="match-countdown-badge" id="cd-badge">⏱ ${formatCountdown(match.kickoff_at)}</span>
          </div>
          <div class="match-score-row">
            <div class="match-team">
              <span class="match-team-flag">${match.home_flag || ''}</span>
              <span class="match-team-code">${shortName(match.home_team)}</span>
            </div>
            <div class="countdown-vs-block">
              <span class="countdown-vs">VS</span>
              <span class="countdown-kickoff">${hour}</span>
            </div>
            <div class="match-team">
              <span class="match-team-flag">${match.away_flag || ''}</span>
              <span class="match-team-code">${shortName(match.away_team)}</span>
            </div>
          </div>
        </div>`;

      _countdownTimer = setInterval(() => {
        const badge = document.getElementById('cd-badge');
        if (!badge) { clearInterval(_countdownTimer); return; }
        const text = formatCountdown(match.kickoff_at);
        badge.textContent = `⏱ ${text}`;
        if (text.includes('Coup d\'envoi')) {
          clearInterval(_countdownTimer);
          setTimeout(loadLive, 3000); // recharger pour passer en live
        }
      }, 1000);
    }

    async function loadLive() {
      const { data: matches } = await supabase
        .from('matchs')
        .select('*')
        .in('status', ['live', 'halftime'])
        .order('kickoff_at');

      const scroll      = document.getElementById('live-scroll');
      const heroBadge   = document.getElementById('hero-live-badge');
      const heroCount   = document.getElementById('hero-live-count');
      const liveSection = document.getElementById('live-section');

      if (!matches?.length) {
        // Chercher le prochain match à venir (dans les 24h)
        const next24h = new Date(Date.now() + 24 * 3600 * 1000).toISOString();
        const { data: next } = await supabase
          .from('matchs')
          .select('id, home_team, away_team, home_flag, away_flag, kickoff_at, phase, groupe')
          .eq('status', 'scheduled')
          .gt('kickoff_at', new Date().toISOString())
          .lte('kickoff_at', next24h)
          .order('kickoff_at')
          .limit(1)
          .maybeSingle();

        if (next) {
          liveSection.style.display = '';
          heroBadge.style.display   = 'none';
          showCountdownCard(next);
        } else {
          liveSection.style.display = 'none';
          heroBadge.style.display   = 'none';
        }
        return;
      }

      if (_countdownTimer) { clearInterval(_countdownTimer); _countdownTimer = null; }
      liveSection.style.display = '';
      heroBadge.style.display   = 'inline-flex';
      heroCount.textContent     = `${matches.length} match${matches.length > 1 ? 's' : ''} en direct`;
      // Titre dynamique → "Matchs en direct"
      const titleEl = document.querySelector('#live-section .section-big-title');
      if (titleEl) titleEl.textContent = 'Matchs en direct';

      // Fetch my pronos for these live matches
      const matchIds = matches.map(m => m.id);
      const { data: myPronos } = await supabase
        .from('pronostics')
        .select('match_id, home_score, away_score, status, points')
        .eq('user_id', user.id)
        .in('match_id', matchIds);
      const pronosMap = {};
      myPronos?.forEach(p => { pronosMap[p.match_id] = p; });

      scroll.innerHTML = matches.map(m => {
        const phase = phaseLabel(m);
        const prono = pronosMap[m.id];

        let bannerHTML = '';
        if (prono) {
          const hs = m.home_score ?? 0, as = m.away_score ?? 0;
          const ph = prono.home_score, pa = prono.away_score;
          const exact    = ph === hs && pa === as;
          const liveWin  = (hs > as && ph > pa) || (as > hs && pa > ph) || (hs === as && ph === pa);
          const cls      = exact || liveWin ? 'prono-banner--live' : 'prono-banner--danger';
          const label    = exact ? 'Score exact en cours' : liveWin ? 'En vie' : 'Compromis';
          bannerHTML = `
            <div class="prono-banner ${cls}">
              <div class="prono-banner-left">
                <span class="prono-banner-dot"></span>
                <span class="prono-banner-status">${label}</span>
              </div>
              <span class="prono-banner-score">${ph}–${pa}</span>
            </div>`;
        } else {
          bannerHTML = `
            <div class="prono-banner prono-banner--none">
              <div class="prono-banner-left">
                <span class="prono-banner-dot"></span>
                <span class="prono-banner-status">Pas de pronostic</span>
              </div>
              <a class="prono-banner-cta" href="/src/pages/match.html?id=${m.id}">Pronostiquer →</a>
            </div>`;
        }

        return `
          <div class="match-live-card" onclick="window.location.href='/src/pages/match.html?id=${m.id}'">
            <div class="match-card-top">
              <span class="match-phase">${phase}</span>
              <span class="match-minute-badge">${m.minute ? m.minute + "'" : 'LIVE'}</span>
            </div>
            <div class="match-score-row">
              <div class="match-team">
                <span class="match-team-flag">${m.home_flag || ''}</span>
                <span class="match-team-code">${m.home_team?.slice(0, 3).toUpperCase() || ''}</span>
              </div>
              <span class="match-score" aria-live="polite">${m.home_score ?? 0}–${m.away_score ?? 0}</span>
              <div class="match-team">
                <span class="match-team-flag">${m.away_flag || ''}</span>
                <span class="match-team-code">${m.away_team?.slice(0, 3).toUpperCase() || ''}</span>
              </div>
            </div>
            ${bannerHTML}
          </div>`;
      }).join('');
    }

    // ── Nom d'équipe court pour affichage compact ──
    function shortName(name) {
      if (!name) return '';

      const map = {
        'PARIS SAINT-GERMAIN': 'PSG',   'PARIS SG': 'PSG',
        'AFRIQUE DU SUD': 'AFR. SUD',   'CORÉE DU SUD': 'CORÉE S.',
        'BOSNIE-HERZÉGOVINE': 'BOSNIE', 'ÉTATS-UNIS': 'USA',
        'ARABIE SAOUDITE': 'ARABIE S.', 'NOUVELLE-ZÉLANDE': 'N. ZÉL.',
        'COSTA RICA': 'C. RICA',        'RÉP. TCHÈQUE': 'TCHÈQUE',
        'BURKINA FASO': 'B. FASO',      'CÔTE D\'IVOIRE': 'CIV',
        'SIERRA LEONE': 'S. LEONE',     'PAYS-BAS': 'P.-BAS',
        'GUINÉE ÉQUATORIALE': 'GUI. EQ.','GUINÉE-BISSAU': 'GUI.-B.',
        'TRINIDAD ET TOBAGO': 'TRI.',    'SAINT-KITTS': 'SKN',
        'EL SALVADOR': 'EL SALV.',      'RÉP. DOMINICAINE': 'DOM.',
        'CORÉE DU NORD': 'CORÉE N.',    'HONG KONG': 'HKG',
        'ARABIE SAOUDITE': 'ARA. SOUD', 'ÉMIRATS ARABES UNIS': 'EAU',
        'IRISH': 'IRL',                  'NORTHERN IRELAND': 'NIR',
      };
      return map[n] || (n.length > 8 ? n.slice(0, 3) : n);

        .from('pronostics')

    let defiAnswered  = false;
    let defiSeconds   = 30;
    let defiInterval  = null;

    function startDefiTimer() {
      const timerEl = document.getElementById('defi-timer');
      defiInterval = setInterval(() => {
        defiSeconds--;
        if (timerEl) timerEl.textContent = `⏱ ${defiSeconds} secondes pour répondre`;
        if (defiSeconds <= 0) {
          clearInterval(defiInterval);
          if (!defiAnswered) {
            if (timerEl) timerEl.textContent = 'Temps écoulé !';
            document.querySelectorAll('.defi-option').forEach(o => o.setAttribute('disabled', ''));
          }
        }
      }, 1000);
    }

    window.selectDefi = function(el, isCorrect, defiId) {
      if (defiAnswered) return;
      defiAnswered = true;
      clearInterval(defiInterval);

      document.querySelectorAll('.defi-option').forEach(o => o.setAttribute('disabled', ''));

      const timerEl = document.getElementById('defi-timer');
      if (isCorrect) {
        el.classList.add('correct');
        if (timerEl) timerEl.textContent = '✅ Bonne réponse ! +50 pts';
        if (navigator.vibrate) navigator.vibrate([30, 20, 60]);
        // Save to supabase
        supabase.from('defi_responses').upsert(
          { user_id: user.id, defi_id: defiId, correct: true },
          { onConflict: 'user_id,defi_id' }
        ).then(() => {
          supabase.from('profiles').update({ points_totaux: (profile?.points_totaux || 0) + 50 }).eq('id', user.id);
        });
      } else {
        el.classList.add('wrong');
        document.querySelectorAll('.defi-option').forEach(o => {
          if (o.dataset.correct === 'true') o.classList.add('correct');
        });
        if (timerEl) timerEl.textContent = '❌ Raté — bonne chance demain !';
        if (navigator.vibrate) navigator.vibrate(60);
        supabase.from('defi_responses').upsert(
          { user_id: user.id, defi_id: defiId, correct: false },
          { onConflict: 'user_id,defi_id' }
        );
      }
    };

    async function loadDefi() {
      const today = new Date().toISOString().slice(0, 10);
      const { data: defi } = await supabase
        .from('defis_quotidiens')
        .select('*')
        .eq('date', today)
        .maybeSingle();

      const card    = document.getElementById('defi-card');
      const qEl     = document.getElementById('defi-question');
      const optsEl  = document.getElementById('defi-options');
      const timerEl = document.getElementById('defi-timer');
      const strEl   = document.getElementById('defi-streak');

      // Streak dots
      const streak = profile?.streak_quotidien || 0;
      if (streak > 0) {
        strEl.style.display = 'flex';
        const dotsEl = document.getElementById('defi-streak-dots');
        dotsEl.innerHTML = Array.from({ length: 7 }, (_, i) =>
          `<span class="defi-streak-dot${i < streak ? ' active' : ''}"></span>`
        ).join('');
      }

      const now = new Date();
      const noonToday = new Date(now.toDateString() + ' 12:00');

      if (!defi) {
        if (now < noonToday) {
          qEl.textContent = 'Disponible à 12:00';
          timerEl.style.display = 'none';
          optsEl.innerHTML = '<div class="defi-unavailable">La question du jour arrive à midi !</div>';
        } else {
          qEl.textContent = 'Aucun défi aujourd\'hui.';
          timerEl.style.display = 'none';
          optsEl.innerHTML = '';
        }
        return;
      }

      // Check if already answered
      const { data: myResponse } = await supabase
        .from('defi_responses')
        .select('correct')
        .eq('user_id', user.id)
        .eq('defi_id', defi.id)
        .maybeSingle();

      qEl.textContent = defi.question || 'Question du jour';

      const options = defi.options || [];
      optsEl.innerHTML = options.map(opt => {
        const isCorrect = opt === defi.correct_answer;
        return `<button class="defi-option${myResponse ? (isCorrect ? ' correct' : ' wrong') : ''}"
          data-correct="${isCorrect}"
          onclick="selectDefi(this, ${isCorrect}, '${defi.id}')"
          ${myResponse ? 'disabled' : ''}
        >${opt}</button>`;
      }).join('');

      if (myResponse) {
        defiAnswered = true;
        timerEl.textContent = myResponse.correct ? '✅ Tu as déjà répondu aujourd\'hui' : '❌ Tu as déjà répondu aujourd\'hui';
      } else if (now >= noonToday) {
        startDefiTimer();
      } else {
        timerEl.textContent = 'Disponible à 12:00';
        optsEl.querySelectorAll('.defi-option').forEach(o => o.setAttribute('disabled', ''));
      }
    }

    function buildAutoActu(matches, allGroupMatches) {
      const now      = new Date();
      const auto     = [];
      const live     = matches.filter(m => m.status === 'live' || m.status === 'halftime');
      const finished = matches.filter(m => m.status === 'finished');
      const today    = matches.filter(m => {
        if (m.status !== 'scheduled') return false;
        return new Date(m.kickoff_at).toDateString() === now.toDateString();
      });
      const soon = matches.filter(m => {
        if (m.status !== 'scheduled') return false;
        const diff = new Date(m.kickoff_at) - now;
        return diff > 0 && diff < 3 * 3600 * 1000;
      });

      // Imminents
      for (const m of soon) {
        const mins  = Math.round((new Date(m.kickoff_at) - now) / 60000);
        const delay = mins < 60 ? `dans ${mins} min` : `dans ${Math.round(mins / 60)}h`;
        auto.push({ type: 'flash', emoji: '⏰', titre: `${m.home_flag} ${m.home_team} vs ${m.away_team} ${m.away_flag} — ${delay}`, contenu: `Coup d'envoi ${delay} · ${phaseLabel(m)}`, created_at: now.toISOString() });
      }

      // Programme du jour (> 3h)
      const todayOther = today.filter(m => new Date(m.kickoff_at) - now >= 3 * 3600 * 1000);
      if (todayOther.length) {
        const lines = todayOther.map(m =>
          `${m.home_flag} <strong>${m.home_team}</strong> vs <strong>${m.away_team}</strong> ${m.away_flag} · ${new Date(m.kickoff_at).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' })} · ${phaseLabel(m)}`
        ).join('<br>');
        auto.push({ type: 'flash', emoji: '📅', titre: `${todayOther.length} match${todayOther.length > 1 ? 's' : ''} aujourd'hui`, contenu: lines, created_at: now.toISOString() });
      }

      // Résultats récents
      const recent = finished.filter(m => now - new Date(m.kickoff_at) < 24 * 3600 * 1000);
      for (const m of recent.slice(-4).reverse()) {
        const winner = m.home_score > m.away_score ? m.home_team : m.away_score > m.home_score ? m.away_team : null;
        const ctx    = winner ? `<strong>${winner}</strong> s'impose !` : `Match nul.`;
        auto.push({ type: 'debrief', emoji: '📊', titre: `${m.home_flag} ${m.home_team} ${m.home_score}–${m.away_score} ${m.away_team} ${m.away_flag}`, contenu: `Résultat final · ${phaseLabel(m)}. ${ctx}`, created_at: m.updated_at || m.kickoff_at });
      }

      return auto;
    }

    async function loadActu() {
      const list = document.getElementById('actu-list');

      const to   = new Date(); to.setDate(to.getDate() + 2);

          supabase.from('matchs').select('*')
            .gte('kickoff_at', from.toISOString())
            .lte('kickoff_at', to.toISOString())
            .order('kickoff_at'),
          supabase.from('actualite_posts').select('*')

            .order('created_at', { ascending: false })

    let feedLoaded = false;

    async function loadFeed() {
      feedLoaded = true;
      const list = document.getElementById('feed-list');
      try {
        // Feed public uniquement : groupe_id IS NULL (pronos de groupe = privés)
        const { data: posts } = await supabase
          .from('pronostics')
          .select('id, home_score, away_score, created_at, user_id, match_id')
          .is('groupe_id', null)
          .order('created_at', { ascending: false })
          .limit(40);

        if (!posts?.length) {
          list.innerHTML = `
            <div class="feed-empty">
              <div class="feed-empty-icon">🗳️</div>
              <div class="feed-empty-title">Aucun pronostic pour l'instant</div>
              <div class="feed-empty-sub">Les pronostics de la communauté<br>apparaîtront ici</div>
            </div>`;
          return;
        }

        // Requêtes complémentaires profiles + matchs (évite le FK join instable)
        const uids  = [...new Set(posts.map(p => p.user_id))];
        const mids  = [...new Set(posts.map(p => p.match_id))];
        const [profRes, matchRes] = await Promise.all([
          supabase.from('profiles').select('id, pseudo, avatar_url').in('id', uids),
          supabase.from('matchs').select('id, home_team, away_team, home_flag, away_flag, kickoff_at').in('id', mids),
        ]);
        const profilesMap = Object.fromEntries((profRes.data || []).map(p => [p.id, p]));
        const matchesMap  = Object.fromEntries((matchRes.data || []).map(m => [m.id, m]));

        // Enrichir les posts avec profiles + matchs
        const enriched = posts.map(p => ({
          ...p,
          profiles: profilesMap[p.user_id] || null,
          matchs:   matchesMap[p.match_id]  || null,
        }));

        // Dédupliquer : un seul prono par user+match (le plus récent, déjà trié par created_at desc)
        const seenUM = new Set();
        const deduped = enriched.filter(p => {
          const key = `${p.user_id}:${p.match_id}`;
          if (seenUM.has(key)) return false;
          seenUM.add(key);
          return true;
        });

        // Fetch reactions
        const ids = posts.map(p => p.id);
        const { data: reactions } = await supabase
          .from('feed_reactions')
          .select('prono_id, type, user_id')
          .in('prono_id', ids);

        const REACTIONS = [
          { type: 'daccord', emoji: '👍', label: 'D\'accord' },
          { type: 'mouais',  emoji: '😐', label: 'Mouais'   },
          { type: 'footix',  emoji: '🤡', label: 'Footix'   },
        ];

        const rMap = {};
        reactions?.forEach(r => {
          if (!rMap[r.prono_id]) rMap[r.prono_id] = {};
          REACTIONS.forEach(({ type }) => {
            if (!rMap[r.prono_id][type]) rMap[r.prono_id][type] = { count: 0, mine: false };
          });
          const rx = REACTIONS.find(rx => rx.type === r.type);
          if (rx) {
            rMap[r.prono_id][rx.type].count++;
            if (r.user_id === user.id) rMap[r.prono_id][rx.type].mine = true;
          }
        });

        list.innerHTML = deduped.map(p => {
          const prof  = p.profiles;
          const match = p.matchs;
          if (!prof || !match) return '';

          const pseudo = prof.pseudo || 'Anonyme';
          const avatar = prof.avatar_url
            ? `<img src="${prof.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`
            : (pseudo[0] || '?').toUpperCase();

          const r = rMap[p.id] || {};
          const reactionsHtml = REACTIONS.map(({ type, emoji, label }) => {
            const rx    = r[type] || { count: 0, mine: false };
            const count = rx.count ? ` ${rx.count}` : '';
            return `<button class="feed-reaction-btn${rx.mine ? ' active' : ''}" onclick="window.reactFeed('${p.id}','${type}',this)">
              ${emoji} ${label}<span>${count}</span>
            </button>`;
          }).join('');

          // Boutons action : seulement pour ses propres pronos + avant coup d'envoi
          const isOwn         = p.user_id === user.id;
          const beforeKickoff = match.kickoff_at ? new Date(match.kickoff_at) > Date.now() : true;
          const actionsHtml   = (isOwn && beforeKickoff) ? `
            <div class="feed-actions">
              <button class="feed-action-btn" onclick="window.editFeedProno('${p.match_id}')">
                ✏️ Modifier
              </button>
              <button class="feed-action-btn feed-action-btn--danger" onclick="window.deleteFeedProno('${p.id}', this)">
                🗑 Supprimer
              </button>
            </div>` : '';

          return `
            <div class="feed-card" data-prono-id="${p.id}">
              <div class="feed-card-header">
                <div class="feed-avatar">${avatar}</div>
                <div class="feed-user-info">
                  <div class="feed-pseudo">${pseudo}</div>
                  <div class="feed-match-label">${match.home_flag || ''} ${shortName(match.home_team)} — ${shortName(match.away_team)} ${match.away_flag || ''}</div>
                </div>
                <span class="feed-time">${timeAgo(p.created_at)}</span>
              </div>
              <div class="feed-score-row">
                <div class="feed-team-block">
                  <span class="feed-team-flag">${match.home_flag || ''}</span>
                  <span class="feed-team-name">${shortName(match.home_team)}</span>
                </div>
                <span class="feed-prono-score">${p.home_score}–${p.away_score}</span>
                <div class="feed-team-block">
                  <span class="feed-team-name">${shortName(match.away_team)}</span>
                  <span class="feed-team-flag">${match.away_flag || ''}</span>
                </div>
              </div>
              <div class="feed-reactions">${reactionsHtml}</div>
              ${actionsHtml}
            </div>`;
        }).filter(Boolean).join('');

      } catch(e) {
        console.warn('Feed load failed', e);
        document.getElementById('feed-list').innerHTML =
          `<div class="feed-empty"><div class="feed-empty-icon">⚠️</div><div class="feed-empty-sub">Impossible de charger le feed</div></div>`;
      }
    }

    window.editFeedProno = function(matchId) {
      window.location.href = '/src/pages/pronostic.html?id=' + matchId;
    };

    window.deleteFeedProno = async function(pronoId, btn) {
      if (btn.dataset.confirming === 'true') {
        // 2ème tap : supprimer
        btn.textContent = '…';
        btn.disabled = true;
        const { error } = await supabase.from('pronostics').delete()
          .eq('id', pronoId).eq('user_id', user.id);
        if (!error) {
          const card = document.querySelector(`[data-prono-id="${pronoId}"]`);
          if (card) {
            card.style.transition = 'opacity 200ms ease, transform 200ms ease';
            card.style.opacity = '0';
            card.style.transform = 'scale(0.96)';
            setTimeout(() => card.remove(), 210);
          }
          if (navigator.vibrate) navigator.vibrate([15, 10, 30]);
        } else {
          btn.textContent = '🗑 Supprimer';
          btn.disabled = false;
          btn.dataset.confirming = 'false';
        }
        return;
      }
      // 1er tap : demander confirmation
      btn.dataset.confirming = 'true';
      btn.textContent = 'Confirmer ?';
      // Reset auto après 3s si pas de 2ème tap
      setTimeout(() => {
        if (btn.dataset.confirming === 'true') {
          btn.dataset.confirming = 'false';
          btn.textContent = '🗑 Supprimer';
        }
      }, 3000);
    };

    window.reactFeed = async function(pronoId, type, btn) {
      const span    = btn.querySelector('span');
      const isActive = btn.classList.contains('active');
      const current  = parseInt(span.textContent.trim() || '0');
      if (isActive) {
        btn.classList.remove('active');
        span.textContent = current > 1 ? ` ${current - 1}` : '';
        await supabase.from('feed_reactions').delete()
          .eq('prono_id', pronoId).eq('user_id', user.id).eq('type', type);
      } else {
        btn.classList.add('active');
        span.textContent = ` ${current + 1}`;
        await supabase.from('feed_reactions').upsert(
          { prono_id: pronoId, user_id: user.id, type },
          { onConflict: 'prono_id,user_id,type' }
        );
      }
      if (navigator.vibrate) navigator.vibrate(20);
    };

      document.body.appendChild(ov);
      ov.querySelector('#upsell-cta').addEventListener('click', () => {
        createCheckout(PLANS.premium, user.id, user.email);
        ov.remove();
      });
      ov.querySelector('#upsell-cancel').addEventListener('click', () => ov.remove());
      ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
    }

    // ── Picker de matchs (Premium) ──
    async function openMatchPicker() {
      const ov = document.createElement('div');
      ov.className = 'sheet-overlay';
      ov.innerHTML = `
        <div class="sheet">
          <div class="sheet-handle"></div>
          <div class="sheet-title">
            <span>Choisir un match</span>
            <button class="sheet-close" id="picker-close">✕</button>
          </div>
          <div id="picker-list" style="padding:8px 0">
            <div style="padding:24px;text-align:center;color:#A8A49F;font:400 0.85rem/1 'Geist'">Chargement…</div>
          </div>
        </div>`;
      document.body.appendChild(ov);
      ov.querySelector('#picker-close').addEventListener('click', () => ov.remove());
      ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });

      const { data: matches } = await supabase
        .from('matchs')
        .select('id, home_team, away_team, home_flag, away_flag, kickoff_at, phase, groupe')
        .eq('status', 'scheduled')
        .gt('kickoff_at', new Date().toISOString())
        .order('kickoff_at')
        .limit(20);

      const pickerList = ov.querySelector('#picker-list');
      if (!matches?.length) {
        pickerList.innerHTML = `<div style="padding:32px;text-align:center;color:#A8A49F;font:400 0.85rem/1 'Geist'">Aucun match à venir</div>`;
        return;
      }

      pickerList.innerHTML = matches.map(m => {
        const d = new Date(m.kickoff_at);
        const today = new Date();
        const tom   = new Date(today); tom.setDate(today.getDate() + 1);
        const isToday = d.toDateString() === today.toDateString();
        const isTom   = d.toDateString() === tom.toDateString();
        const dayLabel = isToday ? 'Auj.' : isTom ? 'Demain' : d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
        const hour  = d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        return `
          <div data-id="${m.id}" style="display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid #E8E6E2;cursor:pointer;transition:background 100ms ease">
            <span style="font-size:1.5rem;flex-shrink:0">${m.home_flag || ''}</span>
            <div style="flex:1;min-width:0">
              <div style="font:700 0.88rem/1 'Geist';text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#0F0F0E">
                ${shortName(m.home_team)} — ${shortName(m.away_team)}
              </div>
              <div style="font:400 0.7rem/1 'Geist';color:#A8A49F;margin-top:4px">${dayLabel} · ${hour}</div>
            </div>
            <span style="font-size:1.5rem;flex-shrink:0">${m.away_flag || ''}</span>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#A8A49F" stroke-width="2.5" style="flex-shrink:0"><path d="M9 18l6-6-6-6"/></svg>
          </div>`;
      }).join('');

      pickerList.querySelectorAll('[data-id]').forEach(item => {
        item.addEventListener('click', () => {
          window.location.href = '/src/pages/pronostic.html?id=' + item.dataset.id;
        });
        item.addEventListener('touchstart', () => item.style.background = '#F7F6F4', { passive: true });
        item.addEventListener('touchend',   () => item.style.background = '');
      });
    }

    // ── FAB listener ──
    document.getElementById('feed-fab').addEventListener('click', () => {
      if (isPremium) {
        openMatchPicker();
      } else {
        showFeedUpsell();
      }
    });

    // ─────────────────────────────────────────
    // INIT — load all sections in parallel
    // ─────────────────────────────────────────
    await Promise.all([loadLive(), loadUpcoming(), loadDefi(), loadActu()]);

    // Polling live toutes les 60s (scores mis à jour par l'agent IA)
    setInterval(loadLive, 60_000);

    // ── Push Notifications (PWA) ──
    await registerPushNotifications();

    async function registerPushNotifications() {
      try {
        if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;

        // Enregistrer le service worker
        const reg = await navigator.serviceWorker.register('/sw.js');

        // Vérifier si déjà abonné
        const existing = await reg.pushManager.getSubscription();
        if (existing) return; // déjà abonné, pas besoin de re-demander

        // Demander permission seulement si l'user est sur la page depuis > 3s
        await new Promise(r => setTimeout(r, 3000));
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') return;

        // Créer la subscription
        const VAPID_PUBLIC = import.meta.env.VITE_VAPID_PUBLIC_KEY;
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly:     true,
          applicationServerKey: VAPID_PUBLIC,
        });

        // Sauvegarder en DB
        await fetch('/api/push-subscribe', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ subscription: sub.toJSON(), userId: user.id }),
        });

        console.log('[push] Souscription enregistrée ✅');
      } catch(e) {
        console.warn('[push] Inscription échouée silencieusement:', e.message);
      }
    }
  </script>
</body>
</html>
