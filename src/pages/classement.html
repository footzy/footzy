<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Footzy — Classement Premium</title>
  <link rel="stylesheet" href="/src/css/tokens.css" />
  <link rel="stylesheet" href="/src/css/components.css" />
  <link rel="stylesheet" href="/src/css/fz-components.css" />
  <link rel="stylesheet" href="/src/css/pages.css" />
</head>
<body>
  <div class="page-content fz-page-enter" id="page" style="padding-bottom:24px">

    <!-- Header -->
    <div style="padding:8px 20px 12px;display:flex;align-items:center;gap:12px">
      <button class="fz-back" onclick="history.back()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <h1 style="margin:0;font-size:18px;font-weight:800;letter-spacing:-0.02em">🏆 Classement Premium</h1>
    </div>

    <!-- Récompenses banner -->
    <div class="fz-rewards" style="margin:0 20px 16px">
      <div class="fz-rewards__title">🎁 Récompenses CdM 2026</div>
      <div class="fz-rewards__row">
        <span class="fz-rewards__medal">🥇</span>
        <span class="fz-rewards__txt"><b>5 000€</b> · Voyage · Maillot signé <span style="font-size:11px;color:#7A5500;font-weight:400">— 1er au classement final</span></span>
      </div>
      <div class="fz-rewards__row">
        <span class="fz-rewards__medal">🥈</span>
        <span class="fz-rewards__txt"><b>2 000€</b> · Maillot signé <span style="font-size:11px;color:#7A5500;font-weight:400">— 2ème</span></span>
      </div>
      <div class="fz-rewards__row">
        <span class="fz-rewards__medal">🥉</span>
        <span class="fz-rewards__txt"><b>1 000€</b> · Ballon signé <span style="font-size:11px;color:#7A5500;font-weight:400">— 3ème</span></span>
      </div>
      <div class="fz-rewards__row" style="opacity:0.85">
        <span class="fz-rewards__medal">🎽</span>
        <span class="fz-rewards__txt">Goodies hebdo — <b>Top 10</b> · Top 50 tirage au sort</span>
      </div>
    </div>

    <!-- CTA gratuit (affiché si pas premium) -->
    <div style="padding:0 20px 16px" id="free-cta" style="display:none">
      <button class="fz-btn fz-btn--block fz-shimmer" id="join-btn" style="padding:16px 22px;font-weight:800;font-size:14px;letter-spacing:-0.01em">
        <span style="position:relative;z-index:1">👑 Rejoins le Classement Premium · 9,99€</span>
      </button>
    </div>

    <!-- Podium top 3 -->
    <div class="fz-section-h" style="padding-top:8px"><span class="fz-section-h__dot"></span><span class="fz-section-h__title">Podium</span></div>
    <div class="fz-podium" id="podium">
      <div style="text-align:center;padding:32px;color:var(--fg-faint);grid-column:1/-1">Chargement…</div>
    </div>

    <!-- Liste 4-100 -->
    <div class="fz-section-h" style="margin-top:22px"><span class="fz-section-h__dot"></span><span class="fz-section-h__title">Classement complet</span></div>
    <div class="fz-stack fz-stack--sm" id="rank-list" style="margin-bottom:16px"></div>

    <!-- Ma position (sticky bas, premium seulement) -->
    <div class="fz-stickybar" id="my-rank-sticky" style="display:none">
      <div style="display:flex;flex-direction:column;gap:2px">
        <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.10em;color:var(--fg-on-dark-muted)">Ma position</span>
        <span style="font-size:22px;font-weight:900;font-style:italic;color:var(--accent)" id="my-pos">—</span>
      </div>
      <div style="flex:1;padding:0 12px">
        <div style="font-size:13px;font-weight:700" id="my-pseudo">—</div>
        <div style="font-size:12px;color:var(--fg-on-dark-muted)" id="my-pts">— pts</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:10px;color:var(--fg-on-dark-muted);font-weight:600">Prochaine récompense</div>
        <div id="my-next-reward" style="font-size:11px;font-weight:700;color:var(--accent)">—</div>
      </div>
    </div>

  </div>

  <script type="module">
    import { supabase, requireAuth, getCurrentProfile } from '/src/js/lib/supabase.js';
    import { createCheckout, PLANS } from '/src/js/lib/whop.js';

    (async () => {
    const user    = await requireAuth();
    if (!user) throw new Error('not authed');
    const profile = await getCurrentProfile();

    const isPremium = profile?.plan === 'premium' || profile?.plan === 'mid';

    // Show CTA for free users
    if (!isPremium) {
      const freeCta = document.getElementById('free-cta');
      freeCta.style.display = 'block';
      document.getElementById('join-btn').addEventListener('click', () => createCheckout(PLANS.premium, user.id));
    }

    // Load premium leaderboard
    const { data: players } = await supabase
      .from('profiles')
      .select('id, pseudo, plan, points_totaux, scores_exacts')
      .in('plan', ['premium', 'mid'])
      .order('points_totaux', { ascending: false })
      .limit(100);

    if (!players?.length) {
      document.getElementById('podium').innerHTML = `
        <div style="text-align:center;padding:40px 20px;color:var(--fg-faint);grid-column:1/-1">
          <div style="font-size:48px;margin-bottom:12px">🏆</div>
          <div style="font-weight:700;color:var(--fg-muted)">Aucun membre Premium encore</div>
          <div style="font-size:13px;margin-top:6px">Sois le premier à rejoindre la compétition !</div>
        </div>`;
      document.getElementById('rank-list').innerHTML = '';
      return;
    }

    // ── Podium (top 3) ──
    const top3 = players.slice(0, 3);
    // Display order: 2nd left, 1st center, 3rd right
    const displayed = [top3[1], top3[0], top3[2]].filter(Boolean);
    const displayMedals = ['silver', 'gold', 'bronze'];
    const displayBars   = ['--2', '--1', '--3'];
    const displayCrowns = ['🥈', '👑', '🥉'];
    const avatarStyles = [
      'background:linear-gradient(135deg,#DCDCDC,#9C9C9C);color:#0F0F0E;width:48px;height:48px;font-size:18px',
      'background:linear-gradient(135deg,#FFE08A,#D4A100);color:#0F0F0E;width:60px;height:60px;font-size:24px;box-shadow:0 0 24px rgba(212,165,0,0.45)',
      'background:linear-gradient(135deg,#E8B689,#A8682E);color:#fff;width:44px;height:44px;font-size:16px',
    ];

    function podiumCol(p, barMod, crown, avatarStyle) {
      if (!p) return `<div class="fz-podium__col"></div>`;
      const init = (p.pseudo?.[0] || '?').toUpperCase();
      const isMe = p.id === user.id;
      return `
        <div class="fz-podium__col">
          <div class="fz-podium__avatar-wrap">
            <span class="fz-avatar" style="${avatarStyle}${isMe ? ';box-shadow:0 0 0 3px var(--accent-strong)' : ''}">${init}</span>
            <span class="fz-podium__crown" style="${barMod==='--1'?'font-size:28px':''}">${crown}</span>
          </div>
          <span class="fz-podium__pseudo" style="${barMod==='--1'?'font-weight:800':''}">${p.pseudo || '???'}${isMe ? ' 👈' : ''}</span>
          <span class="fz-podium__pts">${(p.points_totaux||0).toLocaleString('fr-FR')} pts</span>
          <div class="fz-podium__bar fz-podium__bar${barMod}">${barMod === '--1' ? '1' : barMod === '--2' ? '2' : '3'}</div>
        </div>`;
    }

    document.getElementById('podium').innerHTML =
      podiumCol(displayed[0], displayBars[0], displayCrowns[0], avatarStyles[0]) +
      podiumCol(displayed[1], displayBars[1], displayCrowns[1], avatarStyles[1]) +
      podiumCol(displayed[2], displayBars[2], displayCrowns[2], avatarStyles[2]);

    // ── Full list (4 → 100) ──
    const rest = players.slice(3);
    const trophyForRank = (rank) => {
      if (rank <= 3)   return '🏆';
      if (rank <= 10)  return '🎽';
      if (rank <= 50)  return '🎁';
      return '';
    };

    document.getElementById('rank-list').innerHTML = rest.map((p, i) => {
      const rank = i + 4;
      const isMe = p.id === user.id;
      const init = (p.pseudo?.[0] || '?').toUpperCase();
      const trophy = trophyForRank(rank);
      const planBadge = `<span class="fz-plan fz-plan--mid">⭐ Premium</span>`;
      return `
        <div class="fz-rank${isMe ? ' is-me' : ''}">
          <span class="fz-rank__pos">#${rank}</span>
          <span class="fz-avatar fz-avatar--sm${isMe ? ' fz-avatar--accent' : ''}">${init}</span>
          <div class="fz-rank__main">
            <div class="fz-rank__name">${p.pseudo || '???'}${isMe ? ' <span style="font-size:10px;color:var(--accent-strong);font-weight:800;text-transform:uppercase;letter-spacing:0.06em">moi</span>' : ''}</div>
            ${planBadge}
          </div>
          ${trophy ? `<span style="font-size:16px">${trophy}</span>` : ''}
          <span class="fz-rank__pts"><b>${(p.points_totaux||0).toLocaleString('fr-FR')}</b> pts</span>
        </div>`;
    }).join('');

    // ── My sticky position (premium only) ──
    if (isPremium) {
      const myRank = players.findIndex(p => p.id === user.id) + 1;
      if (myRank > 0) {
        const sticky = document.getElementById('my-rank-sticky');
        sticky.style.display = 'flex';
        document.getElementById('my-pos').textContent    = `#${myRank}`;
        document.getElementById('my-pseudo').textContent  = profile.pseudo || '';
        document.getElementById('my-pts').textContent     = `${(profile.points_totaux||0).toLocaleString('fr-FR')} pts`;

        let nextReward = '';
        if      (myRank > 50) nextReward = `Top 50 → Tirage 🎁`;
        else if (myRank > 10) nextReward = `Top 10 → Maillot 🎽`;
        else if (myRank > 3)  nextReward = `Top 3 → Récompense 🏆`;
        else if (myRank === 3) nextReward = `1 000€ + Ballon signé`;
        else if (myRank === 2) nextReward = `2 000€ + Maillot signé`;
        else                  nextReward  = `5 000€ + Voyage ✈️`;
        document.getElementById('my-next-reward').textContent = nextReward;
      }
    }
    })();
  </script>
</body>
</html>
