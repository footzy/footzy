<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Footzy — Oracle IA</title>
  <link rel="stylesheet" href="/src/css/tokens.css" />
  <link rel="stylesheet" href="/src/css/components.css" />
  <link rel="stylesheet" href="/src/css/fz-components.css" />
  <link rel="stylesheet" href="/src/css/pages.css" />
  <style>
    @keyframes oraclePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,224,90,0); transform: scale(1); }
      50%       { box-shadow: 0 0 32px 8px rgba(0,224,90,0.18); transform: scale(1.04); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes revealUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }

    /* ── Header ── */
    .oracle-header {
      padding: 8px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .oracle-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .oracle-logo .icon-wrap {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--bg-dark); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .oracle-logo .name {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.025em;
      line-height: 1.1;
    }
    .oracle-premium-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent-strong);
      background: var(--accent-soft);
      border-radius: var(--r-pill);
      padding: 3px 8px;
      margin-top: 2px;
    }

    /* ── Premium gate ── */
    .oracle-gate {
      margin: 16px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
    }
    .oracle-gate-preview {
      padding: 20px;
      filter: blur(6px);
      pointer-events: none;
      user-select: none;
      opacity: 0.5;
    }
    .oracle-gate-cta {
      background: linear-gradient(180deg, rgba(250,250,248,0) 0%, rgba(250,250,248,0.98) 40%);
      padding: 40px 20px 24px;
      text-align: center;
      margin-top: -80px;
      position: relative;
    }
    .oracle-gate-cta h3 { font-size: 18px; font-weight: 800; margin-bottom: 8px; color: var(--text-primary); }
    .oracle-gate-cta p  { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.6; }

    /* ── Match picker ── */
    .oracle-match-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow-xs);
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, background 0.2s;
    }
    .oracle-match-card:active { transform: scale(0.98); }
    .oracle-match-card.selected { border-color: var(--accent); background: var(--accent-soft); }
    .oracle-match-flags { font-size: 24px; flex-shrink: 0; }
    .oracle-match-info  { flex: 1; min-width: 0; }
    .oracle-match-name  { font-size: 13.5px; font-weight: 700; letter-spacing: -0.01em; }
    .oracle-match-date  { font-size: 11.5px; color: var(--fg-faint); font-weight: 500; margin-top: 2px; }
    .oracle-btn {
      background: var(--accent);
      color: var(--bg-dark);
      border: none;
      border-radius: var(--r-pill);
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    .oracle-btn:active   { opacity: 0.85; transform: scale(0.95); }
    .oracle-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .cached-badge {
      background: var(--bg-dark);
      color: var(--accent);
      border-radius: var(--r-pill);
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ── Loading oracle ── */
    .oracle-loading {
      text-align: center;
      padding: 48px 24px;
      animation: revealUp .3s ease;
    }
    .oracle-loading .orb {
      font-size: 56px;
      display: block;
      margin-bottom: 16px;
      animation: oraclePulse 1.5s ease-in-out infinite;
    }
    .oracle-loading .text {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .oracle-loading .sub {
      font-size: 12px;
      color: var(--text-tertiary);
    }
    .oracle-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(0,224,90,0.15);
      border-top-color: var(--green-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto 0;
    }

    /* ── Analysis card ── */
    .analysis-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      animation: revealUp .45s cubic-bezier(.32,.72,0,1);
    }
    .analysis-header {
      background: var(--bg-dark);
      color: var(--fg-on-dark);
      padding: 16px 16px 14px;
      position: relative;
      overflow: hidden;
    }
    .analysis-header::after {
      content: '';
      position: absolute; right: -60px; bottom: -60px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(0,224,90,0.30), transparent 65%);
      pointer-events: none;
    }
    .analysis-match-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--fg-on-dark-muted);
      margin-bottom: 4px;
      position: relative;
    }
    .analysis-verdict {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border-radius: var(--r-pill);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--bg-dark);
      background: var(--accent);
      position: relative;
    }

    /* Score */
    .analysis-score-wrap {
      padding: 14px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      position: relative;
    }
    .analysis-team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1;
    }
    .analysis-team .flag  { font-size: 32px; }
    .analysis-team .name  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-on-dark-muted); text-align: center; }
    .analysis-score {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -0.045em;
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-shrink: 0;
      color: var(--fg-on-dark);
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .analysis-score .sep { font-size: 22px; color: var(--fg-on-dark-muted); font-weight: 700; }

    /* Confidence */
    .confidence-wrap {
      padding: 12px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .confidence-label { font-size: 11px; font-weight: 700; color: var(--fg-on-dark-muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .confidence-row { display: flex; align-items: center; gap: 10px; }
    .confidence-track {
      flex: 1;
      height: 10px;
      background: var(--bg-dark-3);
      border: 1px solid var(--border-on-dark);
      border-radius: var(--r-pill);
      overflow: hidden;
    }
    .confidence-fill {
      height: 100%;
      border-radius: var(--r-pill);
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      box-shadow: 0 0 16px var(--accent-glow);
      transition: width 1.4s cubic-bezier(.22,1,.36,1);
    }
    .confidence-pct { font-size: 18px; font-weight: 900; color: var(--accent); flex-shrink: 0; font-variant-numeric: tabular-nums; }

    /* Analysis text */
    .analysis-section {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 14px;
    }
    .analysis-block { }
    .analysis-block-hd {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      color: var(--accent-strong);
    }
    .analysis-block-hd span { font-size: 12px; font-weight: 800; letter-spacing: 0.02em; }
    .analysis-text {
      font-size: 13.5px;
      line-height: 1.55;
      color: var(--fg-muted);
      margin: 0;
    }

    /* Facteur clé */
    .facteur-cle {
      background: linear-gradient(135deg, #FFF6D8 0%, #FCE8B5 100%);
      border: 1px solid rgba(212,165,0,0.25);
      border-radius: 12px;
      padding: 12px;
    }
    .facteur-cle-hd {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 4px; color: #7A5500;
    }
    .facteur-cle-hd span { font-size: 10px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; }
    .facteur-cle p { margin: 0; font-size: 13px; font-weight: 600; color: #4A3500; line-height: 1.45; }

    /* Buteur */
    .buteur-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: var(--bg-dark);
      border-radius: var(--r-pill);
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 700;
    }

    /* Key players */
    .players-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .player-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .player-avatar {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--bg-dark); color: var(--fg-on-dark);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800;
      flex-shrink: 0;
    }
    .player-name  { font-size: 13px; font-weight: 600; flex: 1; }
    .player-role  { font-size: 11px; color: var(--fg-faint); font-weight: 600; margin-left: auto; }

    /* Form */
    .form-wrap { display: flex; align-items: center; gap: 8px; }
    .form-flag  { font-size: 18px; }
    .form-team  { font-size: 13px; font-weight: 700; flex: 1; }
    .form-dots  { display: inline-flex; gap: 4px; }
    .form-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: #fff;
    }
    .form-dot.W { background: var(--accent-strong); }
    .form-dot.D { background: var(--fg-faint); }
    .form-dot.L { background: #C42B36; }

    /* Stat bars */
    .stats-list { display: flex; flex-direction: column; gap: 8px; }
    .stat-row   { margin-bottom: 6px; }
    .stat-row-label { font-size: 11px; font-weight: 700; color: var(--fg-faint); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
    .stat-bar-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .stat-track { flex: 1; height: 6px; background: var(--bg-card-2); border-radius: var(--r-pill); overflow: hidden; }
    .stat-fill  { height: 100%; border-radius: var(--r-pill); transition: width 1s cubic-bezier(.22,1,.36,1); }
    .stat-fill.green { background: var(--accent); }
    .stat-fill.gray  { background: var(--fg-muted); }
    .stat-val   { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 30px; text-align: right; }
  </style>
</head>
<body>
  <div class="page-content">

    <!-- Header -->
    <div class="oracle-header">
      <div class="oracle-logo">
        <span class="icon-wrap">✨</span>
        <div>
          <div class="name fz-grad-accent">Oracle IA</div>
          <span class="oracle-premium-badge" id="plan-badge">⭐ Premium</span>
        </div>
      </div>
    </div>

    <div id="oracle-body" style="padding:0 0 16px">
      <div style="text-align:center;padding:60px 20px;color:var(--text-tertiary)">Chargement…</div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/src/pages/accueil.html">
      <span style="font-size:22px">🏠</span>
      <span>Accueil</span>
    </a>
    <a href="/src/pages/home.html">
      <span style="font-size:22px">⚽</span>
      <span>Matchs</span>
    </a>
    <a href="/src/pages/oracle.html" class="active">
      <span style="font-size:22px">🔮</span>
      <span>Oracle</span>
    </a>
    <a href="/src/pages/groupe.html">
      <span style="font-size:22px">🫂</span>
      <span>Groupe</span>
    </a>
    <a href="/src/pages/profil.html">
      <span style="font-size:22px">🪪</span>
      <span>Profil</span>
    </a>
  </nav>

  <script type="module">
    import { supabase, requireAuth, getCurrentProfile } from '/src/js/lib/supabase.js';
    import { createCheckout, checkPremiumAccess, PLANS } from '/src/js/lib/whop.js';
    import { formatKickoff } from '/src/js/lib/utils.js';

    (async () => {
    const user    = await requireAuth();
    if (!user) throw new Error('not authed');
    const profile = await getCurrentProfile();
    const isPremium = await checkPremiumAccess(profile);

    // Badge
    const badge = document.getElementById('plan-badge');
    if (!isPremium) {
      badge.textContent = '🔒 Premium requis';
      badge.style.color = 'var(--fg-faint)';
    }

    const body = document.getElementById('oracle-body');

    // ── Premium gate for free users ──
    if (!isPremium) {
      body.innerHTML = `
        <div class="oracle-gate" style="margin:16px">
          <div class="oracle-gate-preview">
            <div style="background:var(--accent-bg);border:1px solid var(--green-border);border-radius:18px;padding:18px 20px">
              <div style="display:flex;justify-content:space-between;margin-bottom:12px">
                <span style="font-size:13px;font-weight:700">🇫🇷 France vs Brésil 🇧🇷</span>
                <span style="color:var(--green-accent);font-size:12px;font-weight:700">Victoire domicile</span>
              </div>
              <div style="display:flex;justify-content:center;gap:8px;font-size:48px;font-weight:900;font-style:italic;margin:12px 0">
                <span>2</span><span style="opacity:.2;font-size:28px">–</span><span>1</span>
              </div>
              <div style="height:6px;background:var(--bg-muted);border-radius:50px;overflow:hidden;margin-bottom:4px">
                <div style="height:100%;width:74%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));border-radius:50px"></div>
              </div>
              <div style="font-size:11px;color:var(--text-tertiary);text-align:right">Confiance : 74%</div>
            </div>
          </div>
          <div class="oracle-gate-cta">
            <h3>🔮 Débloque l'Oracle IA</h3>
            <p>Analyses tactiques, score prédit, joueurs clés, buteur probable… L'IA analyse chaque match pour toi.</p>
            <button class="cta-primary" id="unlock-btn">Passer Premium — 9,99€</button>
            <p style="font-size:11px;color:var(--text-tertiary);margin-top:10px">Accès complet · Sans engagement</p>
          </div>
        </div>`;
      document.getElementById('unlock-btn').addEventListener('click', () => createCheckout(PLANS.premium, user.id));
      return;
    }

    // ── Load upcoming matches ──
    const now = new Date().toISOString();
    const { data: matches } = await supabase
      .from('matchs')
      .select('id, home_team, away_team, home_flag, away_flag, kickoff_at, phase, groupe')
      .gt('kickoff_at', now)
      .order('kickoff_at')
      .limit(15);

    if (!matches?.length) {
      body.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text-tertiary)">
        <div style="font-size:48px;margin-bottom:12px">🔮</div>
        <div style="font-weight:700;color:var(--text-secondary)">Aucun match à venir</div>
      </div>`;
      return;
    }

    // Check which matches have cached analyses
    const matchIds = matches.map(m => m.id);
    const { data: cached } = await supabase
      .from('oracle_analyses').select('match_id').in('match_id', matchIds);
    const cachedSet = new Set(cached?.map(c => c.match_id) || []);

    body.innerHTML = `
      <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text-tertiary);padding:20px 20px 10px">
        Choisir un match à analyser
      </p>
      <div id="match-picker" style="display:flex;flex-direction:column;gap:8px;padding:0 16px">
        ${matches.map((m, i) => `
          <div class="oracle-match-card" data-idx="${i}" id="mc-${m.id}">
            <span class="oracle-match-flags">${m.home_flag}${m.away_flag}</span>
            <div class="oracle-match-info">
              <div class="oracle-match-name">${m.home_team} vs ${m.away_team}</div>
              <div class="oracle-match-date">${formatKickoff(m.kickoff_at)}</div>
            </div>
            ${cachedSet.has(m.id)
              ? `<span class="cached-badge">🔮 Voir</span>`
              : `<button class="oracle-btn" data-match-id="${m.id}">Analyser</button>`}
          </div>`).join('')}
      </div>
      <div id="analysis-zone" style="padding:16px 16px 0"></div>`;

    // Click handlers
    document.querySelectorAll('.oracle-match-card').forEach(card => {
      card.addEventListener('click', () => analyzeMatch(matches[parseInt(card.dataset.idx)], card));
    });

    let currentCard = null;

    async function analyzeMatch(match, card) {
      if (currentCard) currentCard.classList.remove('selected');
      currentCard = card;
      card.classList.add('selected');

      const zone = document.getElementById('analysis-zone');
      zone.innerHTML = `
        <div class="oracle-loading">
          <span class="orb">🔮</span>
          <div class="text">L'Oracle analyse ce match…</div>
          <div class="sub">Traitement des données tactiques et historiques</div>
          <div class="oracle-spinner"></div>
        </div>`;
      zone.scrollIntoView({ behavior: 'smooth', block: 'start' });

      try {
        // Get JWT for API call
        const { data: { session } } = await supabase.auth.getSession();
        const jwt = session?.access_token;

        const res = await fetch('/api/oracle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${jwt}` },
          body: JSON.stringify({
            matchId:    match.id,
            homeTeam:   match.home_team,
            awayTeam:   match.away_team,
            homeFlag:   match.home_flag,
            awayFlag:   match.away_flag,
            phase:      match.phase,
            kickoffAt:  match.kickoff_at,
          })
        });

        if (!res.ok) throw new Error('API error ' + res.status);
        const data = await res.json();
        renderAnalysis(data, match, zone);

        // Mark as cached
        const btn = card.querySelector('.oracle-btn');
        if (btn) {
          btn.outerHTML = `<span class="cached-badge">🔮 Voir</span>`;
        }

      } catch (err) {
        zone.innerHTML = `<div style="text-align:center;padding:32px;color:var(--danger)">
          <div style="font-size:32px;margin-bottom:8px">⚠️</div>
          <div style="font-weight:700">Erreur Oracle</div>
          <div style="font-size:12px;margin-top:6px;color:var(--text-tertiary)">${err.message}</div>
        </div>`;
      }
    }

    function renderAnalysis(d, match, zone) {
      const formDots = (form) => (form || 'WWDLD').split('').map(c =>
        `<span class="form-dot ${c}">${c}</span>`).join('');

      const stats = d.stats || {};
      const keyPlayers = Array.isArray(d.key_players) ? d.key_players : [];
      const homeInitial = (match.home_team || '?')[0];
      const awayInitial = (match.away_team || '?')[0];

      zone.innerHTML = `
        <div class="analysis-card">
          <!-- Dark header with score + confidence -->
          <div class="analysis-header">
            <div class="analysis-match-label">${match.home_team} · ${match.away_team}</div>
            <div class="analysis-verdict">${d.verdict || '—'}</div>

            <!-- Score -->
            <div class="analysis-score-wrap">
              <span style="font-size:32px;line-height:1">${match.home_flag}</span>
              <div class="analysis-score">
                <span>${d.home_score ?? '?'}</span>
                <span class="sep">·</span>
                <span>${d.away_score ?? '?'}</span>
              </div>
              <span style="font-size:32px;line-height:1">${match.away_flag}</span>
            </div>

            <!-- Confidence gauge -->
            <div class="confidence-wrap">
              <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
                <span class="confidence-label">Confiance</span>
                <span class="confidence-pct">${d.confidence ?? 0}%</span>
              </div>
              <div class="confidence-track">
                <div class="confidence-fill" id="conf-fill" style="width:0%"></div>
              </div>
            </div>
          </div>

          <!-- Content sections -->
          <div class="analysis-section">

            <!-- Analyse Oracle -->
            <div class="analysis-block">
              <div class="analysis-block-hd">✨<span>Analyse Oracle</span></div>
              <p class="analysis-text">${d.analysis || '—'}</p>
            </div>

            <!-- Facteur clé -->
            ${d.facteur_cle ? `
            <div class="facteur-cle">
              <div class="facteur-cle-hd">⚡<span>Facteur décisif</span></div>
              <p>${d.facteur_cle}</p>
            </div>` : ''}

            <!-- Buteur -->
            ${d.buteur ? `
            <div class="analysis-block">
              <div class="analysis-block-hd">⚽<span>Buteur probable</span></div>
              <span class="buteur-chip">⚽ ${d.buteur}</span>
            </div>` : ''}

            <!-- Key players -->
            ${keyPlayers.length ? `
            <div class="analysis-block">
              <div class="analysis-block-hd">⭐<span>Joueurs à surveiller</span></div>
              <div class="players-grid">
                ${keyPlayers.map(p => `
                  <div class="player-row">
                    <span class="player-avatar">${(p.name||'?').split(' ').pop()[0]}</span>
                    <span class="player-name">${p.name}</span>
                    <span class="player-role">${p.role}</span>
                  </div>`).join('')}
              </div>
            </div>` : ''}

            <!-- Forme récente -->
            <div class="analysis-block">
              <div class="analysis-block-hd">📈<span>Forme récente</span></div>
              <div style="display:flex;flex-direction:column;gap:8px">
                <div class="form-wrap">
                  <span class="form-flag">${match.home_flag}</span>
                  <span class="form-team">${match.home_team}</span>
                  <div class="form-dots">${formDots(d.home_form)}</div>
                </div>
                <div class="form-wrap">
                  <span class="form-flag">${match.away_flag}</span>
                  <span class="form-team">${match.away_team}</span>
                  <div class="form-dots">${formDots(d.away_form)}</div>
                </div>
              </div>
            </div>

            <!-- Stats -->
            <div class="analysis-block">
              <div class="analysis-block-hd">📊<span>Forces en présence</span></div>
              <div class="stats-list">
                ${[
                  { label: 'Attaque', home: stats.home_attack || 0, away: stats.away_attack || 0 },
                  { label: 'Défense', home: stats.home_defense || 0, away: stats.away_defense || 0 },
                ].map(s => `
                  <div class="stat-row">
                    <div class="stat-row-label">${s.label}</div>
                    <div class="stat-bar-row">
                      <span style="font-size:16px">${match.home_flag}</span>
                      <div class="stat-track"><div class="stat-fill green" style="width:${s.home}%"></div></div>
                      <span class="stat-val">${s.home}</span>
                    </div>
                    <div class="stat-bar-row">
                      <span style="font-size:16px">${match.away_flag}</span>
                      <div class="stat-track"><div class="stat-fill gray" style="width:${s.away}%"></div></div>
                      <span class="stat-val">${s.away}</span>
                    </div>
                  </div>`).join('')}
              </div>
            </div>

          </div>
        </div>`;

      // Animate confidence bar
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.getElementById('conf-fill').style.width = (d.confidence || 0) + '%';
        });
      });
    }
    })();
  </script>
</body>
</html>
