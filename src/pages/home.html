<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Footzy — Matchs</title>
  <link rel="stylesheet" href="/src/css/tokens.css" />
  <link rel="stylesheet" href="/src/css/components.css" />
  <link rel="stylesheet" href="/src/css/fz-components.css" />
  <link rel="stylesheet" href="/src/css/pages.css" />
</head>
<body>
  <div class="page-content">
    <!-- Header -->
    <div class="home-header">
      <span class="home-logo">Footz<b>y</b></span>
      <div id="user-info" style="display:flex;align-items:center;gap:10px">
        <span id="user-streak" class="fz-streak" style="display:none"></span>
        <div id="user-avatar" class="fz-avatar fz-avatar--accent" onclick="window.location.href='/src/pages/profil.html'" style="cursor:pointer">?</div>
      </div>
    </div>

    <!-- Défi quotidien -->
    <div class="fz-section-h"><span class="fz-section-h__dot"></span><span class="fz-section-h__title">Défi du jour</span></div>
    <div id="defi-container" style="padding:0 20px 4px"></div>

    <!-- Matchs du jour -->
    <div class="fz-section-h" id="today-label"><span class="fz-section-h__dot"></span><span class="fz-section-h__title">Matchs d'aujourd'hui</span></div>
    <div id="match-list" class="fz-stack fz-stack--sm" style="padding-bottom:8px">
      <div style="text-align:center;padding:40px 20px;color:var(--fg-faint)">Chargement...</div>
    </div>

    <!-- Prochains matchs -->
    <div class="fz-section-h" id="upcoming-label" style="display:none"><span class="fz-section-h__dot"></span><span class="fz-section-h__title">Prochains matchs</span></div>
    <div id="upcoming-list" class="fz-stack fz-stack--sm" style="margin-bottom:24px"></div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="/src/pages/accueil.html">
      <span style="font-size:22px">🏠</span>
      <span>Accueil</span>
    </a>
    <a href="/src/pages/home.html" class="active">
      <span style="font-size:22px">⚽</span>
      <span>Matchs</span>
    </a>
    <a href="/src/pages/oracle.html">
      <span style="font-size:22px">🔮</span>
      <span>Oracle</span>
    </a>
    <a href="/src/pages/groupe.html">
      <span style="font-size:22px">🫂</span>
      <span>Groupe</span>
    </a>
    <a href="/src/pages/profil.html">
      <span style="font-size:22px">🪪</span>
      <span>Profil</span>
    </a>
  </nav>

  <script type="module">
    import { supabase, requireAuth, getCurrentProfile } from '/src/js/lib/supabase.js';
    import { formatKickoff, formatTime } from '/src/js/lib/utils.js';

    const user = await requireAuth();
    if (!user) throw new Error('not authed');
    const profile = await getCurrentProfile();

    // User avatar
    if (profile) {
      document.getElementById('user-avatar').textContent = profile.pseudo?.[0]?.toUpperCase() || '?';
      if (profile.streak_quotidien > 0) {
        const streakEl = document.getElementById('user-streak');
        streakEl.textContent = `🔥 ${profile.streak_quotidien}`;
        streakEl.style.display = '';
      }
    }

    // Load today's matches
    const today = new Date();
    today.setHours(0,0,0,0);
    const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);

    const { data: matchsToday } = await supabase
      .from('matchs')
      .select('*')
      .gte('kickoff_at', today.toISOString())
      .lt('kickoff_at', tomorrow.toISOString())
      .order('kickoff_at');

    const matchList = document.getElementById('match-list');

    function matchCardHTML(m) {
      const isLive = m.status === 'live' || m.status === 'halftime';
      const isFinished = m.status === 'finished';
      const midContent = isLive
        ? `<div class="fz-live"><span class="fz-live__dot"></span>LIVE · ${m.minute}'</div><div class="fz-match__score">${m.home_score}–${m.away_score}</div>`
        : isFinished
        ? `<div class="fz-match__score">${m.home_score}–${m.away_score}</div><div class="fz-match__final">Terminé</div>`
        : `<div class="fz-match__time">${formatTime(m.kickoff_at)}</div><div class="fz-match__group">${m.phase === 'groupes' ? 'Groupe ' + (m.groupe||'') : m.phase}</div>`;

      return `
        <button class="fz-match" onclick="window.location.href='/src/pages/match.html?id=${m.id}'" style="cursor:pointer">
          <div class="fz-match__team">
            <span style="font-size:32px;line-height:1">${m.home_flag}</span>
            <span class="fz-match__team-name">${m.home_team}</span>
          </div>
          <div class="fz-match__mid">${midContent}</div>
          <div class="fz-match__team">
            <span style="font-size:32px;line-height:1">${m.away_flag}</span>
            <span class="fz-match__team-name">${m.away_team}</span>
          </div>
        </button>`;
    }

    if (!matchsToday || matchsToday.length === 0) {
      matchList.innerHTML = `<div style="text-align:center;padding:24px;color:var(--text-tertiary)">Aucun match aujourd'hui</div>`;
      // Show upcoming
      const { data: upcoming } = await supabase
        .from('matchs').select('*').gt('kickoff_at', tomorrow.toISOString())
        .order('kickoff_at').limit(5);
      if (upcoming?.length) {
        document.getElementById('upcoming-label').style.display = 'block';
        document.getElementById('upcoming-list').innerHTML = upcoming.map(matchCardHTML).join('');
      }
    } else {
      matchList.innerHTML = matchsToday.map(matchCardHTML).join('');
    }

    // Load défi du jour
    const todayStr = new Date().toISOString().slice(0,10);
    const { data: defi } = await supabase
      .from('defis_quotidiens')
      .select('*')
      .eq('date', todayStr)
      .maybeSingle();

    const defiContainer = document.getElementById('defi-container');
    if (!defi) {
      defiContainer.innerHTML = `<div class="fz-card" style="text-align:center;color:var(--fg-faint);padding:20px">Pas de défi aujourd'hui</div>`;
    } else {
      const { data: alreadyAnswered } = await supabase
        .from('reponses_defi').select('id,correcte,points').eq('user_id', user.id).eq('defi_id', defi.id).maybeSingle();

      const reponses = Array.isArray(defi.reponses) ? defi.reponses : Object.values(defi.reponses);

      defiContainer.innerHTML = `
        <div class="fz-card fz-defi-card">
          <div class="defi-header">
            <span style="font-size:11px;font-weight:800;color:var(--accent-strong);text-transform:uppercase;letter-spacing:0.08em">⚡ Défi du jour</span>
            <span class="fz-pts">+50 pts</span>
          </div>
          <p class="fz-defi-q" style="margin:8px 0 12px">${defi.question}</p>
          <div class="fz-quiz-grid" id="defi-options">
            ${reponses.map((r, i) => `<button class="fz-quiz-btn ${alreadyAnswered ? (i === defi.bonne_reponse ? 'is-correct' : (alreadyAnswered.reponse === i && !alreadyAnswered.correcte ? 'is-wrong' : '')) : ''}" data-idx="${i}" ${alreadyAnswered ? 'disabled' : ''}>${r}</button>`).join('')}
          </div>
          ${alreadyAnswered ? `<p style="margin-top:12px;font-size:13px;color:${alreadyAnswered.correcte ? 'var(--accent-strong)' : 'var(--danger)'}">
            ${alreadyAnswered.correcte ? `✓ Bonne réponse ! +${alreadyAnswered.points} pts` : '✗ Mauvaise réponse'}
          </p>` : ''}
        </div>`;

      if (!alreadyAnswered) {
        document.getElementById('defi-options').addEventListener('click', async (e) => {
          const btn = e.target.closest('.defi-option');
          if (!btn) return;
          const idx = parseInt(btn.dataset.idx);
          const correcte = idx === defi.bonne_reponse;
          const points = correcte ? 50 : 0;

          await supabase.from('reponses_defi').insert({ user_id: user.id, defi_id: defi.id, reponse: idx, correcte, points });
          if (correcte) await supabase.from('profiles').update({ points_totaux: (profile.points_totaux||0) + points }).eq('id', user.id);

          document.querySelectorAll('.fz-quiz-btn').forEach((b, i) => {
            b.disabled = true;
            if (i === defi.bonne_reponse) b.classList.add('is-correct');
            else if (i === idx && !correcte) b.classList.add('is-wrong');
          });
        });
      }
    }
  </script>
</body>
</html>
