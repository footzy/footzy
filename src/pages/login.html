<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Footzy — Connexion</title>
  <link rel="stylesheet" href="/src/css/tokens.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0F0F0E;
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px calc(32px + env(safe-area-inset-bottom));
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .auth-wrap {
      width: 100%; max-width: 360px;
      display: flex; flex-direction: column;
    }

    /* ── Branding ── */
    .auth-brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .auth-logo {
      font-size: 40px; font-weight: 900; letter-spacing: -0.04em;
      color: #fff; line-height: 1;
    }
    .auth-logo span { color: #00E05A; }
    .auth-pill {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 12px;
      background: rgba(0,224,90,0.1);
      border: 1px solid rgba(0,224,90,0.22);
      border-radius: 50px; padding: 5px 14px;
      font-size: 13px; font-weight: 700; color: #00E05A;
    }
    .auth-sub {
      margin-top: 8px;
      font-size: 13px; color: rgba(255,255,255,0.35); font-weight: 500;
    }

    /* ── SSO Buttons ── */
    .sso-btn {
      width: 100%; height: 54px;
      border-radius: 14px; border: none;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-size: 15px; font-weight: 700; letter-spacing: -0.01em;
      cursor: pointer; transition: opacity .15s, transform .1s;
      margin-bottom: 10px;
    }
    .sso-btn:active { opacity: 0.84; transform: scale(0.98); }
    .sso-btn--google { background: #fff; color: #1F1F1F; }
    .sso-btn--apple  { background: #000; color: #fff; border: 1px solid rgba(255,255,255,0.14); }

    /* ── Separator ── */
    .auth-sep {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0 16px;
    }
    .auth-sep::before, .auth-sep::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(255,255,255,0.08);
    }
    .auth-sep span {
      font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(255,255,255,0.25);
      white-space: nowrap;
    }

    /* ── Email form ── */
    .auth-input {
      width: 100%; height: 46px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px; color: #fff;
      font-size: 15px; padding: 0 14px;
      outline: none; transition: border-color .15s;
      margin-bottom: 8px; font-family: inherit;
    }
    .auth-input::placeholder { color: rgba(255,255,255,0.28); }
    .auth-input:focus { border-color: #00E05A; }

    .auth-submit {
      width: 100%; height: 46px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.11);
      border-radius: 12px;
      color: rgba(255,255,255,0.8);
      font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background .15s, transform .1s;
      font-family: inherit; letter-spacing: -0.01em;
    }
    .auth-submit:hover  { background: rgba(255,255,255,0.11); }
    .auth-submit:active { transform: scale(0.98); }
    .auth-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .auth-error {
      color: #FF6B6B; font-size: 13px;
      text-align: center; margin-bottom: 10px;
      display: none; line-height: 1.4;
    }

    .auth-foot {
      margin-top: 16px; text-align: center;
      font-size: 13px; color: rgba(255,255,255,0.35);
    }
    .auth-foot button {
      background: none; border: none; cursor: pointer;
      color: #00E05A; font-weight: 700;
      font-size: 13px; font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="auth-wrap">

    <!-- Branding -->
    <div class="auth-brand">
      <div class="auth-logo">Footzy<span>.</span></div>
      <div class="auth-pill">🏆 CdM 2026</div>
      <div class="auth-sub">Pronostiques · Groupes · Classements</div>
    </div>

    <!-- Google -->
    <button class="sso-btn sso-btn--google" id="google-btn">
      <svg width="20" height="20" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>
      </svg>
      Continuer avec Google
    </button>

    <!-- Apple -->
    <button class="sso-btn sso-btn--apple" id="apple-btn">
      <svg width="17" height="21" viewBox="0 0 814 1000" fill="#fff">
        <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-42.3-147.3-101.8-78-140.7-78-164.5c0-119.1 39.5-179.2 79-220.3 51.5-55 127.5-90.9 218.8-90.9 70.4 0 113.7 38.3 167.3 38.3 49.6 0 100.5-41.6 174.6-41.6 31.6 0 97.2 2.6 146.4 59.4zm-249.1-82.5c-14.1-40.8-32-78-57.9-109.4-39.5-47.6-95.5-76.3-146.4-76.3-1.3 0-2.6 0-3.9.3 1.3 40.8 20.7 81.9 44.3 110.7 27.3 32.7 87.5 65.4 163.9 74.7z"/>
      </svg>
      Continuer avec Apple
    </button>

    <!-- Separator -->
    <div class="auth-sep"><span>ou par email</span></div>

    <!-- Error -->
    <div id="error-msg" class="auth-error"></div>

    <!-- Email form -->
    <div id="pseudo-wrap" style="display:none">
      <input class="auth-input" id="input-pseudo" type="text"
             placeholder="Pseudo (ex: ZidaneOG)" minlength="3" maxlength="20" autocomplete="username" />
    </div>
    <input class="auth-input" id="input-email" type="email"
           placeholder="Adresse email" autocomplete="email" />
    <input class="auth-input" id="input-password" type="password"
           placeholder="Mot de passe" autocomplete="current-password" />
    <button class="auth-submit" id="email-btn">Se connecter</button>

    <div class="auth-foot" id="mode-foot">
      Pas de compte ? <button id="switch-btn">S'inscrire</button>
    </div>

  </div>

  <script type="module">
    import { supabase } from '/src/js/lib/supabase.js';

    const CALLBACK_URL = window.location.origin + '/src/pages/auth-callback.html';

    // ── Redirect si déjà connecté ──
    const { data: { session } } = await supabase.auth.getSession();
    if (session) { window.location.href = '/src/pages/accueil.html'; }

    // ── Ouvrir en mode inscription si ?mode=register ──
    if (new URLSearchParams(location.search).get('mode') === 'register') {
      mode = 'register'; updateMode();
    }

    // ── Google ──
    document.getElementById('google-btn').addEventListener('click', async () => {
      const btn = document.getElementById('google-btn');
      btn.disabled = true; btn.style.opacity = '0.7';
      await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: CALLBACK_URL, queryParams: { prompt: 'select_account' } }
      });
    });

    // ── Apple ──
    document.getElementById('apple-btn').addEventListener('click', async () => {
      const btn = document.getElementById('apple-btn');
      btn.disabled = true; btn.style.opacity = '0.7';
      await supabase.auth.signInWithOAuth({
        provider: 'apple',
        options: { redirectTo: CALLBACK_URL }
      });
    });

    // ── Toggle login / register ──
    let mode = 'login';

    function updateMode() {
      const isRegister = mode === 'register';
      document.getElementById('pseudo-wrap').style.display  = isRegister ? '' : 'none';
      document.getElementById('input-password').autocomplete = isRegister ? 'new-password' : 'current-password';
      document.getElementById('input-password').placeholder  = isRegister ? 'Mot de passe (8 car. min)' : 'Mot de passe';
      document.getElementById('email-btn').textContent       = isRegister ? 'Créer mon compte' : 'Se connecter';
      document.getElementById('mode-foot').innerHTML = isRegister
        ? 'Déjà un compte ? <button id="switch-btn">Se connecter</button>'
        : 'Pas de compte ? <button id="switch-btn">S\'inscrire</button>';
      document.getElementById('switch-btn').addEventListener('click', () => {
        mode = mode === 'login' ? 'register' : 'login';
        updateMode();
        document.getElementById('error-msg').style.display = 'none';
      });
    }

    document.getElementById('switch-btn').addEventListener('click', () => {
      mode = 'register';
      updateMode();
    });

    // ── Email submit ──
    document.getElementById('email-btn').addEventListener('click', async () => {
      const email    = document.getElementById('input-email').value.trim();
      const password = document.getElementById('input-password').value;
      const pseudo   = document.getElementById('input-pseudo')?.value.trim();
      const errorEl  = document.getElementById('error-msg');
      const btn      = document.getElementById('email-btn');
      errorEl.style.display = 'none';

      if (!email || !password) {
        errorEl.textContent = 'Remplis l\'email et le mot de passe.';
        errorEl.style.display = 'block'; return;
      }

      btn.disabled = true; btn.textContent = '…';

      if (mode === 'register') {
        if (!pseudo || pseudo.length < 3) {
          errorEl.textContent = 'Pseudo trop court (3 caractères min).';
          errorEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Créer mon compte'; return;
        }
        const { data: ex } = await supabase.from('profiles').select('id').eq('pseudo', pseudo).maybeSingle();
        if (ex) {
          errorEl.textContent = 'Ce pseudo est déjà pris.';
          errorEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Créer mon compte'; return;
        }
        const { data, error } = await supabase.auth.signUp({
          email, password, options: { data: { pseudo } }
        });
        if (error) {
          errorEl.textContent = error.message;
          errorEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Créer mon compte'; return;
        }
        if (data.user) {
          await supabase.from('profiles').upsert(
            { id: data.user.id, pseudo, points_totaux: 0, plan: 'free' },
            { onConflict: 'id' }
          );
          window.location.href = '/src/pages/onboarding.html';
        }

      } else {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          errorEl.textContent = 'Email ou mot de passe incorrect.';
          errorEl.style.display = 'block'; btn.disabled = false; btn.textContent = 'Se connecter'; return;
        }
        window.location.href = '/src/pages/accueil.html';
      }
    });
  </script>
</body>
</html>
